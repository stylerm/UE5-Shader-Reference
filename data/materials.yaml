meta:
  title: "Materials — UE5 Shader Cheatsheet"
  description: "UE5 Material Custom Node reference — GLSL to HLSL conversion, Shadertoy porting, WPO patterns, and in-engine material optimization."
  active: materials
  favicon: "🎨"
  header_tag: "● Materials · Custom Nodes · Shadertoy Porting"
  header_h1: 'Material <span>Custom Node</span> Reference'
  header_right: |
    Engine: <strong>UE 5.x</strong>
    Context: <strong>Material Custom Node (body only)</strong>
    Target: <strong>SM5 / SM6 / ES3.1</strong>
  anchors:
    - {id: context,     label: Context}
    - {id: syntax,      label: Syntax}
    - {id: custom-node, label: Custom Node}
    - {id: shadertoy,   label: Shadertoy}
    - {id: wpo,         label: WPO}
    - {id: errors,      label: Errors}
    - {id: templates,   label: Templates}
    - {divider: "OPTIMIZATION", area: optim}
    - {id: mat-cost,     label: Complexity}
    - {id: mat-rules,    label: Optim Rules}
    - {id: mat-blend,    label: Blend Modes}
    - {divider: "ENGINE INTERNALS", area: engine}
    - {id: mat-gotchas,  label: Engine Gotchas}

section_groups:

  # ════════════════════════════════════════════════════════════════════════════
  #  AREA 1 — HLSL REFERENCE
  # ════════════════════════════════════════════════════════════════════════════
  - title: "HLSL Reference"
    icon: "⚗"
    theme: ref
    sections:

      # ── SECTION 1: CONTEXT ─────────────────────────────────────────────────
      - id: context
        label: "Context &amp; Setup"
        cards:

          - color: blue
            title: "Always Declare Context First"
            content:
              - type: rowlist
                code_labels: false
                rows:
                  - {label: "WHERE",       text: "Custom node / .usf file / Niagara / Plugin shader"}
                  - {label: "UE VERSION",  text: "5.1 / 5.2 / 5.3 / 5.4+"}
                  - {label: "SHADER MDL",  text: "SM5 / SM6 / ES3.1"}
                  - {label: "RETURN TYPE", text: "float / float3 / float4 / etc."}
                  - {label: "PLATFORM",    text: "PC / Mobile / Console / Vulkan"}

          - color: orange
            title: "Declare Input Pins Explicitly"
            content:
              - type: prose
                text: "Custom node pins become variable names. Always list them:"
              - type: code
                src: |
                  // Tell Claude exactly:
                  Inputs:
                    float3  WorldNormal
                    float2  UV
                    float   Time
                    float   Roughness

                  Return type: float3

          - color: green
            title: "Specify UE Globals Needed"
            content:
              - type: checklist
                items:
                  - {icon: arrow, html: "<strong>View.GameTime</strong> — elapsed time"}
                  - {icon: arrow, html: "<strong>ResolvedView.WorldCameraOrigin</strong>"}
                  - {icon: arrow, html: "<strong>Primitive.LocalToWorld</strong>"}
                  - {icon: arrow, html: "<strong>View.ScreenPositionScaleBias</strong>"}
                  - {icon: warn,  html: "If not needed, ask for <strong>self-contained</strong> code with no injected globals"}

      # ── SECTION 2: SYNTAX ──────────────────────────────────────────────────
      - id: syntax
        label: "GLSL → HLSL Intrinsic Mapping"
        priority: high
        cards:

          - color: blue
            span: grid-full
            title: "Always Use HLSL Intrinsics · Full Conversion Table"
            content:
              - type: table
                style: conversion
                cols: ["GLSL (source)", "HLSL / UE Equivalent", "Notes"]
                rows:
                  - ["mix(a, b, t)",           "lerp(a, b, t)",                         "Most common mistake from Shadertoy ports"]
                  - ["fract(x)",               "frac(x)",                               "Identical behavior, different name"]
                  - ["mod(x, y)",              "fmod(x, y)",                            "Sign behavior differs for negatives — use <code>glsl_mod(x,y) = x - y*floor(x/y)</code> for exact GLSL match"]
                  - ["atan(y, x)",             "atan2(y, x)",                           "Argument order is the same"]
                  - ["dFdx / dFdy",            "ddx / ddy",                             "Pixel shader only — not available in vertex or compute"]
                  - ["inversesqrt(x)",         "rsqrt(x)",                              "Fast reciprocal square root"]
                  - ["vec2 / vec3 / vec4",     "float2 / float3 / float4",              "UE also accepts <code>half2/3/4</code> for mobile perf"]
                  - ["mat3 / mat4",            "float3x3 / float4x4",                   "Row-major in HLSL vs column-major in GLSL — may need transpose"]
                  - ["texture(sampler, uv)",   "Texture2DSample(...)",                  "Use UE material texture input pins instead"]
                  - ["layout(location=0) out", "[Implicit in Custom node]",             "No output declarations needed in body-only mode"]
                  - ["gl_FragCoord",           "SvPosition",                            "In full shaders; in Custom node use a ScreenPosition pin"]
                  - ["step(edge, x)",          "step(edge, x)",                         "Same name — but GLSL arg order is reversed from some docs"]
                  - ["smoothstep(e0, e1, x)",  "smoothstep(e0, e1, x)",                 "Same name and arg order — hermite interpolation"]
                  - ["clamp(x, 0.0, 1.0)",     "saturate(x)",                           "Preferred UE shorthand for 0–1 clamping; <code>clamp()</code> also works"]
                  - ["pow(base, exp)",         "pow(abs(base), exp)",                   "HLSL <code>pow</code> is <strong>undefined for negative base</strong> — always wrap with <code>abs()</code>"]
                  - ["abs(x)",                 "abs(x)",                                "Same — but integer <code>abs()</code> may behave differently on some platforms"]
                  - ["sign(x)",                "sign(x)",                               "Same name — returns -1, 0, or 1"]
                  - ["noise()",                "[USE UE NOISE NODE]",                   "Not available in HLSL — use hash functions: <code>frac(sin(dot(p, float2(12.9898, 78.233))) * 43758.5453)</code>"]
                  - ["textureLod(s, uv, lod)", "Texture2DSampleLevel(Tex, TexSampler, uv, lod)", "Requires Tex + TexSampler pair from input pins"]
                  - ["textureSize(sampler, 0)","[Use a float2 TexelSize input pin]",    "No direct equivalent — pass dimensions as a parameter"]

      # ── SECTION 3: CUSTOM NODE ─────────────────────────────────────────────
      - id: custom-node
        label: "Custom Node Rules"
        cards:

          - color: red
            title: "Custom Node · Never Do This"
            content:
              - type: checklist
                items:
                  - {icon: no, html: "<strong>No <code>#include</code></strong> — body is injected mid-shader, includes break compilation"}
                  - {icon: no, html: "<strong>No top-level function declarations</strong> — inline all logic or use the struct workaround"}
                  - {icon: no, html: "<strong>No sampler declarations</strong> — pass textures as input pins instead"}
                  - {icon: no, html: "<strong>No global-scope mutable state</strong> — all vars are local to the body"}
                  - {icon: no, html: "<strong>No GLSL precision qualifiers</strong> (<code>mediump</code>, <code>highp</code>, <code>lowp</code>)"}
                  - {icon: no, html: "<strong>No <code>void main()</code></strong> — body only, return value is the output"}
                  - {icon: no, html: "<strong>No undeclared variable references</strong> — only use explicitly listed input pins"}

          - color: green
            title: "Custom Node · Best Practices"
            content:
              - type: checklist
                items:
                  - {icon: ok, html: "<strong>Inline-only logic</strong> — no separate function blocks"}
                  - {icon: ok, html: "<strong><code>static const</code></strong> for all constants"}
                  - {icon: ok, html: "<strong>Explicit return value</strong> matching declared return type"}
                  - {icon: ok, html: "<strong>Swizzle count validation</strong> — float3 output ≠ float4 return"}
                  - {icon: ok, html: "<strong>Step-by-step comments</strong> on each major operation"}
                  - {icon: ok, html: "<strong>Feature level guard hints</strong> if targeting ES3.1 / mobile"}
                  - {icon: ok, html: "<strong>Flag texture samples</strong> as <code>[NEEDS TEXTURE PIN]</code> rather than inline"}

          - color: yellow
            title: "Struct Workaround for Helper Functions"
            content:
              - type: prose
                text: "Custom nodes inject code inside a function body — top-level function defs cause C2059. Wrap helpers in a struct:"
              - type: code
                src: |
                  // Struct trick — works inside Custom node body
                  struct Helpers {
                    float hash21(float2 p) {
                      p = frac(p * float2(123.34, 456.21));
                      p += dot(p, p + 45.32);
                      return frac(p.x * p.y);
                    }
                    float glsl_mod(float x, float y) {
                      return x - y * floor(x / y);
                    }
                  };
                  Helpers H;
                  return H.hash21(UV);

      # ── SECTION 4: SHADERTOY ───────────────────────────────────────────────
      - id: shadertoy
        label: "Shadertoy / GLSL Port Guide"
        cards:

          - color: orange
            title: "Shadertoy Uniform Mapping"
            content:
              - type: table
                style: conversion
                cols: ["Shadertoy", "UE5 Equivalent", "Notes"]
                rows:
                  - ["iTime",         "float Time input pin",        "Connect a <strong>Time</strong> node to the pin"]
                  - ["iResolution.xy","float2 Resolution input pin", "Use <strong>SceneTexture:SceneColor</strong> → Size or pass manually"]
                  - ["iMouse",        "[No direct equivalent]",      "Pass via Material Parameter Collection or Blueprint"]
                  - ["iFrame",        "[No direct equivalent]",      "Approximate with <code>floor(Time * FrameRate)</code>"]
                  - ["iChannel0–3",   "Texture Object input pins",   "One pin per channel; use <code>Texture2DSample()</code>"]
                  - ["fragCoord",     "float2 ScreenPos input pin",  "Connect ScreenPosition node (viewport UV)"]
                  - ["fragColor",     "return float4(...);",         "The Custom node return value <em>is</em> the output"]

          - color: red
            title: "Coordinate System Pitfalls"
            content:
              - type: checklist
                items:
                  - {icon: no,   html: "<strong>Y-axis flip</strong> — Shadertoy is Y-up (0 at bottom); UE UVs are Y-down (0 at top). Apply <code>uv.y = 1.0 - uv.y</code>"}
                  - {icon: no,   html: "<strong>UV range</strong> — Shadertoy <code>fragCoord</code> is in pixels; UE ScreenPosition is 0–1 normalized"}
                  - {icon: no,   html: "<strong>Aspect ratio</strong> — Shadertoy divides by <code>iResolution.y</code>; in UE pass resolution and do the same"}
                  - {icon: no,   html: "<strong>NDC differences</strong> — Shadertoy clip space is -1 to 1; UE uses 0 to 1 in many contexts"}
                  - {icon: warn, html: "<strong>Depth</strong> — Shadertoy has no depth buffer access; UE can sample <code>SceneDepth</code> via pin"}

          - color: yellow
            title: "Multi-Pass &amp; Buffer Limitations"
            content:
              - type: checklist
                items:
                  - {icon: no,   html: "<strong>Buffer A/B/C/D cannot be ported</strong> to a single Custom node — each buffer is a separate render pass"}
                  - {icon: warn, html: "<strong>Feedback loops</strong> (reading own output) require <strong>Render Targets</strong> + Blueprint tick logic"}
                  - {icon: warn, html: "<strong>Persistent state</strong> — use Material Parameter Collections or render-target ping-pong"}
                  - {icon: ok,   html: "<strong>Single-pass shaders</strong> (Image tab only, no buffers) port cleanly to one Custom node"}
                  - {icon: ok,   html: "<strong>Workaround</strong> — split multi-pass into separate materials, chain via render targets in Blueprint"}

      # ── SECTION 5: WPO ─────────────────────────────────────────────────────
      - id: wpo
        label: "World Position Offset / Vertex Shader"
        cards:

          - color: blue
            title: "WPO Basics"
            content:
              - type: checklist
                items:
                  - {icon: ok,   html: "WPO return type is always <strong><code>float3</code></strong> — a <strong>world-space</strong> offset added to each vertex position"}
                  - {icon: ok,   html: "Connect Custom node output to the <strong>World Position Offset</strong> pin on the material"}
                  - {icon: ok,   html: "Use <strong><code>absolute world position</code></strong> input pin for world-space vertex position"}
                  - {icon: ok,   html: "Return <code>float3(0,0,0)</code> for no displacement — the value is <em>additive</em>"}
                  - {icon: ok,   html: "Great for: wind, waves, procedural animation, terrain deformation"}

          - color: orange
            title: "Available Vertex Data"
            content:
              - type: rowlist
                rows:
                  - {label: "AbsoluteWorldPosition", text: "Vertex position in world space"}
                  - {label: "VertexNormalWS",        text: "World-space vertex normal"}
                  - {label: "VertexTangentWS",       text: "World-space vertex tangent"}
                  - {label: "TexCoord[0-7]",         text: "UV channels available via input pins"}
                  - {label: "VertexColor",           text: "Per-vertex RGBA (baked in mesh)"}
                  - {label: "ActorPosition",         text: "Object pivot in world space"}
                  - {label: "ObjectBounds",          text: "Bounding box extent — useful for normalizing offsets"}

          - color: yellow
            title: "WPO Limitations"
            content:
              - type: checklist
                items:
                  - {icon: no,   html: "<strong>No <code>ddx</code> / <code>ddy</code></strong> in vertex stage — these are pixel shader derivatives"}
                  - {icon: no,   html: "<strong>No texture sampling</strong> by default in VS — enable <code>Allow Custom Node Vertex Interpolators</code>"}
                  - {icon: warn, html: "<strong>Shadow &amp; bounds mismatch</strong> — large WPO can push verts outside the bounding box, causing culling. Increase <strong>Bounds Scale</strong>"}
                  - {icon: warn, html: "<strong>VS → PS data</strong> — to pass custom data from vertex to pixel, use <strong>Vertex Interpolator</strong> node in the material graph"}
                  - {icon: warn, html: "<strong>Performance</strong> — WPO runs per vertex every frame; keep math simple on high-poly meshes"}

      # ── SECTION 6: ERRORS ──────────────────────────────────────────────────
      - id: errors
        label: "Common Errors to Prevent"
        priority: high
        cards:

          - color: red
            span: grid-full
            title: "Gotchas That Break Compilation or Produce Wrong Results"
            content:
              - type: nested_grid
                cols: 2
                groups:
                  - items:
                      - {icon: no, html: "Matrix multiply order — HLSL is <strong>row-vector × matrix</strong>; GLSL is column-major"}
                      - {icon: no, html: "<strong>UV origin</strong> — UE flips V; ask Claude to account for <code>1.0 - UV.y</code> if porting"}
                      - {icon: no, html: "<strong>Swizzle mismatch</strong> — always verify component counts explicitly"}
                      - {icon: no, html: "<strong>Shadertoy time</strong> is <code>iTime</code> — must be mapped to a <code>float Time</code> input pin"}
                  - items:
                      - {icon: no,   html: "<strong>Integer division</strong> — <code>1/2 = 0</code>; cast to float explicitly: <code>1.0/2.0</code>"}
                      - {icon: warn, html: "<strong>Scalar broadcast</strong> — <code>float3(1)</code> is valid HLSL but prefer <code>float3(1,1,1)</code> for clarity; some older compiler versions warn"}
                      - {icon: no,   html: "<strong>HLSL <code>fmod</code> sign differs</strong> from GLSL <code>mod</code> — use <code>x - y*floor(x/y)</code> for exact match"}
                      - {icon: no,   html: "<strong><code>pow()</code> with negative base</strong> is undefined in HLSL — always use <code>pow(abs(x), n)</code>"}

      # ── SECTION 7: TEMPLATES ───────────────────────────────────────────────
      - id: templates
        label: "Prompt Templates"
        priority: high
        grid: "grid grid-2"
        cards:

          - color: blue
            title: "Template A · Material Custom Node"
            content:
              - type: prompt
                src: |
                  {{kw:Context:}}    {{ph:UE5 Material Custom Node (body only, no signature)}}
                  {{kw:UE Version:}} {{ph:5.4}}
                  {{kw:Shader Model:}}{{ph: SM5}}
                  {{kw:Platform:}}   {{ph:PC / Vulkan}}

                  {{kw:Return type:}} {{ph:float3}}

                  {{kw:Input pins:}}
                    {{ph:float3  WorldNormal
                    float2  UV
                    float   Time
                    float   Roughness}}

                  {{kw:Goal:}} {{ph:[describe effect in plain language]}}

                  {{kw:Rules:}}
                    - No #include, no function declarations
                    - static const for all constants
                    - HLSL intrinsics only (no GLSL)
                    - Validate all swizzle component counts
                    - Comment each major step
                    - Return type must match: {{ph:float3}}

          - color: orange
            title: "Template B · Shadertoy / GLSL Port"
            content:
              - type: prompt
                src: |
                  {{kw:Task:}} Port the following GLSL to a UE5 Custom node

                  {{kw:Source:}}
                  {{ph:[paste GLSL shader here]}}

                  {{kw:Apply ALL conversions:}}
                    mix      → lerp
                    fract    → frac
                    mod      → x - y*floor(x/y)  {{cm:// NOT fmod (sign differs)}}
                    atan     → atan2
                    dFdx/y   → ddx/ddy
                    vec2/3/4 → float2/3/4
                    mat3/4   → float3x3/float4x4
                    iTime    → {{ph:Time}} (float input pin)
                    iResolution → {{ph:ScreenSize}} (float2 input pin)
                    gl_FragCoord → use a {{ph:ScreenPos}} input pin

                  {{kw:Output rules:}}
                    - Body-only, no function signature
                    - No sampler declarations
                    - Flag texture samples as [NEEDS TEXTURE PIN]
                    - Use struct workaround if helper functions needed
                    - Add a comment for each conversion made


  # ════════════════════════════════════════════════════════════════════════════
  #  AREA 2 — IN-ENGINE OPTIMIZATION
  # ════════════════════════════════════════════════════════════════════════════
  - title: "In-Engine Optimization"
    icon: "⚡"
    theme: optim
    sections:

      # ── SECTION 8: COMPLEXITY TIERS ────────────────────────────────────────
      - id: mat-cost
        label: "Material Complexity &amp; Cost Tiers"
        grid: "grid grid-2"
        cards:

          - color: green
            span: grid-full
            title: "How to Measure Cost — Profiling Commands"
            content:
              - type: rowlist
                layout: stacked
                rows:
                  - {label: "viewmode shadercomplexity", text: "Visualizes per-pixel instruction cost in-viewport — <strong>green</strong> &lt;30 instructions (lightweight), <strong>yellow</strong> 30–100 (acceptable), <strong>red</strong> &gt;100 (expensive)"}
                  - {label: "stat gpu", text: "Console command — shows GPU milliseconds per render pass. Watch the <em>BasePass</em> row for opaque material cost and <em>Translucency</em> for particle/glass overdraw"}
                  - {label: "Material Stats panel", text: "Inside the Material Editor (Window → Stats) — shows instruction counts and sampler usage per quality level and shader permutation before you close the editor"}
                  - {label: "Shader Complexity View", text: "Editor viewport display mode — enables at-a-glance overdraw and per-pixel complexity identification across the entire scene"}

          - color: orange
            title: "Instruction Count Tiers"
            content:
              - type: checklist
                items:
                  - {icon: ok,   html: "<strong>&lt;30 instructions</strong> — lightweight; suitable for mobile and high-density meshes"}
                  - {icon: ok,   html: "<strong>30–100 instructions</strong> — acceptable for hero/foreground meshes on PC/console"}
                  - {icon: warn, html: "<strong>100–200 instructions</strong> — expensive; only for primary character or cinematic materials"}
                  - {icon: no,   html: "<strong>&gt;200 instructions</strong> — only acceptable in offline/cinematic contexts; optimize aggressively"}

          - color: yellow
            title: "Sampler &amp; Permutation Cost"
            content:
              - type: checklist
                items:
                  - {icon: ok,   html: "<strong>Texture samples</strong> — each adds a memory fetch stall; mobile hard cap is 16 samplers per shader"}
                  - {icon: warn, html: "<strong>Static Switch</strong> nodes double permutation count per switch — minimize them; use <code>DynamicBranch</code> for runtime toggles"}
                  - {icon: warn, html: "<strong>Translucency</strong> — most expensive blend mode due to overdraw; avoid on large screen-covering surfaces"}
                  - {icon: ok,   html: "<strong>Pack textures</strong> — store Roughness in R, Metallic in G, AO in B of one texture to save sampler slots"}

      # ── SECTION 9: OPTIMIZATION RULES ─────────────────────────────────────
      - id: mat-rules
        label: "Material Optimization Rules"
        cards:

          - color: green
            title: "DO — Material Setup"
            content:
              - type: checklist
                items:
                  - {icon: ok, html: "<strong>Fully Rough flag</strong> — enable for non-specular surfaces (rocks, cloth, bark) to remove the GGX specular term entirely"}
                  - {icon: ok, html: "<strong>Material Layers</strong> — build a layer library and reuse; avoid duplicating node networks across materials"}
                  - {icon: ok, html: "<strong>MaterialFloat type</strong> — use in Custom nodes; automatically adapts precision per platform"}
                  - {icon: ok, html: "<strong>Masked blend mode</strong> — cheaper than Translucent for foliage and fences; uses depth buffer correctly"}
                  - {icon: ok, html: "<strong>Texture channel packing</strong> — R/G/B/A for Rough/Metal/AO/Height saves 3 sampler slots over 4 separate textures"}

          - color: red
            title: "AVOID — Common Mistakes"
            content:
              - type: checklist
                items:
                  - {icon: no,   html: "<strong>WPO on dense meshes</strong> — vertex count × per-vertex WPO cost; bake displacement to a low-poly mesh where possible"}
                  - {icon: no,   html: "<strong>Opacity Mask on Opaque blend mode</strong> — use <em>Masked</em> blend mode with the <em>Opacity Mask Clip Value</em> instead"}
                  - {icon: no,   html: "<strong>Complex per-pixel normal math</strong> in Base Pass — bake complex detail normals to a normal map texture"}
                  - {icon: warn, html: "<strong>Per-frame dynamic material parameter updates</strong> from Blueprint — batch updates or use a Material Parameter Collection"}
                  - {icon: warn, html: "<strong>Two Sided</strong> without need — doubles rasterizer cost; use only on foliage/thin surfaces where back-faces are visible"}

          - color: blue
            title: "Mobile-Specific Rules"
            content:
              - type: checklist
                items:
                  - {icon: ok,   html: "<strong>Use half precision</strong> (<code>half</code> / <code>half3</code>) in Custom nodes — significant ALU savings on mobile GPUs"}
                  - {icon: ok,   html: "<strong>ES3.1 feature level</strong> — test with <em>Mobile Preview</em> renderer; some features silently degrade"}
                  - {icon: no,   html: "<strong>No dynamic branching on mobile</strong> — GPU may evaluate both sides regardless; prefer <code>lerp</code> over <code>if</code>"}
                  - {icon: no,   html: "<strong>16-sampler cap</strong> — count total texture samples (including normal, roughness, opacity) across all nodes"}
                  - {icon: warn, html: "<strong>Dithered LOD transitions</strong> — cheaper than material blending on mobile; avoid per-pixel blend between materials"}

      # ── SECTION 10: BLEND MODES ────────────────────────────────────────────
      - id: mat-blend
        label: "Blend Mode Cost Reference"
        cards:

          - color: blue
            span: grid-full
            title: "Blend Mode Performance Comparison"
            content:
              - type: table
                style: default
                cols: ["Blend Mode", "Depth Write", "Depth Test", "Overdraw Cost", "Use Case"]
                rows:
                  - ["`Opaque`",         "Yes", "Yes", "None — cheapest",      "Default for solid surfaces"]
                  - ["`Masked`",         "Yes", "Yes", "Low — early-out possible", "Foliage, fences, hair cards"]
                  - ["`Translucent`",    "No",  "Yes", "High — full overdraw",  "Glass, particles, water surface"]
                  - ["`Additive`",       "No",  "Yes", "Medium — adds to scene","Fire, sparks, holograms"]
                  - ["`Modulate`",       "No",  "Yes", "Medium — multiplies",   "Shadows, overlays, lens effects"]
                  - ["`AlphaComposite`", "No",  "Yes", "High — pre-mult alpha", "UI, compositing, cinematic FX"]

  # ════════════════════════════════════════════════════════════════════════════
  #  AREA 3 — ENGINE INTERNALS (Source-Verified Gotchas)
  # ════════════════════════════════════════════════════════════════════════════
  - title: "Engine Internals"
    icon: "🔬"
    theme: engine
    sections:

      # ── SECTION 11: ENGINE GOTCHAS (SOURCE-VERIFIED) ───────────────────────
      - id: mat-gotchas
        label: "Engine Gotchas · Source-Verified"
        priority: high
        grid: "grid grid-2"
        cards:

          - color: red
            title: "Custom HLSL Dedup · The Real Rule"
            content:
              - type: gotcha
                problem: "Copy-pasting a Custom node to &quot;reuse&quot; the same HLSL does <strong>not</strong> dedupe — each copy emits its own generated function, bloating shader code and compile time."
                why: "The translator caches custom nodes on <strong>(Expression pointer, ScopeID, input hash)</strong> — not on the code text. Two byte-identical bodies have different expression pointers, so they never collide."
                why_ref: "HLSLMaterialTranslator.cpp:15486-15507"
                fix: "<strong>Wrap reused HLSL in a Material Function</strong> — graph-level sharing, derivative-correct, preshader-aware. Custom nodes <em>do</em> dedupe when the same node instance is evaluated with the same inputs in the same scope, so one instance driven by multiple readers is fine."
                detect: "Instruction counts in the Material Stats panel scale with the number of Custom node copies instead of being constant. Compile time grows with material graph width rather than graph complexity."

          - color: orange
            title: "Substrate Budget · 128 Compile / 24 Output"
            content:
              - type: gotcha
                problem: "Materials that exceed <m>24</m> operators in the final Substrate tree are <strong>silently simplified</strong> — no artist-facing warning, only a flag in cooked data."
                why: "<code>SUBSTRATE_COMPILATION_OUTPUT_MAX_OPERATOR</code> (<m>24</m>) is the real ceiling. When exceeded, <code>bMaterialOutOfBudgetHasBeenSimplified</code> is set and auto-simplification retraverses with simplified operators — original tree info is lost. The <m>128</m>-operator compile scratch (<code>SUBSTRATE_MAX_COMPILER_REGISTERED_OPERATOR_COUNT</code>) is just up-front allocation to keep operator pointers stable during tree parse."
                why_ref: "SubstrateMaterialShared.h:161,227"
                fix: "Audit Substrate trees against the <m>24</m>-operator ceiling. Check cooked data or enable log spew for <code>bMaterialOutOfBudgetHasBeenSimplified</code> before shipping."
                detect: "Material visuals differ subtly between editor preview and cooked build — specular response muted or layer contribution missing. Check the cooked-data flag; no in-editor warning exists."
              - type: gotcha
                problem: "<strong>LWC precision is truncated at every Substrate BSDF input</strong> — anisotropy / cavity math wobbles far from world origin."
                why: "<code>CastToNonLWCType</code> is <strong>unconditional</strong> on every BSDF input — there's no opt-out for LWC-sensitive math."
                why_ref: "MaterialExpressionSubstrate.cpp:68-80"
                fix: "Do any LWC-sensitive math (world-space normal perturbation, curvature from world derivatives) in <em>non-Substrate</em> helper materials and pass results as low-frequency parameters. Keep Substrate BSDF inputs in <m>float</m>-safe ranges."
                detect: "Material highlights jitter or drift at large world coordinates (<m>&gt;100k</m> units from origin) but look fine near origin. Not reproducible on Open-World tiles without rebasing."
              - type: gotcha
                problem: "SSS merge is <strong>monotonic</strong> — a tiny amount of <code>DiffusionProfile</code> blended with a cheap <code>Wrap</code> layer upgrades the <em>whole blend</em> to full DiffusionProfile cost."
                why: "The Substrate merge function picks the most expensive SSS mode in any branch and promotes the result."
                why_ref: "MaterialExpressionSubstrate.cpp:28-33"
                fix: "Don't mix DiffusionProfile with cheap SSS approximations in the same blend — commit to one path. If you only need a hint of DiffusionProfile on part of the surface, gate it with a mask and keep the rest as Wrap."
                detect: "Expected-cheap blends cost as much as pure DiffusionProfile in <code>viewmode shadercomplexity</code>. Swap the DiffusionProfile node for Wrap temporarily to confirm the promotion path."

          - color: yellow
            title: "Parameter Collection · Cascade Invalidation"
            content:
              - type: gotcha
                problem: "<strong>Any edit</strong> to a widely-referenced Material Parameter Collection invalidates the DDC entry of <em>every</em> dependent material — a <m>500</m>-material project referencing one global <code>MPC_Lighting</code> pays a full shader recompile on every parameter tweak."
                why: "<code>FMaterialCachedExpressionData</code> stores the MPC's <code>StateId</code> GUID. Any edit regenerates the GUID and cascades invalidation. No batching, no selective invalidation."
                why_ref: "MaterialCachedData.cpp:116-123"
                fix: "<strong>Split shared state into narrower MPCs</strong> — group parameters that change together. Don't put wind direction and global fog tint in the same collection. Keep MPCs in main content, never in a streaming-only level — missing MPC at load triggers silent DDC invalidation and <code>RetryWithoutDDC</code>."
                detect: "Multi-minute shader recompiles on trivial parameter tweaks. Check DDC stats — invalidations spike in proportion to dependent-material count when touching a shared MPC."

          - color: blue
            title: "Mobile ES3.1 · Silent Shading Model Break"
            content:
              - type: gotcha
                problem: "The editor previews Eye / Hair / Anisotropy / SpecularProfile shading fine at SM5, then <strong>hard-errors on cook</strong> at ES3.1 — no authoring-time warning."
                why: "<code>ValidateShadingModelsForFeatureLevel</code> rejects them at translation time, not preview time — so editor viewports pass while cook fails."
                why_ref: "HLSLMaterialTranslator.cpp:2703-2722"
                fix: "<strong>Set Mobile Preview as the editor feature level</strong> while authoring anything that ships to mobile — the shading model guard fires in preview then. Don't rely on SM5 preview to validate mobile materials."
                detect: "Cook fails on a material that rendered fine all session. The error cites an unsupported shading model at ES3.1 feature level."
              - type: gotcha
                problem: "<strong><code>r.Material.PreshaderGapInterval</code></strong> defaults to <m>32</m> — a platform-specific shader-compiler workaround that can silently bloat preshader bytecode on platforms that don't need it."
                why: "The CVar inserts synthetic gaps to work around specific compiler bugs. On platforms where the bug doesn't apply, the gaps are pure overhead — and there's no diagnostic that tells you which platforms need it."
                fix: "Tune per-platform via device profiles if you suspect preshader bloat. Leave at default unless you have a measured problem."
                detect: "Preshader buffer size disproportionate to material complexity. Measure by dumping cooked shader stats per platform and comparing against a baseline with the CVar at <m>0</m>."
              - type: gotcha
                problem: "<strong><code>MaterialExternalCodeRegistry</code> is <code>FName</code>-keyed with last-wins semantics</strong> — two plugins registering external HLSL under the same identifier silently overwrite each other."
                why: "Registration is a flat <code>FName</code> map; the second caller wins with no conflict detection."
                why_ref: "MaterialExternalCodeRegistry.h:198-220"
                fix: "<strong>Namespace your identifiers</strong> — prefix with plugin name or a unique tag. Audit plugins on integration before shipping."
                detect: "A plugin's Custom HLSL path silently stops emitting its registered helpers. Identifier collision is invisible in logs — only reproducible by enabling both plugins simultaneously."
