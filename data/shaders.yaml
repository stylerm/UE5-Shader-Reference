meta:
  title: "Shaders — UE5 Shader Cheatsheet"
  description: "UE5 .usf/.ush shader file reference — compute shaders, include guards, TGSM, feature level matrix, platform guards, and compute optimization."
  active: shaders
  favicon: "⚙️"
  header_tag: "● Shader Files · Compute · TGSM · Platform Guards"
  header_h1: '.usf / .ush <span>Shader</span> Reference'
  header_right: |
    Engine: <strong>UE 5.x</strong>
    Context: <strong>.usf · .ush · Compute Shaders</strong>
    Target: <strong>SM5 / SM6 / ES3.1</strong>
  anchors:
    - {id: usf-rules,     label: USF / USH}
    - {id: compute,       label: Compute}
    - {id: tgsm,          label: TGSM}
    - {id: reference,     label: Reference}
    - {id: sampling,      label: Sampling}
    - {id: orbital-rings, label: Orbital Rings}
    - {divider: "OPTIMIZATION", area: optim}
    - {id: compute-perf,  label: Perf Rules}
    - {divider: "ENGINE INTERNALS", area: engine}
    - {id: dispatch-rules,label: Dispatch}
    - {id: platform-perf, label: Platform}

section_groups:

  # ════════════════════════════════════════════════════════════════════════════
  #  AREA 1 — HLSL REFERENCE
  # ════════════════════════════════════════════════════════════════════════════
  - title: "HLSL Reference"
    icon: "⚗"
    theme: ref
    sections:

      # ── SECTION 1: USF / USH RULES ─────────────────────────────────────────
      - id: usf-rules
        label: ".usf / .ush File Rules"
        priority: high
        cards:

          - color: blue
            title: "File Structure Basics"
            content:
              - type: checklist
                items:
                  - {icon: ok, html: "Use <strong><code>#pragma once</code></strong> or <code>#ifndef</code>/<code>#define</code> include guards"}
                  - {icon: ok, html: "Include <strong><code>/Engine/Public/Platform.ush</code></strong> as the base header"}
                  - {icon: ok, html: "Declare module macro: <strong><code>YOURMODULE_API</code></strong>"}
                  - {icon: ok, html: "Use <strong>virtual shader path</strong> mapping for plugin custom paths"}
                  - {icon: ok, html: "<code>.ush</code> = header (shared types/helpers) · <code>.usf</code> = source (entry points)"}

          - color: orange
            title: "Include Guard Pattern"
            content:
              - type: code
                src: |
                  // Option A: pragma once
                  #pragma once

                  // Option B: traditional guards
                  #ifndef MY_SHADER_COMMON_USH
                  #define MY_SHADER_COMMON_USH

                  #include "/Engine/Public/Platform.ush"
                  #include "/MyPlugin/Private/MyCommon.ush"

                  // Shared types and helpers here
                  struct FMyData {
                    float3 Position;
                    float  Radius;
                    float  Intensity;
                    uint   Flags;
                  };

                  #endif // MY_SHADER_COMMON_USH

          - color: yellow
            title: "Platform &amp; Feature Guards"
            content:
              - type: code
                src: |
                  // Feature level guard
                  #if FEATURE_LEVEL >= FEATURE_LEVEL_SM5
                    // SM5+ only code (compute, UAV, etc.)
                  #endif

                  // SM6-only features
                  #if FEATURE_LEVEL >= FEATURE_LEVEL_SM6
                    // WaveOps, RayQuery, etc.
                  #endif

                  // Platform-specific
                  #if COMPILER_HLSL
                    // HLSL-specific path
                  #elif COMPILER_GLSL || COMPILER_GLSL_ES3_1
                    // Mobile / OpenGL path
                  #endif

                  // Vulkan-specific
                  #if VULKAN_PROFILE
                    // Vulkan workarounds
                  #endif

      # ── SECTION 2: COMPUTE ─────────────────────────────────────────────────
      - id: compute
        label: "Compute Shader Patterns"
        priority: high
        cards:

          - color: green
            title: "Compute Shader Entry Point"
            content:
              - type: code
                src: |
                  #include "/Engine/Public/Platform.ush"
                  #include "/MyPlugin/Private/MyCommon.ush"

                  // Thread group sizing
                  #define NUM_THREADS_X 8
                  #define NUM_THREADS_Y 8

                  // Resource bindings
                  Texture2D<float4>   InputTexture;
                  RWTexture2D<float4> OutputTexture;
                  uint Resolution;

                  [numthreads(NUM_THREADS_X, NUM_THREADS_Y, 1)]
                  void MainCS(
                      uint3 DispatchThreadID : SV_DispatchThreadID,
                      uint3 GroupThreadID   : SV_GroupThreadID,
                      uint3 GroupID         : SV_GroupID)
                  {
                    uint x = DispatchThreadID.x;
                    uint y = DispatchThreadID.y;
                    if (x >= Resolution || y >= Resolution)
                      return;

                    // Read, process, write
                    float4 Val = InputTexture.Load(int3(x, y, 0));
                    OutputTexture[uint2(x, y)] = Val;
                  }

          - color: red
            title: "Compute · Common Mistakes"
            content:
              - type: checklist
                items:
                  - {icon: no,   html: "<strong>Missing bounds check</strong> — always guard: <code>if (x >= Res || y >= Res) return;</code>"}
                  - {icon: no,   html: "<strong>Wrong dispatch size</strong> — dispatch = ceil(Resolution / ThreadGroupSize)"}
                  - {icon: no,   html: "<strong>UAV format mismatch</strong> — RWTexture format must match what C++ creates"}
                  - {icon: no,   html: "<strong>Missing barriers</strong> — always <code>GroupMemoryBarrierWithGroupSync()</code> after TGSM writes"}
                  - {icon: no,   html: "<strong>No <code>ddx</code>/<code>ddy</code></strong> in compute — these are pixel shader only"}
                  - {icon: warn, html: "<strong>Thread group size</strong> — 8×8 is common; 16×16 may exceed shared memory limits"}

          - color: green
            title: "See the dispatch geometry"
            content:
              - type: raw
                html: |
                  <a class="viz-ref" href="visuals.html#threadgroups">
                    <span class="viz-ref-badge">03</span>
                    Threadgroup dispatch grid · drag the slider to hit the 65,535 X-axis remap
                  </a>

          - color: blue
            title: "Resource Types"
            content:
              - type: rowlist
                rows:
                  - {label: "Texture2D<T>",           text: "Read-only texture (SRV)"}
                  - {label: "RWTexture2D<T>",          text: "Read-write texture (UAV)"}
                  - {label: "Buffer<T>",               text: "Read-only typed buffer (SRV)"}
                  - {label: "RWBuffer<T>",             text: "Read-write typed buffer (UAV)"}
                  - {label: "StructuredBuffer<T>",     text: "Read-only structured buffer"}
                  - {label: "RWStructuredBuffer<T>",   text: "Read-write structured buffer"}
                  - {label: "SamplerState",            text: "Texture sampler (bilinear, point, etc.)"}

      # ── SECTION 3: TGSM ────────────────────────────────────────────────────
      - id: tgsm
        label: "Thread Group Shared Memory (TGSM)"
        cards:

          - color: orange
            title: "TGSM Pattern"
            content:
              - type: prose
                text: "Use <code>groupshared</code> memory to share data between threads in a group, reducing global memory reads:"
              - type: code
                src: |
                  // Declare tile cache
                  #define TILE_DIM 10  // 8 + 1-pixel halo each side
                  groupshared float TileCache[TILE_DIM][TILE_DIM];

                  // 1. Load tile from global memory
                  int2 LoadPos = GroupID.xy * 8
                    + GroupThreadID.xy - 1;  // halo offset
                  LoadPos = clamp(LoadPos,
                    int2(0,0), int2(Res-1,Res-1));
                  TileCache[GroupThreadID.y][GroupThreadID.x]
                    = SourceGrid.Load(int3(LoadPos, 0)).r;

                  // 2. Sync all threads
                  GroupMemoryBarrierWithGroupSync();

                  // 3. Read from cache (fast)
                  float Center = TileCache[ly][lx];
                  float Left   = TileCache[ly][lx-1];
                  float Right  = TileCache[ly][lx+1];

          - color: yellow
            title: "TGSM Rules"
            content:
              - type: checklist
                items:
                  - {icon: ok,   html: "<strong><code>groupshared</code></strong> keyword declares shared memory — visible to all threads in group"}
                  - {icon: ok,   html: "<strong>Always sync</strong> with <code>GroupMemoryBarrierWithGroupSync()</code> between write and read"}
                  - {icon: ok,   html: "<strong>Halo loading</strong> — load 1+ pixel border around tile for stencil operations"}
                  - {icon: ok,   html: "<strong>Memory budget</strong> — 32KB per thread group on most GPUs; float[10][10] = 400 bytes"}
                  - {icon: warn, html: "<strong>Bank conflicts</strong> — stride of 32 floats causes conflicts; pad arrays if needed"}
                  - {icon: warn, html: "<strong>Boundary clamping</strong> — halo loads must clamp to grid bounds to avoid OOB reads"}

          - color: orange
            title: "See thread group layout"
            content:
              - type: raw
                html: |
                  <a class="viz-ref" href="visuals.html#threadgroups">
                    <span class="viz-ref-badge">03</span>
                    Threadgroup dispatch grid · see how X×Y groups tile across the work domain
                  </a>

          - color: green
            title: "TGSM Macro Pattern"
            content:
              - type: prose
                text: "Use macros to make TGSM reusable across passes:"
              - type: code
                src: |
                  // Declare macro for float tiles
                  #define DECLARE_TILE_CACHE_FLOAT(Name) \
                    groupshared float Name[TILE_DIM][TILE_DIM]

                  // Load macro with scroll compensation
                  #define LOAD_TILE_SCROLLED(Cache, Tex, ...) \
                    { /* load with offset + clamp */ \
                      GroupMemoryBarrierWithGroupSync(); }

                  // Usage in compute shader
                  DECLARE_TILE_CACHE_FLOAT(SDFCache);
                  LOAD_TILE_SCROLLED(SDFCache, SDFTex, ...);

      # ── SECTION 4: REFERENCE ───────────────────────────────────────────────
      - id: reference
        label: "Quick Reference"
        cards:

          - color: blue
            title: "Feature Level Capabilities"
            content:
              - type: table
                style: feature_matrix
                cols: ["Feature", "ES3.1", "SM5", "SM6"]
                rows:
                  - ["Wave Intrinsics",   "✗", "✗", "✓"]
                  - ["RayQuery / DXR",    "✗", "✗", "✓"]
                  - ["ddx / ddy",         "✗", "✓", "✓"]
                  - ["Bindless Resources","✗", "✗", "✓"]
                  - ["half precision",    "✓", "✓", "✓"]
                  - ["Compute / UAV",     "✗", "✓", "✓"]
                  - ["Geometry Shaders",  "✗", "✓", "✓"]
                  - ["TGSM (groupshared)","✗", "✓", "✓"]
                  - ["Typed SRV Buffers", "✗", "✓", "✓"]

          - color: orange
            title: "UE Type Keywords &amp; Hints"
            content:
              - type: rowlist
                rows:
                  - {label: "MaterialFloat", text: "Adapts precision per platform automatically"}
                  - {label: "half / half3",  text: "16-bit — use on mobile for performance"}
                  - {label: "float / float3",text: "32-bit — default for PC / console"}
                  - {label: "BRANCH",        text: "<code>[branch]</code> hint — forces dynamic branching"}
                  - {label: "FLATTEN",       text: "<code>[flatten]</code> hint — forces both paths evaluated"}
                  - {label: "UNROLL",        text: "<code>[unroll]</code> — unroll loop at compile time"}
                  - {label: "LOOP",          text: "<code>[loop]</code> — force dynamic loop (required for dynamic bounds)"}

          - color: red
            title: "Common Shader Errors"
            content:
              - type: checklist
                items:
                  - {icon: no,   html: "Matrix multiply order — HLSL is <strong>row-vector × matrix</strong>; GLSL is column-major"}
                  - {icon: no,   html: "<strong>Missing include guard</strong> — double-include causes redefinition errors"}
                  - {icon: no,   html: "<strong>Virtual path mismatch</strong> — <code>/MyPlugin/</code> must match <code>AddShaderSourceDirectoryMapping</code>"}
                  - {icon: no,   html: "<strong>Uninitialized groupshared</strong> — TGSM is undefined until written"}
                  - {icon: no,   html: "<strong>Integer division</strong> — <code>1/2 = 0</code>; cast to float explicitly: <code>1.0/2.0</code>"}
                  - {icon: warn, html: "<strong>Scalar broadcast</strong> — <code>float3(1)</code> is valid HLSL but prefer <code>float3(1,1,1)</code> for clarity; some older compiler versions warn"}

      # ── SECTION 5: SAMPLING ────────────────────────────────────────────────
      - id: sampling
        label: "Texture Sampling &amp; SDF Patterns"
        cards:

          - color: blue
            title: "Sampling Methods"
            content:
              - type: code
                src: |
                  // Load (integer coords, no filtering)
                  float4 Val = Tex.Load(int3(x, y, 0));

                  // SampleLevel (UV coords, explicit mip)
                  float4 Val = Tex.SampleLevel(Sampler, UV, 0);

                  // In Material Custom Node:
                  // Texture2DSample(Tex, TexSampler, UV)
                  // Texture2DSampleLevel(Tex, TexSampler, UV, Lod)

                  // External texture (registered via GUID)
                  int32 TexCode = Compiler->ExternalTexture(GUID);
                  int32 Sample  = Compiler->TextureSample(
                    TexCode, UVCode, SAMPLERTYPE_External);

          - color: orange
            title: "Central-Difference Gradient"
            content:
              - type: prose
                text: "Compute gradient from a scalar field (e.g. SDF distance):"
              - type: code
                src: |
                  // Read neighbors
                  float Left  = Grid.Load(int3(max(x-1, 0),      y, 0)).r;
                  float Right = Grid.Load(int3(min(x+1, Res-1),  y, 0)).r;
                  float Up    = Grid.Load(int3(x, max(y-1, 0),      0)).r;
                  float Down  = Grid.Load(int3(x, min(y+1, Res-1),  0)).r;

                  // Central difference
                  float2 Gradient = float2(Right - Left, Down - Up);
                  float  Len = length(Gradient);
                  if (Len > 0.001)
                    Gradient /= Len;  // Normalize

                  // Output: R=dist, GB=direction, A=mag
                  OutputRT[Pixel] = float4(
                    NormDist, Gradient.x, Gradient.y, Len);

          - color: green
            title: "SDF Math Helpers"
            content:
              - type: code
                src: |
                  // Smooth minimum (polynomial blend)
                  float SmoothMin(float a, float b, float k)
                  {
                    if (k <= 0.0) return min(a, b);
                    float h = saturate(0.5 + 0.5 * (b - a) / k);
                    return lerp(b, a, h) - k * h * (1.0 - h);
                  }

                  // Distance to point
                  float PointDist(float2 P, float2 C, float R)
                  {
                    return length(P - C) - R;
                  }

                  // Distance to line segment
                  float SegmentDist(float2 P,
                      float2 A, float2 B, float R)
                  {
                    float2 AB = B - A;
                    float  t  = saturate(dot(P - A, AB) / dot(AB, AB));
                    return length(P - A - AB * t) - R;
                  }


      # ── SECTION: ORBITAL RINGS EXAMPLE ────────────────────────────────────
      - id: orbital-rings
        label: "Example: Orbital Rings"
        grid: "grid grid-2"
        cards:

          - color: blue
            span: grid-full
            title: "Orbital Rings — Procedural SDF Effect"
            content:
              - type: viz-orbit
                number: "EX"
                title: "Orbital Rings — Live WebGL Preview"
                caption: "Three tilted orbits rendered as approximate SDF ellipses with exponential glow. Near arc brighter; far arc dimmer."

          - color: orange
            title: "GLSL — WebGL / ShaderToy"
            content:
              - type: prose
                text: "Fragment shader — paste at shadertoy.com or wrap in any WebGL boilerplate. ShaderToy mainImage signature."
              - type: code
                src: |
                  // ── Orbital Rings ── GLSL / ShaderToy ──────────────────────────────────
                  // iResolution, iTime provided by ShaderToy; supply as uniforms otherwise.
                  // Each ring has its own radius, inclination, precession speed,
                  // and body-dot angular speed.

                  void mainImage(out vec4 fragColor, in vec2 fragCoord) {
                      vec2 uv = (fragCoord - 0.5 * iResolution.xy)
                                / min(iResolution.x, iResolution.y);
                      float T = iTime;

                      // Deep warm background with soft vignette
                      vec3 col = vec3(0.055, 0.028, 0.014) * (1.0 - 0.45 * length(uv));

                      // Warm pedestal glow (bottom pool)
                      col += vec3(0.98, 0.42, 0.08)
                             * exp(-length(uv - vec2(0.0, -0.55)) * 2.8) * 0.9;
                      col += vec3(0.55, 0.18, 0.03)
                             * exp(-length(uv - vec2(0.0, -0.85)) * 1.3) * 0.55;

                      // Central sun / planet
                      float r = length(uv);
                      col += vec3(1.00, 0.95, 0.82) * smoothstep(0.040, 0.024, r);
                      col += vec3(0.90, 0.55, 0.22) * exp(-r * 11.0) * 0.35;
                      col += vec3(0.40, 0.20, 0.06) * exp(-r *  3.5) * 0.28;

                      // Three rings — each with its own tilt, speed, and orbital body
                      for (int i = 0; i < 3; i++) {
                          float rad, incl, oSpeed, bSpeed, phO, phB;
                          if (i == 0)      { rad=0.27; incl=0.38; oSpeed= 0.180;
                                             bSpeed= 1.30; phO= 0.2; phB=0.0; }
                          else if (i == 1) { rad=0.42; incl=0.98; oSpeed=-0.110;
                                             bSpeed= 0.85; phO= 1.8; phB=1.7; }
                          else             { rad=0.58; incl=1.24; oSpeed= 0.065;
                                             bSpeed=-0.55; phO=-0.6; phB=3.2; }

                          float O   = oSpeed * T + phO;   // precession angle (Ω)
                          float thB = bSpeed * T + phB;   // body angle along ring

                          // Rotate pixel into ring-local frame (major axis → X)
                          float co = cos(O), so = sin(O);
                          vec2 p = vec2(uv.x*co + uv.y*so, -uv.x*so + uv.y*co);

                          // Tilted circle → ellipse on screen
                          float ci = cos(incl);
                          vec2 radii = vec2(rad, rad * abs(ci));
                          vec2 pn = p / radii;
                          float d = abs(length(pn) - 1.0) * min(radii.x, radii.y);

                          // Near/far-of-sun shading (using parametric angle's 3D z)
                          float alpha_s = clamp(p.y / max(radii.y, 1e-4), -1.0, 1.0);
                          float depth   = alpha_s * sin(incl);
                          float nearT   = smoothstep(-0.7, 0.7, depth);

                          float core = exp(-d * 420.0);           // sharp line
                          float glow = exp(-d *  55.0) * 0.35;    // soft aura
                          float aura = exp(-d *  16.0) * 0.08;    // wide halo
                          vec3 rc = mix(vec3(0.22, 0.38, 0.72),   // far-side: cool
                                        vec3(1.00, 0.98, 0.92),   // near-side: warm-white
                                        nearT);
                          col += rc * (core + glow + aura) * (0.35 + 0.65 * nearT);

                          // Orbital body (small bright dot on the ring)
                          float bc = cos(thB), bs = sin(thB);
                          vec2  bodyLocal = vec2(rad * bc, rad * bs * ci);
                          float bDepth = bs * sin(incl);
                          float bDist  = length(p - bodyLocal);
                          float front  = smoothstep(-0.05, 0.05, bDepth);
                          float bCore  = smoothstep(0.022, 0.009, bDist);
                          float bGlow  = exp(-bDist * 22.0) * 0.32;
                          vec3  bCol   = mix(vec3(0.45, 0.60, 0.90),
                                             vec3(1.00, 0.95, 0.80), front);
                          col += bCol * (bCore + bGlow) * (0.30 + 0.70 * front);
                      }

                      col = pow(clamp(col, 0.0, 1.0), vec3(0.45));
                      fragColor = vec4(col, 1.0);
                  }

          - color: green
            title: "HLSL — Unreal Custom Material Node"
            content:
              - type: prose
                text: "Paste into a Custom node (return type float3). Wire TexCoord[0] → UV, a Time node → T. Connect output to Emissive Color."
              - type: code
                src: |
                  // ── Orbital Rings ── HLSL / Unreal Custom Node ─────────────────────────
                  // Inputs:
                  //   UV  (float2) ← TexCoord[0]
                  //   T   (float)  ← Time node
                  // Output type: CMOT Float 3 — wire to Emissive Color

                  float2 uv = UV * 2.0 - 1.0;  // assumes square; divide x by aspect if not

                  // Deep warm background + vignette
                  float3 col = float3(0.055, 0.028, 0.014) * (1.0 - 0.45 * length(uv));

                  // Warm pedestal glow (bottom)
                  col += float3(0.98, 0.42, 0.08)
                         * exp(-length(uv - float2(0.0, -0.55)) * 2.8) * 0.9;
                  col += float3(0.55, 0.18, 0.03)
                         * exp(-length(uv - float2(0.0, -0.85)) * 1.3) * 0.55;

                  // Central sun / planet
                  float r = length(uv);
                  col += float3(1.00, 0.95, 0.82) * smoothstep(0.040, 0.024, r);
                  col += float3(0.90, 0.55, 0.22) * exp(-r * 11.0) * 0.35;
                  col += float3(0.40, 0.20, 0.06) * exp(-r *  3.5) * 0.28;

                  // Three rings — each with its own tilt, precession, and body speed
                  for (int i = 0; i < 3; i++) {
                      float rad, incl, oSpeed, bSpeed, phO, phB;
                      if (i == 0)      { rad=0.27; incl=0.38; oSpeed= 0.180;
                                         bSpeed= 1.30; phO= 0.2; phB=0.0; }
                      else if (i == 1) { rad=0.42; incl=0.98; oSpeed=-0.110;
                                         bSpeed= 0.85; phO= 1.8; phB=1.7; }
                      else             { rad=0.58; incl=1.24; oSpeed= 0.065;
                                         bSpeed=-0.55; phO=-0.6; phB=3.2; }

                      float O   = oSpeed * T + phO;
                      float thB = bSpeed * T + phB;

                      // Rotate pixel into ring-local frame
                      float co = cos(O), so = sin(O);
                      float2 p = float2(uv.x*co + uv.y*so, -uv.x*so + uv.y*co);

                      // Tilted circle → ellipse
                      float  ci    = cos(incl);
                      float2 radii = float2(rad, rad * abs(ci));
                      float2 pn    = p / radii;
                      float  d     = abs(length(pn) - 1.0) * min(radii.x, radii.y);

                      // Near/far shading via parametric angle → 3D depth
                      float alpha_s = clamp(p.y / max(radii.y, 1e-4), -1.0, 1.0);
                      float depth   = alpha_s * sin(incl);
                      float nearT   = smoothstep(-0.7, 0.7, depth);

                      float core = exp(-d * 420.0);
                      float glow = exp(-d *  55.0) * 0.35;
                      float aura = exp(-d *  16.0) * 0.08;
                      float3 rc  = lerp(float3(0.22, 0.38, 0.72),
                                        float3(1.00, 0.98, 0.92), nearT);
                      col += rc * (core + glow + aura) * (0.35 + 0.65 * nearT);

                      // Orbital body dot
                      float  bc = cos(thB), bs = sin(thB);
                      float2 bodyLocal = float2(rad * bc, rad * bs * ci);
                      float  bDepth    = bs * sin(incl);
                      float  bDist     = length(p - bodyLocal);
                      float  front     = smoothstep(-0.05, 0.05, bDepth);
                      float  bCore     = smoothstep(0.022, 0.009, bDist);
                      float  bGlow     = exp(-bDist * 22.0) * 0.32;
                      float3 bCol      = lerp(float3(0.45, 0.60, 0.90),
                                              float3(1.00, 0.95, 0.80), front);
                      col += bCol * (bCore + bGlow) * (0.30 + 0.70 * front);
                  }

                  return pow(clamp(col, 0.0, 1.0), 0.45);
              - type: raw
                html: |
                  <figure class="example-img">
                    <img src="Resources/orbital-rings-ue5.png"
                         alt="Orbital rings effect running in the Unreal Engine 5 material editor">
                    <figcaption>The same shader pasted into an Unreal Custom material node — wired to Emissive Color.</figcaption>
                  </figure>

          - color: yellow
            span: grid-full
            title: "GLSL → HLSL Translation Notes"
            content:
              - type: checklist
                items:
                  - {icon: arrow, html: "<code>vec2 / vec3 / vec4</code> &rarr; <code>float2 / float3 / float4</code> — identical layout, different keyword"}
                  - {icon: arrow, html: "<code>mix(a, b, t)</code> &rarr; <code>lerp(a, b, t)</code> — same argument order"}
                  - {icon: arrow, html: "<code>fract(x)</code> &rarr; <code>frac(x)</code>"}
                  - {icon: arrow, html: "<code>mod(x, y)</code> &rarr; <code>fmod(x, y)</code>"}
                  - {icon: arrow, html: "<code>iTime</code> / <code>iResolution</code> removed — use a <strong>Time</strong> node input; UV is already 0&ndash;1 in Unreal"}
                  - {icon: arrow, html: "<code>void mainImage(out vec4 fragColor, ...)</code> &rarr; <code>return float3</code>; set Custom node output type to <strong>CMOT Float3</strong>"}
                  - {icon: arrow, html: "<code>float(i)</code> &rarr; <code>(float)i</code> — C-style cast; both compile fine in SM5"}
                  - {icon: warn, html: "UV aspect ratio: GLSL divides by <code>min(res.x, res.y)</code> to keep orbits circular. The HLSL version uses <code>UV*2-1</code> which is square-only — divide <code>uv.x</code> by the aspect ratio for non-square plane meshes"}
                  - {icon: warn, html: "Loops in Custom nodes require <strong>SM5+</strong> — not available on ES3.1 (mobile). For mobile, unroll manually or use a Material Function per ring"}

  # ════════════════════════════════════════════════════════════════════════════
  #  AREA 2 — IN-ENGINE OPTIMIZATION
  # ════════════════════════════════════════════════════════════════════════════
  - title: "In-Engine Optimization"
    icon: "⚡"
    theme: optim
    sections:

      # ── SECTION 6: COMPUTE PERFORMANCE ────────────────────────────────────
      - id: compute-perf
        label: "Compute Shader Performance Rules"
        cards:

          - color: green
            title: "Occupancy &amp; ALU"
            content:
              - type: checklist
                items:
                  - {icon: ok,   html: "<strong>Target 75%+ GPU occupancy</strong> — reduce register pressure by reusing temporaries and simplifying arithmetic chains"}
                  - {icon: ok,   html: "<strong>Thread group size 8×8 (64 threads)</strong> — safe on all targets including mobile ES3.1 and SM5 desktop"}
                  - {icon: warn, html: "<strong>16×16 (256 threads)</strong> — risks exceeding 32KB shared memory limit on some mobile/integrated GPUs; test explicitly"}
                  - {icon: ok,   html: "<strong>Minimize register use</strong> — declare variables inside loop bodies where possible; fewer live registers = higher occupancy"}
                  - {icon: warn, html: "<strong>Avoid branch divergence</strong> — if half the threads take each side of an <code>if</code>, you pay 2× the cost; restructure with <code>lerp</code> / <code>select</code>"}

          - color: orange
            title: "Memory Bandwidth"
            content:
              - type: checklist
                items:
                  - {icon: ok,   html: "<strong>TGSM is the primary bandwidth tool</strong> — load a tile of data once into groupshared, read it many times within the group"}
                  - {icon: ok,   html: "<strong>Coalesce global reads/writes</strong> — adjacent threads should access adjacent memory addresses (stride-1 access patterns)"}
                  - {icon: no,   html: "<strong>Scattered UAV writes are slow</strong> — random-address writes break GPU memory coalescing; prefer sorted or sequential indices"}
                  - {icon: no,   html: "<strong>Never read/write the same UAV in one dispatch</strong> — use ping-pong buffers (read A, write B; next frame swap)"}
                  - {icon: ok,   html: "<strong>Minimize RW texture round-trips</strong> — avoid dispatches that write a texture and immediately read it in the same pass"}

          - color: blue
            span: grid-full
            title: "Thread Group Size Cheat Sheet"
            content:
              - type: table
                style: default
                cols: ["Size", "Threads", "TGSM Budget", "Recommended For"]
                rows:
                  - ["`8×8×1`",   "64",  "~1.6KB float",  "Safe on all targets — textures, SDF, general 2D"]
                  - ["`8×8×1`",   "64",  "~3.2KB float2", "Gradient / neighbor reads with halo"]
                  - ["`16×16×1`", "256", "~6.4KB float",  "PC/SM5+ only — larger tiles, reduce dispatch overhead"]
                  - ["`64×1×1`",  "64",  "—",             "1D passes: histograms, prefix sums, buffer ops"]
                  - ["`32×1×1`",  "32",  "—",             "Mobile-safe 1D — matches warp/wavefront size"]

  # ════════════════════════════════════════════════════════════════════════════
  #  AREA 3 — ENGINE INTERNALS (Dispatch / Resource / Platform Reference)
  # ════════════════════════════════════════════════════════════════════════════
  - title: "Engine Internals"
    icon: "🔬"
    theme: engine
    sections:

      # ── SECTION 7: DISPATCH & RESOURCE RULES ──────────────────────────────
      - id: dispatch-rules
        label: "Dispatch &amp; Resource Rules"
        grid: "grid grid-2"
        cards:

          - color: orange
            span: grid-full
            title: "Dispatch Setup Rules"
            content:
              - type: rowlist
                layout: stacked
                rows:
                  - {label: "Dispatch size", text: "<code>ceil(Resolution / ThreadGroupSize)</code> — never dispatch without a bounds check inside the shader; out-of-bounds threads must return early"}
                  - {label: "Ping-pong buffers", text: "Never read and write the same UAV in a single dispatch — use two separate buffers (A and B) and swap which one is read vs written each frame"}
                  - {label: "Async compute", text: "Overlap GPU work (e.g. shadow depth pass + simulation) using the async compute queue — reduces overall frame latency without extra CPU cost"}
                  - {label: "RDG resources", text: "Use <code>FRDGBuilder</code> to declare textures and buffers — the Render Dependency Graph handles barrier insertion and lifetime automatically"}
                  - {label: "Indirect dispatch", text: "Use when dispatch dimensions are determined on the GPU (e.g. particle counts) — avoids an expensive CPU readback stall"}

          - color: yellow
            title: "RDG (Render Dependency Graph) Patterns"
            content:
              - type: prose
                text: "UE5 native render pass system — always prefer RDG over manual render commands:"
              - type: code
                src: |
                  // Declare RDG texture
                  FRDGTextureRef OutputTex = GraphBuilder.CreateTexture(
                    FRDGTextureDesc::Create2D(
                      FIntPoint(Width, Height),
                      PF_FloatRGBA,
                      FClearValueBinding::Black,
                      TexCreate_UAV | TexCreate_ShaderResource),
                    TEXT("MyOutputTexture"));

                  // Pass parameters
                  FMyShaderParameters* PassParams =
                    GraphBuilder.AllocParameters<FMyShaderParameters>();
                  PassParams->OutputTexture =
                    GraphBuilder.CreateUAV(OutputTex);

                  // Add compute pass
                  GraphBuilder.AddPass(
                    RDG_EVENT_NAME("MyComputePass"),
                    PassParams,
                    ERDGPassFlags::Compute,
                    [PassParams, Width, Height](FRHIComputeCommandList& RHICmdList)
                    {
                      // Dispatch here
                    });

          - color: blue
            title: "Profiling Compute Shaders"
            content:
              - type: rowlist
                layout: stacked
                rows:
                  - {label: "stat gpu", text: "Console command — shows GPU time per pass; look for your pass name from <code>RDG_EVENT_NAME</code>"}
                  - {label: "RenderDoc", text: "Frame capture tool — inspect every dispatch, view UAV contents, check thread occupancy"}
                  - {label: "GPU Insights (5.4+)", text: "Built-in Unreal Insights GPU view — shows compute pass durations on a timeline"}
                  - {label: "r.RDG.Debug 1", text: "Enables RDG validation — catches missing barriers, resource aliasing, and UAV hazards"}
                  - {label: "profilegpu", text: "Console command — dumps per-pass GPU timings to the output log"}

      # ── SECTION 8: PLATFORM PERFORMANCE ───────────────────────────────────
      - id: platform-perf
        label: "Platform-Specific Performance Notes"
        cards:

          - color: blue
            title: "SM5 / SM6 Desktop"
            content:
              - type: checklist
                items:
                  - {icon: ok,   tags: [SM6], html: "<strong>Wave intrinsics (SM6)</strong> — <code>WaveActiveSum</code>, <code>WaveActiveBallot</code> for prefix sums and culling; no atomic lock needed"}
                  - {icon: ok,   tags: [SM6], html: "<strong>Bindless resources (SM6)</strong> — large descriptor heaps; avoid per-draw binding changes on DX12 / Vulkan"}
                  - {icon: ok,   tags: [Desktop], html: "<strong><m>16×16</m> thread groups safe</strong> — desktop GPUs have ≥<m>32KB</m> shared memory and high register files"}
                  - {icon: warn, tags: [SM6], html: "<strong>RayQuery (SM6)</strong> — only available in compute/pixel shaders with DXR-enabled hardware and feature level SM6"}

          - color: orange
            title: "Mobile (ES3.1)"
            content:
              - type: checklist
                items:
                  - {icon: ok,   tags: [Mobile, ES3.1], html: "<strong>Use <code>half</code> precision</strong> — mobile GPUs process 16-bit at <m>2×</m> the throughput of 32-bit"}
                  - {icon: no,   tags: [Mobile, ES3.1], html: "<strong>No compute / UAV</strong> on ES3.1 — compute shaders require at minimum Feature Level SM5; mobile = vertex + pixel only"}
                  - {icon: no,   tags: [Mobile, ES3.1], html: "<strong>No <code>ddx</code> / <code>ddy</code></strong> — derivatives are unavailable in ES3.1 pixel shaders too; approximate with explicit UV derivatives"}
                  - {icon: warn, tags: [Mobile, ES3.1], html: "<strong><m>16</m> sampler cap</strong> — total texture samples (all stages) must stay under <m>16</m> on most mobile GPUs"}
                  - {icon: warn, tags: [Mobile], html: "<strong>Test with Mobile Preview</strong> — Editor viewport mode that simulates ES3.1 constraints without a device"}

          - color: yellow
            title: "Vulkan / Metal Specifics"
            content:
              - type: checklist
                items:
                  - {icon: ok,   tags: [Vulkan], html: "<strong><code>VULKAN_PROFILE</code> guard</strong> — use for Vulkan-specific workarounds (different NDC, subpass load, etc.)"}
                  - {icon: warn, tags: [Vulkan], html: "<strong>Explicit memory barriers on Vulkan</strong> — RDG handles these automatically; avoid raw <code>RHICmdList</code> transitions"}
                  - {icon: warn, tags: [Metal], html: "<strong>Metal tile shaders</strong> — available on Apple Silicon; no direct HLSL equivalent; use UE5 RHI abstraction"}
                  - {icon: ok,   tags: [Vulkan], html: "<strong>Vulkan subpass inputs</strong> — allows reading previous render pass output without a full texture read; great for deferred passes"}
