<script>
// ── SUBPAGE TAB TOGGLE ──
// Pages that ship 2+ themed <section class="subpage"> panels are driven by the
// tab bar at the top. Each tab has a data-subpage="<theme>" attribute; this
// script toggles body.subpage-<theme>, which CSS uses to show the matching
// panel and filter the sidenav to anchors belonging to that subpage.
// State persists in localStorage, and deep-links (#section-id) auto-switch to
// whichever subpage contains the target section.
(function() {
  var tabs = document.querySelectorAll('.subpage-tab');
  if (!tabs.length) return;
  var STORAGE_KEY = 'ue5-subpage';

  // Discover the set of valid subpage names from the rendered tabs — no
  // hard-coded 'ref'/'optim' list, so new subpages (e.g. 'engine') just work.
  var names = [];
  tabs.forEach(function(t) {
    var n = t.getAttribute('data-subpage');
    if (n && names.indexOf(n) === -1) names.push(n);
  });
  var defaultName = names[0] || 'ref';
  var bodyClasses = names.map(function(n) { return 'subpage-' + n; });
  var current = null;

  function setSubpage(name, scroll) {
    if (names.indexOf(name) === -1) name = defaultName;
    if (name === current) return;
    current = name;
    document.body.classList.remove.apply(document.body.classList, bodyClasses);
    document.body.classList.add('subpage-' + name);
    tabs.forEach(function(t) {
      var active = t.getAttribute('data-subpage') === name;
      t.classList.toggle('active', active);
      t.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    try { localStorage.setItem(STORAGE_KEY, name); } catch (e) {}
    if (scroll) window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }

  // Tab clicks
  tabs.forEach(function(t) {
    t.addEventListener('click', function() {
      setSubpage(t.getAttribute('data-subpage'), true);
    });
  });

  // Anchor clicks — auto-switch subpage if target lives in a different panel
  document.querySelectorAll('a[href^="#"]').forEach(function(link) {
    link.addEventListener('click', function() {
      var id = link.getAttribute('href').slice(1);
      if (!id) return;
      var target = document.getElementById(id);
      if (!target) return;
      var sub = target.closest('.subpage');
      if (sub) {
        var name = sub.getAttribute('data-subpage');
        if (name !== current) setSubpage(name, false);
      }
    });
  });

  // Initial state: URL hash wins > localStorage > first tab (default)
  var initial = defaultName;
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored && names.indexOf(stored) !== -1) initial = stored;
  } catch (e) {}
  var hash = window.location.hash;
  if (hash && hash.length > 1) {
    var target = document.getElementById(hash.slice(1));
    if (target) {
      var sub = target.closest('.subpage');
      if (sub) initial = sub.getAttribute('data-subpage');
    }
  }
  setSubpage(initial, false);
})();

// ── SECTION TAG FILTER ──
// Per-section filter strips (rendered by build.py when a section has any
// tagged checklist items) toggle `.tag-dimmed` on items whose `data-tags`
// attribute doesn't include the selected tag. "All" clears the filter.
// Each strip has independent state; clicking a tag within one strip only
// affects items inside that strip's section.
(function() {
  document.querySelectorAll('.filter-strip').forEach(function(strip) {
    // The scope is everything between this filter-strip and the next section-label
    var section = strip.nextElementSibling;
    if (!section) return;
    var buttons = strip.querySelectorAll('.filter-tag');

    function applyTag(tag) {
      // Dim items whose data-tags don't include the selected tag. Empty tag =
      // show all.
      section.querySelectorAll('.check-item').forEach(function(item) {
        if (!tag) {
          item.classList.remove('tag-dimmed');
          return;
        }
        var tags = (item.getAttribute('data-tags') || '').split(/\s+/);
        item.classList.toggle('tag-dimmed', tags.indexOf(tag) === -1);
      });
      buttons.forEach(function(b) {
        var active = b.getAttribute('data-tag') === tag;
        b.classList.toggle('active', active);
        b.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    buttons.forEach(function(b) {
      b.addEventListener('click', function() {
        applyTag(b.getAttribute('data-tag'));
      });
    });
  });
})();

// ── SEARCH / FILTER ──
(function() {
  var input = document.getElementById('search-input');
  if (!input) return;
  var cards = document.querySelectorAll('.card');
  var labels = document.querySelectorAll('.section-label');
  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    if (!q) {
      cards.forEach(function(c) { c.classList.remove('dimmed'); });
      labels.forEach(function(l) { l.classList.remove('dimmed'); });
      return;
    }
    cards.forEach(function(card) {
      card.classList.toggle('dimmed', card.textContent.toLowerCase().indexOf(q) === -1);
    });
    labels.forEach(function(label) {
      var section = label.nextElementSibling;
      if (!section) { label.classList.add('dimmed'); return; }
      var anyVisible = false;
      var el = section;
      while (el && !el.classList.contains('section-label') && !el.classList.contains('footer')) {
        if (el.classList.contains('card') && !el.classList.contains('dimmed')) anyVisible = true;
        if (el.classList.contains('grid')) {
          el.querySelectorAll('.card').forEach(function(c) {
            if (!c.classList.contains('dimmed')) anyVisible = true;
          });
        }
        el = el.nextElementSibling;
      }
      label.classList.toggle('dimmed', !anyVisible);
    });
  });
})();

// ── COPY BUTTONS — prompt boxes AND all code blocks ──
(function() {
  document.querySelectorAll('.prompt-box, pre').forEach(function(box) {
    if (!box.closest('.card') && !box.parentElement) return;
    if (getComputedStyle(box).position === 'static') box.style.position = 'relative';
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '[COPY]';
    btn.addEventListener('click', function() {
      var text = box.textContent.replace(/\[COP(?:Y|IED)\]/g, '').trim();
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '[COPIED]';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = '[COPY]'; btn.classList.remove('copied'); }, 1500);
      });
    });
    box.appendChild(btn);
  });
})();

// ── MOBILE — hamburger menu ──
(function() {
  var toggle  = document.getElementById('menu-toggle');
  var sidenav = document.getElementById('sidenav');
  var overlay = document.getElementById('nav-overlay');
  if (!toggle || !sidenav || !overlay) return;

  function openNav() {
    sidenav.classList.add('open');
    overlay.classList.add('open');
    toggle.setAttribute('aria-expanded', 'true');
    toggle.textContent = '\u2715'; // ×
    document.body.style.overflow = 'hidden';
  }
  function closeNav() {
    sidenav.classList.remove('open');
    overlay.classList.remove('open');
    toggle.setAttribute('aria-expanded', 'false');
    toggle.innerHTML = '&#9776;'; // ☰
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', function() {
    sidenav.classList.contains('open') ? closeNav() : openNav();
  });
  overlay.addEventListener('click', closeNav);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeNav();
  });

  // Close nav when a section link is tapped on mobile
  sidenav.querySelectorAll('a[href^="#"]').forEach(function(link) {
    link.addEventListener('click', function() {
      if (window.innerWidth <= 600) closeNav();
    });
  });
})();

// ── SIDENAV — highlight active section on scroll ──
(function() {
  var anchors  = Array.from(document.querySelectorAll('.section-label[id]'));
  var navLinks = Array.from(document.querySelectorAll('.sidenav-links a[href^="#"]'));
  if (!anchors.length || !navLinks.length) return;
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var id = entry.target.id;
        navLinks.forEach(function(link) {
          link.classList.toggle('active-section',
            link.getAttribute('href') === '#' + id);
        });
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px' });
  anchors.forEach(function(el) { observer.observe(el); });
})();

// ── TABLE SCROLL WRAPPER ── (inject .table-scroll wrapper around tables in cards)
(function() {
  document.querySelectorAll('.card table').forEach(function(tbl) {
    if (tbl.parentElement.classList.contains('table-scroll')) return;
    var wrap = document.createElement('div');
    wrap.className = 'table-scroll';
    tbl.parentNode.insertBefore(wrap, tbl);
    wrap.appendChild(tbl);
  });
})();

// ── VIZ-TBN — coordinate-space basis visualizer ──
// Hydrates any [data-viz-tbn] element. Each state is a target 3x3 rotation
// matrix applied to three canonical basis vectors (T,B,N); we lerp between
// matrices element-wise and re-project every frame. Pure ortho/iso
// projection — no WebGL. The math is intentionally readable.
(function() {
  var roots = document.querySelectorAll('[data-viz-tbn]');
  if (!roots.length) return;

  // Orthographic iso projection (3D → 2D SVG coords). Y flipped for SVG.
  var CX = 280, CY = 180, SCALE = 72;
  var ISO_COS = Math.cos(0.52), ISO_SIN = Math.sin(0.52); // ~30°
  function project(v) {
    return {
      x: CX + (v[0] - v[2]) * ISO_COS * SCALE,
      y: CY - (v[1] * SCALE - (v[0] + v[2]) * ISO_SIN * SCALE * 0.5)
    };
  }

  function mulMV(m, v) {
    return [
      m[0]*v[0] + m[1]*v[1] + m[2]*v[2],
      m[3]*v[0] + m[4]*v[1] + m[5]*v[2],
      m[6]*v[0] + m[7]*v[1] + m[8]*v[2]
    ];
  }
  function lerpM(a, b, t) {
    var out = new Array(9);
    for (var i = 0; i < 9; i++) out[i] = a[i] + (b[i] - a[i]) * t;
    return out;
  }
  function rotY(th) {
    var c = Math.cos(th), s = Math.sin(th);
    return [c,0,s, 0,1,0, -s,0,c];
  }
  function rotX(th) {
    var c = Math.cos(th), s = Math.sin(th);
    return [1,0,0, 0,c,-s, 0,s,c];
  }
  function mulM(a, b) {
    var o = new Array(9);
    for (var r = 0; r < 3; r++) for (var col = 0; col < 3; col++) {
      o[r*3+col] = a[r*3]*b[col] + a[r*3+1]*b[3+col] + a[r*3+2]*b[6+col];
    }
    return o;
  }

  var IDENT = [1,0,0, 0,1,0, 0,0,1];
  var STATES = [
    { name: 'TANGENT', meta: 'BASIS T↦B↦N · HANDED RIGHT',   M: IDENT },
    { name: 'OBJECT',  meta: 'MESH ROT · T B N ROTATE TOGETHER', M: mulM(rotY(0.44), rotX(-0.22)) },
    { name: 'WORLD',   meta: 'LOCALTOWORLD APPLIED · NON-UNIFORM SCALE WARPS TBN', M: mulM(rotY(1.0), rotX(-0.35)) },
    { name: 'VIEW',    meta: 'CAMERA BASIS · Z SIGN = HANDEDNESS', M: mulM(rotY(-0.6), rotX(-0.15)) },
    { name: 'UV',      meta: 'SHADERTOY Y-UP · UE UVS Y-DOWN',     M: IDENT } // UV handled specially
  ];

  function hydrate(root) {
    var vecEls = {
      t: root.querySelector('[data-vec="t"]'),
      b: root.querySelector('[data-vec="b"]'),
      n: root.querySelector('[data-vec="n"]')
    };
    var lblEls = {
      t: root.querySelector('[data-lbl="t"]'),
      b: root.querySelector('[data-lbl="b"]'),
      n: root.querySelector('[data-lbl="n"]')
    };
    var chipState = root.querySelector('[data-chip-state]');
    var chipMeta  = root.querySelector('[data-chip-meta]');
    var patchG    = root.querySelector('[data-viz-patch]');
    var gridG     = root.querySelector('[data-viz-grid]');
    var vectorsG  = root.querySelector('[data-viz-vectors]');
    var uvG       = root.querySelector('[data-viz-uv]');
    var uvTop     = root.querySelector('[data-uv-top]');
    var uvBot     = root.querySelector('[data-uv-bot]');
    var uvLabel   = root.querySelector('[data-uv-label]');
    var playBtn   = root.querySelector('[data-play]');
    var handedBtn = root.querySelector('[data-toggle-handed]');
    var yflipBtn  = root.querySelector('[data-toggle-yflip]');
    var stepBtns  = root.querySelectorAll('[data-step]');

    // Static grid lines (XZ plane)
    (function() {
      var out = '';
      for (var i = -2; i <= 2; i++) {
        var a = project([i*0.5, 0, -1]);
        var c = project([i*0.5, 0,  1]);
        var d = project([-1, 0, i*0.5]);
        var e = project([ 1, 0, i*0.5]);
        out += '<line x1="'+a.x+'" y1="'+a.y+'" x2="'+c.x+'" y2="'+c.y+'" stroke="#1e2530" stroke-width="1"/>';
        out += '<line x1="'+d.x+'" y1="'+d.y+'" x2="'+e.x+'" y2="'+e.y+'" stroke="#1e2530" stroke-width="1"/>';
      }
      gridG.innerHTML = out;
    })();

    var state = {
      target: 0,
      prevM: IDENT.slice(),
      curM:  IDENT.slice(),
      nextM: IDENT.slice(),
      anim: 0,   // 0..1
      animDur: 600,
      animStart: 0,
      playing: false,
      handed: 1,    // +1 right-handed, -1 left-handed (flip Z)
      yflip: 0,     // 0 or 1 (only matters in UV state)
      raf: 0
    };

    function applyHanded(M) {
      if (state.handed > 0) return M;
      var m = M.slice();
      m[2] = -m[2]; m[5] = -m[5]; m[8] = -m[8]; // flip Z column
      return m;
    }

    function drawPatch(M) {
      // Surface patch — unit square in tangent plane (T/B), centered at origin
      var corners = [[-0.5,0,-0.5],[0.5,0,-0.5],[0.5,0,0.5],[-0.5,0,0.5]];
      var pts = corners.map(function(c) {
        var w = mulMV(M, c);
        var p = project(w);
        return p.x + ',' + p.y;
      });
      patchG.innerHTML =
        '<polygon points="' + pts.join(' ') + '" fill="rgba(0,229,255,0.06)" stroke="#2a3441" stroke-width="1"/>';
    }

    function drawVectors(M) {
      var origin = project([0, 0, 0]);
      var basis = [[1,0,0],[0,0,1],[0,1,0]]; // T along x, B along z (in-plane), N along y
      var keys = ['t','b','n'];
      keys.forEach(function(k, i) {
        var v = mulMV(M, basis[i]);
        var p = project([v[0]*0.9, v[1]*0.9, v[2]*0.9]);
        vecEls[k].setAttribute('x1', origin.x);
        vecEls[k].setAttribute('y1', origin.y);
        vecEls[k].setAttribute('x2', p.x);
        vecEls[k].setAttribute('y2', p.y);
        lblEls[k].setAttribute('x', p.x + (p.x > origin.x ? 8 : -14));
        lblEls[k].setAttribute('y', p.y + (p.y > origin.y ? 14 : -6));
      });
    }

    function render() {
      // UV state: swap scene for 2D grid
      var isUV = (state.target === 4);
      if (isUV) {
        vectorsG.style.display = 'none';
        patchG.style.display = 'none';
        gridG.style.display = 'none';
        uvG.style.display = '';
        uvTop.textContent = state.yflip ? '0' : '1';
        uvBot.textContent = state.yflip ? '1' : '0';
        uvLabel.textContent = state.yflip ? 'UE UV (Y-down)' : 'Shadertoy (Y-up)';
      } else {
        vectorsG.style.display = '';
        patchG.style.display = '';
        gridG.style.display = '';
        uvG.style.display = 'none';
        drawPatch(state.curM);
        drawVectors(state.curM);
      }
    }

    function setTarget(i, fromClick) {
      if (i === state.target && !fromClick) return;
      state.target = i;
      var targetM = applyHanded(STATES[i].M);
      state.prevM = state.curM.slice();
      state.nextM = targetM;
      state.animStart = performance.now();
      state.anim = 0;
      // Update chips + buttons
      chipState.textContent = STATES[i].name;
      var meta = STATES[i].meta;
      if (i !== 4) meta = meta.replace('HANDED RIGHT', state.handed > 0 ? 'HANDED RIGHT' : 'HANDED LEFT');
      chipMeta.textContent = meta;
      stepBtns.forEach(function(b) {
        b.classList.toggle('active', +b.dataset.step === i);
      });
      startAnim();
    }

    function tick(now) {
      var t = Math.min(1, (now - state.animStart) / state.animDur);
      // ease-in-out
      var e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
      state.curM = lerpM(state.prevM, state.nextM, e);
      render();
      if (t < 1) {
        state.raf = requestAnimationFrame(tick);
      } else {
        state.curM = state.nextM.slice();
        render();
        state.raf = 0;
        if (state.playing) {
          setTimeout(function() {
            if (!state.playing) return;
            setTarget((state.target + 1) % STATES.length, true);
          }, 700);
        }
      }
    }
    function startAnim() {
      if (state.raf) cancelAnimationFrame(state.raf);
      state.animStart = performance.now();
      state.raf = requestAnimationFrame(tick);
    }

    stepBtns.forEach(function(b) {
      b.addEventListener('click', function() {
        state.playing = false;
        playBtn.textContent = '▶ PLAY';
        setTarget(+b.dataset.step, true);
      });
    });
    playBtn.addEventListener('click', function() {
      state.playing = !state.playing;
      playBtn.textContent = state.playing ? '❚❚ PAUSE' : '▶ PLAY';
      if (state.playing && !state.raf) {
        setTarget((state.target + 1) % STATES.length, true);
      }
    });
    handedBtn.addEventListener('click', function() {
      state.handed = -state.handed;
      handedBtn.textContent = 'HANDED: ' + (state.handed > 0 ? 'RIGHT' : 'LEFT');
      setTarget(state.target, true);
    });
    yflipBtn.addEventListener('click', function() {
      state.yflip = 1 - state.yflip;
      yflipBtn.textContent = 'Y-FLIP: ' + (state.yflip ? 'ON' : 'OFF');
      if (state.target === 4) render();
    });

    // Initial paint
    state.curM = STATES[0].M.slice();
    render();
  }

  roots.forEach(hydrate);
})();

// ── VIZ-CANVAS-COMMON — shared canvas fit helper ──
// Used by all canvas-based fundamentals visualizers below. Reads
// canvas.offsetWidth/Height (set by CSS aspect-ratio) and syncs the
// backing pixel buffer to device pixel ratio. Returns dpr.
window._vizFitCanvas = window._vizFitCanvas || function(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.offsetWidth;
  var h = canvas.offsetHeight;
  if (!h) h = Math.round(w * 8 / 21);
  var pw = Math.round(w * dpr), ph = Math.round(h * dpr);
  if (canvas.width !== pw || canvas.height !== ph) {
    canvas.width = pw; canvas.height = ph;
  }
  return dpr;
};

// ── VIZ-DEPTH — depth fade / soft particles ──
// Particle quad (glowing blob) bobs up and down, crossing a horizontal scene
// geometry wall. HARD mode: pixel abruptly clips at intersection. SOFT mode:
// alpha fades as the particle approaches the wall, driven by the FADE slider.
(function() {
  var roots = document.querySelectorAll('[data-viz-depth]');
  if (!roots.length) return;
  /* Depth fade works PER PIXEL: each fragment of the particle quad samples
     SceneDepth at its own screen position and fades based on the difference
     between scene depth and particle depth at THAT pixel.
     We simulate this with an offscreen canvas + destination-out masking:
     the mask gradient erases only the pixels close to the floor, leaving
     the rest of the blob fully opaque. */
  function hydrate(root) {
    var canvas     = root.querySelector('[data-canvas]');
    var modeBtns   = root.querySelectorAll('[data-mode]');
    var fadeSlider = root.querySelector('[data-fade-dist]');
    var fadeValEl  = root.querySelector('[data-fade-val]');
    var chipMode   = root.querySelector('[data-chip-mode]');
    var chipDiff   = root.querySelector('[data-chip-diff]');
    var chipAlpha  = root.querySelector('[data-chip-alpha]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    /* offscreen canvas — particle is drawn here so destination-out masking
       only affects the blob pixels, never the already-composited background */
    var off = document.createElement('canvas');
    var offCtx = off.getContext('2d');
    var mode = 'hard';
    modeBtns.forEach(function(b) {
      b.addEventListener('click', function() {
        mode = b.getAttribute('data-mode');
        modeBtns.forEach(function(x) { x.classList.remove('active'); });
        b.classList.add('active');
      });
    });
    if (fadeSlider) fadeSlider.addEventListener('input', function() {
      if (fadeValEl) fadeValEl.textContent = fadeSlider.value;
    });
    function smoothstep(e0, e1, x) {
      var t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
      return t * t * (3 - 2 * t);
    }
    function frame(ts) {
      requestAnimationFrame(frame);
      var t  = ts * 0.001;
      var dpr = _vizFitCanvas(canvas);
      var W = canvas.width, H = canvas.height;
      /* sync offscreen size */
      if (off.width !== W || off.height !== H) { off.width = W; off.height = H; }
      ctx.clearRect(0, 0, W, H);

      /* ── background ── */
      var bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#060910'); bg.addColorStop(1, '#0e1825');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      /* ── subtle grid ── */
      ctx.strokeStyle = 'rgba(30,37,48,0.55)'; ctx.lineWidth = dpr;
      for (var gx = 0; gx < W; gx += 48*dpr) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
      for (var gy = 0; gy < H; gy += 36*dpr) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }

      /* ── floor / scene geometry ── */
      var wallY = H * 0.60;
      var floorG = ctx.createLinearGradient(0, wallY, 0, H);
      floorG.addColorStop(0,   'rgba(0,229,255,0.10)');
      floorG.addColorStop(0.18,'rgba(8,14,26,0.97)');
      floorG.addColorStop(1,   'rgba(5,9,18,1)');
      ctx.fillStyle = floorG; ctx.fillRect(0, wallY, W, H - wallY);
      ctx.strokeStyle = 'rgba(0,229,255,0.70)'; ctx.lineWidth = 1.5*dpr;
      ctx.beginPath(); ctx.moveTo(0, wallY); ctx.lineTo(W, wallY); ctx.stroke();
      ctx.fillStyle = 'rgba(0,229,255,0.50)';
      ctx.font = Math.round(9*dpr) + 'px JetBrains Mono, monospace';
      ctx.fillText('SCENE DEPTH  (floor)', Math.round(10*dpr), Math.round(wallY + 14*dpr));

      /* ── particle — animates slowly through the floor ── */
      var radius = H * 0.20;
      var cx = W * 0.50;
      /* centre travels: fully above → halfway through floor → back */
      var cy = wallY - radius * 0.20 + Math.sin(t * 0.55) * radius * 0.80;

      /* fade distance in pixels: slider 1-100 maps to 0.1-1.2 × radius */
      var fadePx = (parseFloat(fadeSlider ? fadeSlider.value : 30) / 100) * radius * 1.2 + radius * 0.1;

      /* ── draw particle to offscreen ── */
      offCtx.clearRect(0, 0, W, H);
      var blob = offCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      blob.addColorStop(0,    'rgba(255,200,80,0.96)');
      blob.addColorStop(0.28, 'rgba(255,120,40,0.88)');
      blob.addColorStop(0.60, 'rgba(220,60,12,0.55)');
      blob.addColorStop(0.85, 'rgba(180,25,0,0.20)');
      blob.addColorStop(1,    'rgba(150,10,0,0)');
      offCtx.fillStyle = blob;
      offCtx.beginPath(); offCtx.arc(cx, cy, radius, 0, Math.PI * 2); offCtx.fill();

      /* ── apply depth-fade mask (destination-out erases painted pixels) ── */
      offCtx.globalCompositeOperation = 'destination-out';
      if (mode === 'hard') {
        /* hard clip: erase everything at or below the floor line */
        offCtx.fillStyle = 'rgba(0,0,0,1)';
        offCtx.fillRect(0, wallY, W, H - wallY);
      } else {
        /* soft fade: gradient erases progressively starting at wallY-fadePx
           and reaching full erasure at wallY.  This replicates the GPU
           smoothstep(0, FadeDist, SceneDepth - PixelDepth) per-fragment op.
           We approximate the smoothstep S-curve with 5 colour stops. */
        var y0 = wallY - fadePx, y1 = wallY;
        var fadeM = offCtx.createLinearGradient(0, y0, 0, y1 + radius * 0.15);
        fadeM.addColorStop(0,    'rgba(0,0,0,0)');    /* above fade zone: untouched */
        fadeM.addColorStop(0.25, 'rgba(0,0,0,0.15)'); /* smoothstep curve points */
        fadeM.addColorStop(0.50, 'rgba(0,0,0,0.50)');
        fadeM.addColorStop(0.75, 'rgba(0,0,0,0.85)');
        fadeM.addColorStop(1,    'rgba(0,0,0,1)');    /* at/below floor: fully erased */
        offCtx.fillStyle = fadeM;
        /* draw over the entire particle bounding area */
        offCtx.fillRect(0, Math.max(0, y0 - 4), W, H - Math.max(0, y0 - 4));
      }
      offCtx.globalCompositeOperation = 'source-over';

      /* ── composite particle onto main canvas ── */
      ctx.drawImage(off, 0, 0);

      /* ── fade zone bracket (soft only) ── */
      if (mode === 'soft' && fadePx > 2) {
        var bx = W * 0.82;
        ctx.save();
        ctx.strokeStyle = 'rgba(184,255,87,0.60)'; ctx.lineWidth = dpr;
        ctx.setLineDash([4*dpr, 3*dpr]);
        ctx.beginPath(); ctx.moveTo(bx, wallY - fadePx); ctx.lineTo(W * 0.95, wallY - fadePx); ctx.stroke();
        ctx.setLineDash([]);
        ctx.strokeStyle = 'rgba(184,255,87,0.40)';
        ctx.beginPath(); ctx.moveTo(W * 0.94, wallY - fadePx); ctx.lineTo(W * 0.94, wallY); ctx.stroke();
        ctx.fillStyle = 'rgba(184,255,87,0.70)';
        ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
        ctx.fillText('FADE', Math.round(bx + 2*dpr), Math.round(wallY - fadePx - 5*dpr));
        ctx.restore();
      }

      /* ── readout chips ── */
      var centreDepthDiff = wallY - cy;
      var centreAlpha = mode === 'hard'
        ? (centreDepthDiff >= 0 ? 1 : 0)
        : smoothstep(0, fadePx, centreDepthDiff);
      if (chipMode)  chipMode.textContent  = mode === 'hard' ? 'HARD EDGE' : 'SOFT FADE';
      if (chipDiff)  chipDiff.textContent  = (centreDepthDiff / H * 100).toFixed(1) + ' u';
      if (chipAlpha) chipAlpha.textContent = centreAlpha.toFixed(2);
    }
    requestAnimationFrame(frame);
  }
  roots.forEach(hydrate);
})();

// ── VIZ-FLIPBOOK — sub-UV flipbook timing ──
// Shows a 4×4 atlas grid (16 frames). An animated cursor advances at FPS rate.
// With INTERP ON the next frame is shown as a ghost overlay, illustrating why
// low-FPS flipbooks look smoother with bilinear blending than without.
(function() {
  var roots = document.querySelectorAll('[data-viz-flipbook]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas      = root.querySelector('[data-canvas]');
    var fpsSlider   = root.querySelector('[data-fps]');
    var fpsValEl    = root.querySelector('[data-fps-val]');
    var interpBtns  = root.querySelectorAll('[data-interp]');
    var chipFrame   = root.querySelector('[data-chip-frame]');
    var chipFps     = root.querySelector('[data-chip-fps]');
    var chipInterp  = root.querySelector('[data-chip-interp]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var COLS = 4, ROWS = 4, TOTAL = 16;
    var interp = false;
    var lastTs = 0, accumulator = 0, currentFrame = 0;
    interpBtns.forEach(function(b) {
      b.addEventListener('click', function() {
        interp = b.getAttribute('data-interp') === 'on';
        interpBtns.forEach(function(x) { x.classList.remove('active'); });
        b.classList.add('active');
        if (chipInterp) chipInterp.textContent = interp ? 'INTERP ON' : 'INTERP OFF';
      });
    });
    if (fpsSlider) fpsSlider.addEventListener('input', function() {
      if (fpsValEl)  fpsValEl.textContent  = fpsSlider.value;
      if (chipFps)   chipFps.textContent   = 'FPS ' + fpsSlider.value;
    });
    // per-frame shape lookup (angle + side-count gives distinct icons for each frame)
    var SHAPES = (function() {
      var out = [];
      for (var i = 0; i < TOTAL; i++) {
        out.push({
          angle: i / TOTAL * Math.PI * 2,
          sides: 3 + (i % 4),        // 3,4,5,6 — triangle → hexagon
          col:   ['#ff6b35','#b8ff57','#00e5ff','#ffb347'][i % 4],
          scale: 0.5 + 0.5 * Math.abs(Math.sin(i * 0.8 + 1))
        });
      }
      return out;
    })();
    function drawShape(cx, cy, r, sh, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(cx, cy); ctx.rotate(sh.angle);
      ctx.beginPath();
      for (var k = 0; k < sh.sides; k++) {
        var a = k / sh.sides * Math.PI * 2 - Math.PI / 2;
        var ri = r * sh.scale;
        k === 0 ? ctx.moveTo(Math.cos(a)*ri, Math.sin(a)*ri)
                : ctx.lineTo(Math.cos(a)*ri, Math.sin(a)*ri);
      }
      ctx.closePath();
      ctx.fillStyle   = sh.col.replace(')', ',0.5)').replace('rgb', 'rgba');
      ctx.strokeStyle = sh.col;
      ctx.lineWidth   = 1.5;
      ctx.fill(); ctx.stroke();
      ctx.restore();
    }
    function frame(ts) {
      requestAnimationFrame(frame);
      var fps = Math.max(1, parseFloat(fpsSlider ? fpsSlider.value : 8));
      var dt = Math.min((ts - lastTs) * 0.001, 0.1);
      lastTs = ts;
      accumulator += dt * fps;
      if (accumulator >= 1) { currentFrame = (currentFrame + Math.floor(accumulator)) % TOTAL; accumulator %= 1; }
      var blend = accumulator;
      var dpr = _vizFitCanvas(canvas);
      var W = canvas.width, H = canvas.height;
      var cw = W / COLS, ch = H / ROWS;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#070a0f'; ctx.fillRect(0, 0, W, H);
      for (var row = 0; row < ROWS; row++) {
        for (var col = 0; col < COLS; col++) {
          var fi = row * COLS + col;
          var fx = col * cw, fy = row * ch;
          var active = fi === currentFrame;
          ctx.fillStyle = active ? 'rgba(0,229,255,0.07)' : 'rgba(255,255,255,0.01)';
          ctx.fillRect(fx, fy, cw, ch);
          ctx.strokeStyle = active ? 'rgba(0,229,255,0.6)' : 'rgba(25,33,46,0.8)';
          ctx.lineWidth   = active ? 2*dpr : dpr;
          ctx.strokeRect(fx + dpr*0.5, fy + dpr*0.5, cw - dpr, ch - dpr);
          drawShape(fx + cw*0.5, fy + ch*0.5, Math.min(cw, ch) * 0.3, SHAPES[fi], 0.8);
          ctx.fillStyle = active ? 'rgba(0,229,255,0.9)' : 'rgba(50,65,80,0.7)';
          ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
          ctx.fillText(fi + 1, Math.round(fx + 4*dpr), Math.round(fy + 12*dpr));
        }
      }
      // ghost next frame
      if (interp && blend > 0) {
        var nf = (currentFrame + 1) % TOTAL;
        var nCol = nf % COLS, nRow = Math.floor(nf / COLS);
        var nfx = nCol * cw, nfy = nRow * ch;
        ctx.fillStyle = 'rgba(255,107,53,0.10)'; ctx.fillRect(nfx, nfy, cw, ch);
        ctx.strokeStyle = 'rgba(255,107,53,0.55)'; ctx.lineWidth = 1.5*dpr;
        ctx.setLineDash([4*dpr, 3*dpr]);
        ctx.strokeRect(nfx + dpr, nfy + dpr, cw - 2*dpr, ch - 2*dpr);
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,107,53,0.75)';
        ctx.font = Math.round(7*dpr) + 'px JetBrains Mono, monospace';
        ctx.fillText('blend ' + blend.toFixed(2), Math.round(nfx + 4*dpr), Math.round(nfy + 12*dpr));
      }
      if (chipFrame) chipFrame.textContent = 'FRAME ' + (currentFrame + 1) + ' / ' + TOTAL;
    }
    requestAnimationFrame(frame);
  }
  roots.forEach(hydrate);
})();

// ── VIZ-CHANNELS — RGBA channel packing ──
// Draws four procedural patterns (roughness radial, height bands, AO vignette,
// emissive spots) representing what each RGBA channel typically carries in a
// packed texture. Buttons isolate one channel against the RGB composite.
(function() {
  var roots = document.querySelectorAll('[data-viz-channels]');
  if (!roots.length) return;
  /* Emissive spot positions — shared between the A-channel draw and the
     RGBA alpha-mask so both are always in sync. */
  var SPOTS = [[0.25,0.30,0.12],[0.70,0.62,0.10],[0.50,0.76,0.08],[0.15,0.66,0.07],[0.80,0.24,0.09]];
  function hydrate(root) {
    var canvas = root.querySelector('[data-canvas]');
    var chBtns = root.querySelectorAll('[data-ch]');
    var chipCh = root.querySelector('[data-chip-ch]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    /* offscreen canvas — used for the RGBA composite to isolate
       destination-in masking from the background */
    var off     = document.createElement('canvas');
    var offCtx  = off.getContext('2d');
    /* second offscreen — builds the combined A-channel mask so that
       destination-in is applied exactly once, not once-per-spot */
    var mask    = document.createElement('canvas');
    var maskCtx = mask.getContext('2d');
    var activeCh = 'rgb';
    var LABELS = {
      rgb:'RGB COMPOSITE', rgba:'RGBA — ALPHA APPLIED',
      r:'R — ROUGHNESS', g:'G — HEIGHT MAP', b:'B — AMBIENT OCCLUSION', a:'A — EMISSIVE MASK'
    };
    var TINTS = { r:[255,87,87], g:[184,255,87], b:[0,229,255], a:[255,179,71] };
    chBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeCh = btn.getAttribute('data-ch');
        chBtns.forEach(function(x) { x.classList.remove('active'); });
        btn.classList.add('active');
        if (chipCh) chipCh.textContent = LABELS[activeCh] || activeCh.toUpperCase();
        draw();
      });
    });

    /* drawCh — renders one channel pattern into tCtx at rect (x,y,w,h).
       Takes an explicit context so it works on both main and offscreen. */
    function drawCh(tCtx, ch, x, y, w, h) {
      tCtx.save(); tCtx.beginPath(); tCtx.rect(x, y, w, h); tCtx.clip();
      var cx = x + w*0.5, cy = y + h*0.5;
      if (ch === 'r') {
        var g1 = tCtx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w,h)*0.62);
        g1.addColorStop(0, '#ff5757'); g1.addColorStop(0.5, '#8a1a1a'); g1.addColorStop(1, '#1a0505');
        tCtx.fillStyle = g1; tCtx.fillRect(x, y, w, h);
        for (var ri = 1; ri <= 3; ri++) {
          tCtx.strokeStyle = 'rgba(255,120,120,0.2)'; tCtx.lineWidth = 1;
          tCtx.beginPath(); tCtx.arc(cx, cy, ri * Math.min(w,h)*0.16, 0, Math.PI*2); tCtx.stroke();
        }
      } else if (ch === 'g') {
        tCtx.fillStyle = '#070a0f'; tCtx.fillRect(x, y, w, h);
        for (var band = 0; band < h; band++) {
          var tt = band / h;
          var v = Math.sin(tt * Math.PI * 5) * 0.5 + 0.5;
          tCtx.fillStyle = 'rgba(184,255,87,' + (v * 0.85) + ')';
          tCtx.fillRect(x, y + band, w, 1);
        }
      } else if (ch === 'b') {
        var g2 = tCtx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w,h)*0.65);
        g2.addColorStop(0, 'rgba(180,220,255,0.9)'); g2.addColorStop(0.5, 'rgba(40,80,130,0.7)'); g2.addColorStop(1, 'rgba(4,8,14,0.95)');
        tCtx.fillStyle = g2; tCtx.fillRect(x, y, w, h);
      } else if (ch === 'a') {
        tCtx.fillStyle = '#05070c'; tCtx.fillRect(x, y, w, h);
        SPOTS.forEach(function(s) {
          var g3 = tCtx.createRadialGradient(x+w*s[0], y+h*s[1], 0, x+w*s[0], y+h*s[1], w*s[2]);
          g3.addColorStop(0, 'rgba(255,200,80,0.95)'); g3.addColorStop(0.5, 'rgba(255,130,40,0.5)'); g3.addColorStop(1, 'rgba(200,80,0,0)');
          tCtx.fillStyle = g3; tCtx.fillRect(x, y, w, h);
        });
      }
      tCtx.restore();
    }

    /* drawCheckerboard — standard transparency indicator pattern */
    function drawCheckerboard(tCtx, x, y, w, h) {
      var sz = Math.max(4, Math.round(w / 28));
      for (var ry = 0; ry < h; ry += sz) {
        for (var rx = 0; rx < w; rx += sz) {
          tCtx.fillStyle = ((Math.floor(ry/sz) + Math.floor(rx/sz)) % 2 === 0) ? '#1c2030' : '#0d1018';
          tCtx.fillRect(x + rx, y + ry, Math.min(sz, w-rx), Math.min(sz, h-ry));
        }
      }
    }

    function draw() {
      var dpr = _vizFitCanvas(canvas);
      var CW = canvas.width, CH = canvas.height;
      if (off.width !== CW || off.height !== CH) { off.width = CW; off.height = CH; }
      ctx.clearRect(0, 0, CW, CH);
      ctx.fillStyle = '#07090e'; ctx.fillRect(0, 0, CW, CH);
      var LH = Math.round(20*dpr), drawH = CH - LH;

      if (activeCh === 'rgba') {
        /* ── RGBA composite ──────────────────────────────────────────────────
           Shows what the packed texture looks like when the A channel is used
           as actual alpha/transparency.  The checkerboard behind makes the
           transparent regions visible — just as it does in Photoshop/Substance.

           GPU equivalent:
             float4 packed = Texture2DSample(Tex, Smp, uv);
             float3 rgb    = packed.rgb;        // colour / data channels
             float  a      = packed.a;          // emissive mask → opacity
             return float4(rgb, a);             // alpha-blended output
        ── */

        /* 1. Checkerboard fills the full draw area — shows through wherever
              the texture is transparent */
        drawCheckerboard(ctx, 0, 0, CW, drawH);

        /* 2. Draw the three data channels screen-blended onto offscreen
              so all channels are visible in one composite image */
        offCtx.clearRect(0, 0, CW, CH);
        drawCh(offCtx, 'r', 0, 0, CW, drawH);
        offCtx.globalCompositeOperation = 'screen';
        drawCh(offCtx, 'g', 0, 0, CW, drawH);
        drawCh(offCtx, 'b', 0, 0, CW, drawH);
        offCtx.globalCompositeOperation = 'source-over';

        /* 3. Build the full A-channel mask on the mask canvas first.
              All spots are drawn with normal source-over so they accumulate
              additively.  Then we apply the combined mask to the RGB composite
              in a single destination-in drawImage call.
              destination-in: result_alpha = dst_alpha × src_alpha
                → RGB pixels stay where the mask is opaque (spot centres)
                → RGB pixels disappear where the mask is transparent (gaps)
                → checkerboard shows through the transparent gaps */
        if (mask.width !== CW || mask.height !== CH) { mask.width = CW; mask.height = CH; }
        maskCtx.clearRect(0, 0, CW, CH);
        SPOTS.forEach(function(s) {
          var gA = maskCtx.createRadialGradient(
            CW * s[0], drawH * s[1], 0,
            CW * s[0], drawH * s[1], CW * s[2]
          );
          gA.addColorStop(0,   'rgba(255,255,255,0.95)');
          gA.addColorStop(0.5, 'rgba(255,255,255,0.50)');
          gA.addColorStop(1,   'rgba(255,255,255,0)');
          maskCtx.fillStyle = gA;
          maskCtx.fillRect(0, 0, CW, drawH);
        });
        /* single destination-in pass — avoids the intersection-of-N-masks bug */
        offCtx.globalCompositeOperation = 'destination-in';
        offCtx.drawImage(mask, 0, 0);
        offCtx.globalCompositeOperation = 'source-over';

        /* 4. Composite the masked RGB onto the checkerboard */
        ctx.drawImage(off, 0, 0);

        /* 5. Thin emissive-orange border on each spot to aid identification */
        ctx.save();
        SPOTS.forEach(function(s) {
          ctx.strokeStyle = 'rgba(255,179,71,0.30)'; ctx.lineWidth = dpr;
          ctx.beginPath();
          ctx.arc(CW*s[0], drawH*s[1], CW*s[2]*0.95, 0, Math.PI*2);
          ctx.stroke();
        });
        ctx.restore();

        /* 6. Label row */
        ctx.fillStyle = '#07090e'; ctx.fillRect(0, drawH, CW, LH);
        ctx.fillStyle = 'rgba(255,179,71,0.85)';
        ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
        ctx.fillText('RGBA — A channel applied as alpha · checkerboard = transparent · R+G+B screen-blended', Math.round(8*dpr), drawH + Math.round(14*dpr));

      } else if (activeCh === 'rgb') {
        /* four channels side by side */
        var pw = Math.floor(CW / 4);
        ['r','g','b','a'].forEach(function(ch, i) {
          var px2 = i * pw, pw2 = i === 3 ? CW - i*pw : pw;
          drawCh(ctx, ch, px2, 0, pw2, drawH);
          ctx.fillStyle = '#070a0e'; ctx.fillRect(px2, drawH, pw2, LH);
          var tc = TINTS[ch];
          ctx.fillStyle = 'rgba(' + tc[0] + ',' + tc[1] + ',' + tc[2] + ',0.8)';
          ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
          ctx.fillText(['R','G','B','A'][i] + ' — ' + ['ROUGHNESS','HEIGHT','AO','EMISSIVE'][i], px2 + Math.round(5*dpr), drawH + Math.round(14*dpr));
          if (i > 0) { ctx.strokeStyle = 'rgba(15,20,30,0.9)'; ctx.lineWidth = dpr; ctx.beginPath(); ctx.moveTo(px2,0); ctx.lineTo(px2,CH); ctx.stroke(); }
        });
      } else {
        /* left = RGB composite overlay, right = isolated channel */
        var half = Math.floor(CW / 2);
        ['r','g','b','a'].forEach(function(ch) { drawCh(ctx, ch, 0, 0, half, drawH); });
        ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0, 0, half, drawH);
        ctx.fillStyle = '#070a0e'; ctx.fillRect(0, drawH, half, LH);
        ctx.fillStyle = 'rgba(200,210,220,0.55)';
        ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
        ctx.fillText('RGB COMPOSITE', Math.round(5*dpr), drawH + Math.round(14*dpr));
        drawCh(ctx, activeCh, half, 0, CW - half, drawH);
        var tc2 = TINTS[activeCh];
        ctx.fillStyle = '#070a0e'; ctx.fillRect(half, drawH, CW - half, LH);
        ctx.fillStyle = 'rgba(' + tc2[0] + ',' + tc2[1] + ',' + tc2[2] + ',0.85)';
        ctx.fillText(LABELS[activeCh], half + Math.round(5*dpr), drawH + Math.round(14*dpr));
        ctx.strokeStyle = 'rgba(0,229,255,0.35)'; ctx.lineWidth = dpr;
        ctx.beginPath(); ctx.moveTo(half, 0); ctx.lineTo(half, CH); ctx.stroke();
      }
    }
    window.addEventListener('resize', draw); draw();
  }
  roots.forEach(hydrate);
})();

// ── VIZ-UVFLOW — UV flow / distortion ──
// Animated UV grid with panning offset (constant scroll). The DISTORT slider
// adds sinusoidal warp — simulating a FlowMap texture distorting the UVs.
// Shows the visual effect of AddOffset + scale in real time.
(function() {
  var roots = document.querySelectorAll('[data-viz-uvflow]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas    = root.querySelector('[data-canvas]');
    var strSlider = root.querySelector('[data-strength]');
    var strValEl  = root.querySelector('[data-strength-val]');
    var chipMode  = root.querySelector('[data-chip-mode]');
    var chipStr   = root.querySelector('[data-chip-str]');
    var chipTime  = root.querySelector('[data-chip-time]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    if (strSlider) strSlider.addEventListener('input', function() {
      var v = (parseFloat(strSlider.value) / 100).toFixed(2);
      if (strValEl) strValEl.textContent = v;
      if (chipStr)  chipStr.textContent  = 'distortion ' + v;
      if (chipMode) chipMode.textContent = parseFloat(strSlider.value) < 1 ? 'PANNER ONLY' : 'PANNER + DISTORT';
    });
    function frame(ts) {
      requestAnimationFrame(frame);
      var time = ts * 0.001;
      var dpr = _vizFitCanvas(canvas);
      var W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#070a10'; ctx.fillRect(0, 0, W, H);
      var COLS = 12, ROWS = 7;
      var cw = W / COLS, ch = H / ROWS;
      var strength = parseFloat(strSlider ? strSlider.value : 0) / 100;
      var panX = (time * 0.12) % 1;
      var panY = (time * 0.07) % 1;
      // draw distorted grid lines
      ctx.strokeStyle = 'rgba(0,229,255,0.45)'; ctx.lineWidth = dpr;
      for (var col = 0; col <= COLS; col++) {
        ctx.beginPath();
        for (var row = 0; row <= ROWS; row++) {
          var u = col / COLS + panX, v = row / ROWS + panY;
          var dx = Math.sin(u * Math.PI * 3.2 + time * 0.5) * strength * W * 0.06;
          var dy = Math.cos(v * Math.PI * 2.4 + time * 0.38) * strength * H * 0.10;
          var px = col * cw + dx, py = row * ch + dy;
          row === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
      for (var row2 = 0; row2 <= ROWS; row2++) {
        ctx.beginPath();
        for (var col2 = 0; col2 <= COLS; col2++) {
          var u2 = col2 / COLS + panX, v2 = row2 / ROWS + panY;
          var dx2 = Math.sin(u2 * Math.PI * 3.2 + time * 0.5) * strength * W * 0.06;
          var dy2 = Math.cos(v2 * Math.PI * 2.4 + time * 0.38) * strength * H * 0.10;
          col2 === 0 ? ctx.moveTo(col2 * cw + dx2, row2 * ch + dy2)
                     : ctx.lineTo(col2 * cw + dx2, row2 * ch + dy2);
        }
        ctx.stroke();
      }
      // UV(0,0) origin dot
      var ox = (panX % 1) * W, oy = (panY % 1) * H;
      ctx.fillStyle = 'rgba(255,107,53,0.85)';
      ctx.beginPath(); ctx.arc(ox, oy, 4*dpr, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,107,53,0.65)';
      ctx.font = Math.round(9*dpr) + 'px JetBrains Mono, monospace';
      ctx.fillText('UV(0,0)', Math.round(ox + 7*dpr), Math.round(oy + 4*dpr));
      if (chipTime) chipTime.textContent = 't = ' + time.toFixed(2);
    }
    requestAnimationFrame(frame);
  }
  roots.forEach(hydrate);
})();

// ── VIZ-BURST — spawn rate vs burst ──
// Draws a timeline (0..8s) with two animated particle-count lines: steady-rate
// spawn (lime, ramps to steady state) and burst spawn (orange, instant spike
// then decay). A red budget threshold line shows when burst breaks the budget.
// PLAY advances a cursor; RESET rewinds.
(function() {
  var roots = document.querySelectorAll('[data-viz-burst]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas    = root.querySelector('[data-canvas]');
    var playBtn   = root.querySelector('[data-play]');
    var resetBtn  = root.querySelector('[data-reset]');
    var chipT     = root.querySelector('[data-chip-t]');
    var chipRate  = root.querySelector('[data-chip-rate]');
    var chipBurst = root.querySelector('[data-chip-burst]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var playing = false, simTime = 0, lastTs = 0;
    var DUR = 8, RATE_SPAWN = 40, RATE_LIFE = 3, BURST = 120, BURST_LIFE = 2.5, BUDGET = 80, MAX_Y = 140;
    function rateAlive(t)  { return Math.round(RATE_SPAWN * RATE_LIFE * Math.min(t / RATE_LIFE, 1) * Math.min(t * 3, 1)); }
    function burstAlive(t) { return t < 0.12 ? 0 : Math.round(BURST * Math.max(0, 1 - (t - 0.12) / BURST_LIFE)); }
    function draw() {
      var dpr = _vizFitCanvas(canvas);
      var W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#070a0f'; ctx.fillRect(0, 0, W, H);
      var PL = 44*dpr, PR = 16*dpr, PT = 20*dpr, PB = 28*dpr;
      var gW = W - PL - PR, gH = H - PT - PB;
      function xt(t) { return PL + (t / DUR) * gW; }
      function yc(c) { return PT + gH - (c / MAX_Y) * gH; }
      // grid
      ctx.strokeStyle = 'rgba(25,35,50,0.8)'; ctx.lineWidth = dpr;
      for (var yi = 0; yi <= 4; yi++) {
        var yy = PT + gH * yi / 4;
        ctx.beginPath(); ctx.moveTo(PL, yy); ctx.lineTo(W-PR, yy); ctx.stroke();
        ctx.fillStyle = 'rgba(80,100,120,0.6)'; ctx.textAlign = 'right';
        ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
        ctx.fillText(Math.round(MAX_Y*(4-yi)/4), PL-4*dpr, yy+3*dpr);
      }
      ctx.textAlign = 'left';
      for (var xi = 0; xi <= DUR; xi++) {
        var xx = xt(xi); ctx.strokeStyle = 'rgba(25,35,50,0.8)'; ctx.lineWidth = dpr;
        ctx.beginPath(); ctx.moveTo(xx, PT); ctx.lineTo(xx, PT+gH); ctx.stroke();
        ctx.fillStyle = 'rgba(80,100,120,0.6)';
        ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
        ctx.fillText(xi+'s', xx - 4*dpr, PT+gH+16*dpr);
      }
      // budget line
      var bY = yc(BUDGET);
      ctx.strokeStyle = 'rgba(255,87,87,0.55)'; ctx.lineWidth = 1.5*dpr;
      ctx.setLineDash([6*dpr, 4*dpr]);
      ctx.beginPath(); ctx.moveTo(PL, bY); ctx.lineTo(W-PR, bY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,87,87,0.6)'; ctx.textAlign = 'right';
      ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
      ctx.fillText('BUDGET LIMIT', W-PR-4*dpr, bY-5*dpr); ctx.textAlign = 'left';
      // draw curves
      function drawCurve(fn, color, fill) {
        ctx.strokeStyle = color; ctx.lineWidth = 2*dpr; ctx.setLineDash([]);
        ctx.beginPath();
        for (var i = 0; i <= 80; i++) { var t = i/80*DUR; i===0?ctx.moveTo(xt(t),yc(fn(t))):ctx.lineTo(xt(t),yc(fn(t))); }
        ctx.stroke();
        ctx.save(); ctx.beginPath();
        for (var i2 = 0; i2 <= 80; i2++) { var t2 = i2/80*DUR; i2===0?ctx.moveTo(xt(t2),yc(fn(t2))):ctx.lineTo(xt(t2),yc(fn(t2))); }
        ctx.lineTo(W-PR, PT+gH); ctx.lineTo(PL, PT+gH); ctx.closePath();
        ctx.fillStyle = fill; ctx.fill(); ctx.restore();
      }
      drawCurve(rateAlive,  'rgba(184,255,87,0.85)', 'rgba(184,255,87,0.07)');
      drawCurve(burstAlive, 'rgba(255,107,53,0.85)', 'rgba(255,107,53,0.07)');
      // playhead
      if (simTime > 0) {
        var tx = xt(simTime);
        ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = dpr; ctx.setLineDash([3*dpr,3*dpr]);
        ctx.beginPath(); ctx.moveTo(tx, PT); ctx.lineTo(tx, PT+gH); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(184,255,87,0.9)'; ctx.beginPath(); ctx.arc(tx, yc(rateAlive(simTime)),  4*dpr, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,107,53,0.9)'; ctx.beginPath(); ctx.arc(tx, yc(burstAlive(simTime)), 4*dpr, 0, Math.PI*2); ctx.fill();
        if (chipT)     chipT.textContent     = 't = ' + simTime.toFixed(1) + ' s';
        if (chipRate)  chipRate.textContent  = rateAlive(simTime);
        if (chipBurst) chipBurst.textContent = burstAlive(simTime);
      }
      // legend
      ctx.fillStyle = 'rgba(184,255,87,0.8)'; ctx.font = Math.round(9*dpr) + 'px JetBrains Mono, monospace';
      ctx.fillText('● RATE spawn',  PL+4*dpr,   PT+14*dpr);
      ctx.fillStyle = 'rgba(255,107,53,0.8)';
      ctx.fillText('● BURST spawn', PL+88*dpr,  PT+14*dpr);
    }
    function tick(ts) {
      if (!playing) return;
      var dt = Math.min((ts - lastTs)*0.001, 0.1); lastTs = ts;
      simTime = Math.min(simTime + dt * 1.5, DUR);
      draw();
      if (simTime < DUR) { requestAnimationFrame(tick); }
      else { playing = false; if (playBtn) { playBtn.textContent='▶ PLAY'; playBtn.classList.remove('active'); } }
    }
    if (playBtn) playBtn.addEventListener('click', function() {
      if (simTime >= DUR) simTime = 0;
      playing = !playing;
      playBtn.textContent = playing ? '❚❚ PAUSE' : '▶ PLAY';
      playBtn.classList.toggle('active', playing);
      if (playing) { lastTs = performance.now(); requestAnimationFrame(tick); }
    });
    if (resetBtn) resetBtn.addEventListener('click', function() {
      playing = false; simTime = 0;
      if (playBtn) { playBtn.textContent = '▶ PLAY'; playBtn.classList.remove('active'); }
      if (chipT)     chipT.textContent     = 't = 0.0 s';
      if (chipRate)  chipRate.textContent  = '0';
      if (chipBurst) chipBurst.textContent = '0';
      draw();
    });
    window.addEventListener('resize', draw); draw();
  }
  roots.forEach(hydrate);
})();

// ── VIZ-SORTORDER — sort order artifacts (alpha blending) ──
// Three overlapping translucent quads. Correct draw order (back-to-front) gives
// accurate compositing. Front-to-back or unsorted order produces wrong colours.
// This is specific to alpha blend — additive particles don't care about order.
(function() {
  var roots = document.querySelectorAll('[data-viz-sortorder]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas     = root.querySelector('[data-canvas]');
    var orderBtns  = root.querySelectorAll('[data-order]');
    var chipOrder  = root.querySelector('[data-chip-order]');
    var chipResult = root.querySelector('[data-chip-result]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var order = 'btf';
    var INFO = {
      btf:      { label:'BACK-TO-FRONT',   result:'✓ CORRECT',        ok:true  },
      ftb:      { label:'FRONT-TO-BACK',   result:'✗ WRONG BLEND',    ok:false },
      unsorted: { label:'UNSORTED',        result:'? UNPREDICTABLE',   ok:null  }
    };
    var QUADS = [
      { id:'A', depth:3, col:[0,229,255],   label:'A (BACK)',  a:0.55 },
      { id:'B', depth:2, col:[255,107,53],  label:'B (MID)',   a:0.55 },
      { id:'C', depth:1, col:[184,255,87],  label:'C (FRONT)', a:0.55 }
    ];
    orderBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        order = btn.getAttribute('data-order');
        orderBtns.forEach(function(x) { x.classList.remove('active'); });
        btn.classList.add('active');
        var info = INFO[order];
        if (chipOrder)  chipOrder.textContent  = info.label;
        if (chipResult) {
          chipResult.textContent = info.result;
          chipResult.style.color = info.ok === true ? 'var(--accent3)' : info.ok === false ? 'var(--bad)' : 'var(--warn)';
        }
        draw();
      });
    });
    function draw() {
      var dpr = _vizFitCanvas(canvas);
      var CW = canvas.width, CH = canvas.height;
      ctx.clearRect(0, 0, CW, CH);
      ctx.fillStyle = '#08090e'; ctx.fillRect(0, 0, CW, CH);
      // subtle grid
      ctx.strokeStyle = 'rgba(20,26,38,0.7)'; ctx.lineWidth = dpr;
      for (var gx = 0; gx < CW; gx += 28*dpr) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,CH); ctx.stroke(); }
      for (var gy = 0; gy < CH; gy += 28*dpr) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(CW,gy); ctx.stroke(); }
      // determine draw order
      var seq;
      if (order === 'btf')      seq = QUADS.slice().sort(function(a,b) { return b.depth - a.depth; });
      else if (order === 'ftb') seq = QUADS.slice().sort(function(a,b) { return a.depth - b.depth; });
      else                      seq = [QUADS[1], QUADS[0], QUADS[2]];
      // quad layout: staggered overlap
      var qw = CW * 0.28, qh = CH * 0.62;
      var sp = CW * 0.20;
      var baseX = CW * 0.5, baseY = CH * 0.44;
      var posMap = { A: baseX - sp - qw*0.5,  B: baseX - qw*0.5,  C: baseX + sp - qw*0.5 };
      seq.forEach(function(q) {
        var x = posMap[q.id], y = baseY - qh*0.5;
        ctx.fillStyle = 'rgba(' + q.col[0] + ',' + q.col[1] + ',' + q.col[2] + ',' + q.a + ')';
        ctx.fillRect(x, y, qw, qh);
        ctx.strokeStyle = 'rgba(' + q.col[0] + ',' + q.col[1] + ',' + q.col[2] + ',0.8)';
        ctx.lineWidth = 1.5*dpr; ctx.strokeRect(x, y, qw, qh);
        ctx.fillStyle = 'rgba(' + q.col[0] + ',' + q.col[1] + ',' + q.col[2] + ',0.9)';
        ctx.font = Math.round(9*dpr) + 'px JetBrains Mono, monospace';
        ctx.fillText(q.label, Math.round(x + 6*dpr), Math.round(y + 15*dpr));
      });
      // order label
      ctx.fillStyle = 'rgba(80,100,120,0.6)';
      ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
      ctx.fillText('DRAW ORDER: ' + seq.map(function(q){return q.id;}).join(' → '), Math.round(6*dpr), Math.round(14*dpr));
      ctx.fillText('← CAMERA', Math.round(6*dpr), Math.round(CH - 7*dpr));
    }
    window.addEventListener('resize', draw); draw();
  }
  roots.forEach(hydrate);
})();

// ── VIZ-PRECISION — float vs half precision ──
// Draws two horizontal gradient strips covering the same value range.
// fp32 strip is smooth (23-bit mantissa). fp16 strip is quantised (10-bit
// mantissa), producing visible banding especially near zero or mid range.
// NEAR ZERO / MID RANGE zoom buttons reveal the step boundaries as red ticks.
(function() {
  var roots = document.querySelectorAll('[data-viz-precision]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas    = root.querySelector('[data-canvas]');
    var zoomBtns  = root.querySelectorAll('[data-zoom]');
    var chipRange = root.querySelector('[data-chip-range]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var zoom = 'full';
    var RANGES = { full:[0,1], near:[0,0.02], mid:[0.48,0.52] };
    var RLABELS = { full:'0.000 → 1.000', near:'0.000 → 0.020', mid:'0.480 → 0.520' };
    zoomBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        zoom = btn.getAttribute('data-zoom');
        zoomBtns.forEach(function(x) { x.classList.remove('active'); });
        btn.classList.add('active');
        if (chipRange) chipRange.textContent = RLABELS[zoom];
        draw();
      });
    });
    // Simulate fp16 quantisation: 10-bit mantissa, step size varies by exponent
    function toHalf(v) {
      if (v <= 0) return 0; if (v >= 1) return 1;
      var e = Math.floor(Math.log2(v));
      var step = Math.pow(2, e) / 1024;
      return Math.round(v / step) * step;
    }
    function draw() {
      var dpr = _vizFitCanvas(canvas);
      var CW = canvas.width, CH = canvas.height;
      ctx.clearRect(0, 0, CW, CH);
      ctx.fillStyle = '#07090e'; ctx.fillRect(0, 0, CW, CH);
      var rng = RANGES[zoom], rMin = rng[0], rMax = rng[1];
      var LBL = Math.round(18*dpr), GAP = Math.round(6*dpr);
      var stripH = Math.round((CH - LBL*2 - GAP*3) / 2);
      var y32 = LBL + GAP;
      var y16 = y32 + stripH + GAP + LBL;
      // draw pixel-by-pixel strips
      for (var px2 = 0; px2 < CW; px2++) {
        var t = rMin + (px2 / CW) * (rMax - rMin);
        var b32 = Math.round(t * 255);
        ctx.fillStyle = 'rgb(' + b32 + ',' + b32 + ',' + b32 + ')';
        ctx.fillRect(px2, y32, 1, stripH);
        var b16 = Math.round(toHalf(t) * 255);
        ctx.fillStyle = 'rgb(' + b16 + ',' + b16 + ',' + b16 + ')';
        ctx.fillRect(px2, y16, 1, stripH);
      }
      // borders
      ctx.strokeStyle = 'rgba(184,255,87,0.4)'; ctx.lineWidth = dpr;
      ctx.strokeRect(0, y32, CW, stripH);
      ctx.strokeStyle = 'rgba(255,107,53,0.4)';
      ctx.strokeRect(0, y16, CW, stripH);
      // strip labels
      ctx.font = Math.round(9*dpr) + 'px JetBrains Mono, monospace';
      ctx.fillStyle = 'rgba(184,255,87,0.8)'; ctx.fillText('fp32 — float  (23-bit mantissa, smooth)', Math.round(5*dpr), y32-5*dpr);
      ctx.fillStyle = 'rgba(255,107,53,0.8)'; ctx.fillText('fp16 — half   (10-bit mantissa, quantised)', Math.round(5*dpr), y16-5*dpr);
      // for zoom modes, mark fp16 step boundaries
      if (zoom !== 'full') {
        ctx.strokeStyle = 'rgba(255,87,87,0.55)'; ctx.lineWidth = dpr; ctx.setLineDash([2*dpr,2*dpr]);
        var prevH = -1;
        for (var px3 = 1; px3 < CW; px3++) {
          var t3 = rMin + (px3 / CW) * (rMax - rMin);
          var h3 = toHalf(t3);
          if (Math.abs(h3 - prevH) > 1e-9) {
            ctx.beginPath(); ctx.moveTo(px3, y16); ctx.lineTo(px3, y16+stripH); ctx.stroke();
          }
          prevH = h3;
        }
        ctx.setLineDash([]);
      }
      // axis
      ctx.fillStyle = 'rgba(70,90,110,0.65)'; ctx.textAlign = 'left';
      ctx.font = Math.round(8*dpr) + 'px JetBrains Mono, monospace';
      ctx.fillText(rMin.toFixed(3), Math.round(4*dpr), Math.round(CH - 5*dpr));
      ctx.textAlign = 'right';
      ctx.fillText(rMax.toFixed(3), CW - Math.round(4*dpr), Math.round(CH - 5*dpr));
      ctx.textAlign = 'left';
    }
    window.addEventListener('resize', draw); draw();
  }
  roots.forEach(hydrate);
})();

// ── VIZ-INTERP — lerp / smoothstep / step visualizer ──
// Hydrates any [data-viz-interp] element. One slider drives three SVG plots
// (step, lerp, smoothstep) and a readout chip row. The math is plain HLSL
// semantics: step = x >= edge, lerp = a+(b-a)t, smoothstep = 3t²-2t³.
(function() {
  var roots = document.querySelectorAll('[data-viz-interp]');
  if (!roots.length) return;

  // Plot viewport: x ∈ [16,152] maps to t ∈ [0,1]; y ∈ [108,12] maps to [0,1].
  var PX0 = 16, PX1 = 152, PY0 = 108, PY1 = 12;
  function xAt(t) { return PX0 + (PX1 - PX0) * t; }
  function yAt(v) { return PY0 + (PY1 - PY0) * v; }

  function curvePath(fn) {
    var d = '';
    for (var i = 0; i <= 64; i++) {
      var t = i / 64;
      var v = Math.max(0, Math.min(1, fn(t)));
      d += (i === 0 ? 'M' : 'L') + xAt(t).toFixed(2) + ' ' + yAt(v).toFixed(2) + ' ';
    }
    return d.trim();
  }

  var FNS = {
    'STEP':       function(t) { return t >= 0.5 ? 1 : 0; },
    'LERP':       function(t) { return t; },
    'SMOOTHSTEP': function(t) { return t*t*(3 - 2*t); }
  };

  function hydrate(root) {
    var slider    = root.querySelector('[data-slider]');
    var sliderVal = root.querySelector('[data-slider-val]');
    var chipT     = root.querySelector('[data-chip-t]');
    var chips     = root.querySelectorAll('.viz-chip');
    var plots     = root.querySelectorAll('[data-plot]');
    if (!slider || !plots.length) return;

    // Draw static curves + cache per-plot handles
    var plotRefs = [];
    plots.forEach(function(p) {
      var kind   = p.getAttribute('data-plot');
      var fn     = FNS[kind];
      var curve  = p.querySelector('[data-curve]');
      var marker = p.querySelector('[data-marker]');
      var dot    = p.querySelector('[data-dot]');
      var out    = p.querySelector('[data-out]');
      var stroke = kind === 'STEP' ? '#ff6b35'
                 : kind === 'LERP' ? '#b8ff57'
                 : '#00e5ff';
      curve.setAttribute('d', curvePath(fn));
      curve.setAttribute('stroke', stroke);
      plotRefs.push({ kind: kind, fn: fn, marker: marker, dot: dot, out: out });
    });

    function update() {
      var t = Math.max(0, Math.min(1, +slider.value / 1000));
      sliderVal.textContent = t.toFixed(3);
      if (chipT) chipT.textContent = 't = ' + t.toFixed(2);
      plotRefs.forEach(function(r, i) {
        var v = r.fn(t);
        var x = xAt(t), y = yAt(v);
        r.marker.setAttribute('x1', x); r.marker.setAttribute('x2', x);
        r.dot.setAttribute('cx', x);    r.dot.setAttribute('cy', y);
        r.out.textContent = v.toFixed(2);
        // chips: [0]=state, [1]=step, [2]=lerp, [3]=smoothstep
        var chip = chips[i + 1];
        if (chip) {
          var label = r.kind === 'STEP' ? 'step' : r.kind === 'LERP' ? 'lerp' : 'smoothstep';
          chip.innerHTML = '<span class="viz-dot ' +
            (r.kind === 'STEP' ? 't' : r.kind === 'LERP' ? 'b' : 'n') +
            '"></span>' + label + ' = ' + v.toFixed(2);
        }
      });
    }

    slider.addEventListener('input', update);
    update();
  }

  roots.forEach(hydrate);
})();

/* ── VIZ-ORBIT — WebGL orbital rings SDF ──────────────────────────────────── */
(function() {
  var roots = document.querySelectorAll('[data-viz-orbit]');
  if (!roots.length) return;

  var VERT = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var FRAG = [
    'precision mediump float;',
    'uniform vec2  u_res;',
    'uniform float u_time;',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / min(u_res.x, u_res.y);',
    '  float T = u_time;',
    '',
    '  // Deep warm background + soft vignette',
    '  vec3 col = vec3(0.055, 0.028, 0.014) * (1.0 - 0.45 * length(uv));',
    '',
    '  // Warm pedestal glow (bottom pool)',
    '  col += vec3(0.98, 0.42, 0.08)',
    '         * exp(-length(uv - vec2(0.0, -0.55)) * 2.8) * 0.9;',
    '  col += vec3(0.55, 0.18, 0.03)',
    '         * exp(-length(uv - vec2(0.0, -0.85)) * 1.3) * 0.55;',
    '',
    '  // Central sun / planet',
    '  float r = length(uv);',
    '  col += vec3(1.00, 0.95, 0.82) * smoothstep(0.040, 0.024, r);',
    '  col += vec3(0.90, 0.55, 0.22) * exp(-r * 11.0) * 0.35;',
    '  col += vec3(0.40, 0.20, 0.06) * exp(-r * 3.5)  * 0.28;',
    '',
    '  // Per-ring precessing orbits with own speed + body dot',
    '  for (int i = 0; i < 3; i++) {',
    '    float rad, incl, oSpeed, bSpeed, phO, phB;',
    '    if (i == 0)      { rad=0.27; incl=0.38; oSpeed= 0.180; bSpeed= 1.30; phO= 0.2; phB=0.0; }',
    '    else if (i == 1) { rad=0.42; incl=0.98; oSpeed=-0.110; bSpeed= 0.85; phO= 1.8; phB=1.7; }',
    '    else             { rad=0.58; incl=1.24; oSpeed= 0.065; bSpeed=-0.55; phO=-0.6; phB=3.2; }',
    '',
    '    float O   = oSpeed * T + phO;   // precession (orbit plane rotation)',
    '    float thB = bSpeed * T + phB;   // body angle on ring',
    '',
    '    // Pixel -> ring local frame (major axis along X)',
    '    float co = cos(O), so = sin(O);',
    '    vec2 p = vec2(uv.x*co + uv.y*so, -uv.x*so + uv.y*co);',
    '',
    '    // Ellipse SDF (approx)',
    '    float ci = cos(incl);',
    '    vec2 radii = vec2(rad, rad * abs(ci));',
    '    vec2 pn = p / radii;',
    '    float d = abs(length(pn) - 1.0) * min(radii.x, radii.y);',
    '',
    '    // Parametric angle on ellipse -> 3D depth (near/far of sun)',
    '    float alpha_s = clamp(p.y / max(radii.y, 0.0001), -1.0, 1.0);',
    '    float depth = alpha_s * sin(incl);',
    '    float nearT = smoothstep(-0.7, 0.7, depth);',
    '',
    '    float core = exp(-d * 420.0);',
    '    float glow = exp(-d * 55.0)  * 0.35;',
    '    float aura = exp(-d * 16.0)  * 0.08;',
    '    vec3 rc = mix(vec3(0.22, 0.38, 0.72), vec3(1.00, 0.98, 0.92), nearT);',
    '    col += rc * (core + glow + aura) * (0.35 + 0.65 * nearT);',
    '',
    '    // Orbital body (small bright dot riding on the ring)',
    '    float bc = cos(thB), bs = sin(thB);',
    '    vec2 bodyLocal = vec2(rad * bc, rad * bs * ci);',
    '    float bDepth = bs * sin(incl);',
    '    float bDist  = length(p - bodyLocal);',
    '    float front  = smoothstep(-0.05, 0.05, bDepth);',
    '    float bCore  = smoothstep(0.022, 0.009, bDist);',
    '    float bGlow  = exp(-bDist * 22.0) * 0.32;',
    '    vec3  bCol   = mix(vec3(0.45, 0.60, 0.90), vec3(1.00, 0.95, 0.80), front);',
    '    col += bCol * (bCore + bGlow) * (0.30 + 0.70 * front);',
    '  }',
    '',
    '  col = pow(clamp(col, 0.0, 1.0), vec3(0.45));',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function mkGL(canvas) {
    var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) return null;
    function compile(type, src) {
      var sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      return gl.getShaderParameter(sh, gl.COMPILE_STATUS) ? sh : null;
    }
    var vs = compile(gl.VERTEX_SHADER,   VERT);
    var fs = compile(gl.FRAGMENT_SHADER, FRAG);
    if (!vs || !fs) return null;
    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return null;
    gl.useProgram(prog);
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER,
      new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    return {
      gl:    gl,
      uRes:  gl.getUniformLocation(prog, 'u_res'),
      uTime: gl.getUniformLocation(prog, 'u_time')
    };
  }

  roots.forEach(function(root) {
    var canvas    = root.querySelector('[data-canvas]');
    var stateChip = root.querySelector('[data-chip-state]');
    var pauseBtn  = root.querySelector('[data-pause]');
    if (!canvas) return;
    var ctx = mkGL(canvas);
    if (!ctx) {
      if (stateChip) stateChip.textContent = '✗ NO WEBGL';
      return;
    }
    var paused = false;
    var t0 = performance.now();
    if (pauseBtn) {
      pauseBtn.addEventListener('click', function() {
        paused = !paused;
        pauseBtn.textContent = paused ? '▶ PLAY' : 'PAUSE';
        if (stateChip) stateChip.textContent = paused ? '● PAUSED' : '● LIVE';
      });
    }
    (function loop() {
      if (!paused) {
        var dpr = window.devicePixelRatio || 1;
        var W = Math.round(canvas.offsetWidth  * dpr);
        var H = Math.round(canvas.offsetHeight * dpr);
        if (canvas.width !== W || canvas.height !== H) {
          canvas.width = W; canvas.height = H;
          ctx.gl.viewport(0, 0, W, H);
        }
        ctx.gl.uniform2f(ctx.uRes,  W, H);
        ctx.gl.uniform1f(ctx.uTime, (performance.now() - t0) * 0.001);
        ctx.gl.drawArrays(ctx.gl.TRIANGLE_STRIP, 0, 4);
      }
      requestAnimationFrame(loop);
    }());
  });
})();
</script>
