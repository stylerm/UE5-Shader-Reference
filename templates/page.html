// ── VIZ-UV-TILE — checkerboard with tiling and offset sliders ──
// Split view: left = raw UV gradient, right = tiled checkerboard.
// Formula: tiled = frac(UV * tile + offset)
(function() {
  var roots = document.querySelectorAll('[data-viz-uv-tile]');
  if (!roots.length) return;

// ── VIZ-DOT — dot product hemisphere lighting ──
// Drag the light arrow on the hemisphere. Surface brightness = dot(N, L).
(function() {
  var roots = document.querySelectorAll('[data-viz-dot]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas   = root.querySelector('[data-canvas]');
    var chipVal  = root.querySelector('[data-chip-val]');
    var chipDesc = root.querySelector('[data-chip-desc]');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var lightAngle = -Math.PI/2;
    var dragging = false;
    function getPos(e) {
      var r=canvas.getBoundingClientRect(), src=e.touches?e.touches[0]:e, dpr=window.devicePixelRatio||1;
      return {x:src.clientX-r.left, y:src.clientY-r.top};
    }
    canvas.addEventListener('mousedown', function(e){ dragging=true; onMove(e); e.preventDefault(); });
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', function(){ dragging=false; });
    canvas.addEventListener('touchstart', function(e){ dragging=true; onMove(e); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchmove', function(e){ onMove(e); }, {passive:false});
    canvas.addEventListener('touchend', function(){ dragging=false; });

      if (!dragging) return;

      var cx=canvas.width/2/dpr, cy=canvas.height/2/dpr;

    }

      var dpr=_vizFitCanvas(canvas);
      var W=canvas.width, H=canvas.height;

      var cx=W*0.5, cy=H*0.55, r=Math.min(W,H)*0.35;

      var numPts=60;

        var a0=Math.PI+(i/numPts)*Math.PI, a1=Math.PI+((i+1)/numPts)*Math.PI;
        var sx=Math.cos((a0+a1)/2), sy=Math.sin((a0+a1)/2);

      ctx.beginPath(); ctx.moveTo(cx-r,cy); ctx.lineTo(cx+r,cy); ctx.stroke();

      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy-nLen); ctx.stroke();
      ctx.fillStyle='#00e5ff'; ctx.beginPath(); ctx.arc(cx,cy-nLen,4*dpr,0,Math.PI*2); ctx.fill();
      ctx.font=Math.round(9*dpr)+'px JetBrains Mono, monospace'; ctx.textAlign='center';
      ctx.fillStyle='#00e5ff'; ctx.fillText('N',cx+14*dpr,cy-nLen);
      var lLen=r*0.65, lx2=cx+Lx*lLen, ly2=cy+Ly*lLen;
      ctx.strokeStyle='#ffb347'; ctx.lineWidth=2.5*dpr;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(lx2,ly2); ctx.stroke();
      ctx.fillStyle='#ffb347'; ctx.beginPath(); ctx.arc(lx2,ly2,5*dpr,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffb347'; ctx.fillText('L',lx2+14*dpr,ly2);

    draw(); window.addEventListener('resize', draw);
  }
  roots.forEach(hydrate);
})();

// ── VIZ-NORMAL-SPACE — world vs local-space normals on a rotating quad ──

(function() {
  var roots = document.querySelectorAll('[data-viz-normal-space]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas   = root.querySelector('[data-canvas]');
    var pauseBtn = root.querySelector('[data-pause]');
    var chipSt   = root.querySelector('[data-chip-state]');
    if (!canvas) return;
    var ctx=canvas.getContext('2d'), paused=false, t0=performance.now();
    if (pauseBtn) pauseBtn.addEventListener('click', function() {
      paused=!paused;
      if (chipSt) chipSt.textContent=paused?'\u25CF PAUSED':'\u25CF ROTATING';
      pauseBtn.textContent=paused?'\u25B6 PLAY':'PAUSE';
    });

      var len=36*dpr;
      ctx.strokeStyle=color; ctx.lineWidth=2*dpr;

// ── VIZ-SDF — signed distance field heatmap ──
// Cyan = inside (d<0), orange = outside (d>0), bright green = edge (d≈0).
(function() {
  var roots = document.querySelectorAll('[data-viz-sdf]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas    = root.querySelector('[data-canvas]');

        if (chipShape) chipShape.textContent=shape.toUpperCase();

      });
    });
    function sdCircle(x,y,r){ return Math.sqrt(x*x+y*y)-r; }
    function sdBox(x,y,bx,by){ var qx=Math.abs(x)-bx,qy=Math.abs(y)-by; return Math.sqrt(Math.max(qx,0)*Math.max(qx,0)+Math.max(qy,0)*Math.max(qy,0))+Math.min(Math.max(qx,qy),0); }

// ── VIZ-TRIPLANAR — three projection planes blended by animated surface normal ──

    var canvas    = root.querySelector('[data-canvas]');

    if (sharpSldr) sharpSldr.addEventListener('input', update);

// ── VIZ-PARALLAX — height-based UV offset simulating surface depth ──

        }
      }
      ctx.strokeStyle='rgba(0,229,255,0.3)'; ctx.lineWidth=dpr;
      ctx.beginPath(); ctx.moveTo(half,0); ctx.lineTo(half,H); ctx.stroke();
      ctx.font=Math.round(9*dpr)+'px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(200,210,220,0.4)';
      ctx.fillText('FLAT UV',half*0.5,H-8*dpr); ctx.fillText('PARALLAX OFFSET',half+(W-half)*0.5,H-8*dpr);
      ctx.textAlign='left';
    }
    sync(); window.addEventListener('resize', draw);
  }
  roots.forEach(hydrate);
})();

// ── VIZ-DERIVATIVE — heightmap → screen-space derivative normals ──
// HEIGHTMAP / NORMAL / SPLIT modes. Strength slider controls normal intensity.
(function() {
  var roots = document.querySelectorAll('[data-viz-derivative]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas       = root.querySelector('[data-canvas]');
    var dmodeBtns    = root.querySelectorAll('[data-dmode]');
    var strengthSldr = root.querySelector('[data-deriv-strength]');
    var derivVal     = root.querySelector('[data-deriv-val]');
    var chipMode     = root.querySelector('[data-chip-dmode]');
    if (!canvas) return;
    var ctx=canvas.getContext('2d'), dmode='height';
    dmodeBtns.forEach(function(b) {
      b.addEventListener('click', function() {
        dmode=b.getAttribute('data-dmode');
        dmodeBtns.forEach(function(x){ x.classList.toggle('active',x===b); });
        if (chipMode) chipMode.textContent=dmode.toUpperCase();
        draw();
      });
    });
    if (strengthSldr) strengthSldr.addEventListener('input', function() { if (derivVal) derivVal.textContent=strengthSldr.value; draw(); });
    function hgt(u,v){ return Math.sin(u*11.3)*0.4+Math.sin(v*8.7+1.2)*0.35+Math.sin((u+v)*6.1)*0.25; }
    var offscreen=document.createElement('canvas');
    function draw() {
      var dpr=_vizFitCanvas(canvas);
      var W=canvas.width, H=canvas.height;
      if (offscreen.width!==W||offscreen.height!==H){ offscreen.width=W; offscreen.height=H; }
      var octx=offscreen.getContext('2d'), img=octx.createImageData(W,H), data=img.data;
      var strength=parseFloat(strengthSldr?strengthSldr.value:5), half=dmode==='split'?Math.floor(W/2):0;
      function sp(px,py,r,g,b){ var i=(py*W+px)*4; data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=255; }
      for (var py=0; py<H; py++) {
        var v=py/H;
        for (var px=0; px<W; px++) {
          var u=px/W;
          var isLeft=dmode==='split'&&px<half;
          if (dmode==='height'||isLeft) {
            var h=(hgt(u,v)*0.5+0.5), br=Math.round(h*220); sp(px,py,br,br,br);
          } else {
            var su=dmode==='split'?(px-half)/half:u, sv=v, ep=1/Math.max(W,H);
            var ddx=(hgt(su+ep,sv)-hgt(su-ep,sv))/(2*ep), ddy=(hgt(su,sv+ep)-hgt(su,sv-ep))/(2*ep);
            var nx=-ddx*strength, ny=-ddy*strength, nz=1;
            var nl=Math.sqrt(nx*nx+ny*ny+nz*nz); nx/=nl; ny/=nl; nz/=nl;
            sp(px,py,Math.round((nx*0.5+0.5)*255),Math.round((ny*0.5+0.5)*255),Math.round((nz*0.5+0.5)*255));
          }
        }
      }
      octx.putImageData(img,0,0);
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#07090e'; ctx.fillRect(0,0,W,H);
      ctx.drawImage(offscreen,0,0);
      if (dmode==='split') {
        var sp2=Math.floor(W/2);
        ctx.strokeStyle='rgba(0,229,255,0.3)'; ctx.lineWidth=dpr;
        ctx.beginPath(); ctx.moveTo(sp2,0); ctx.lineTo(sp2,H); ctx.stroke();
        ctx.font=Math.round(9*dpr)+'px JetBrains Mono, monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(200,210,220,0.4)';
        ctx.fillText('HEIGHTMAP',sp2*0.5,H-8*dpr); ctx.fillText('DERIVED NORMAL (ddx/ddy)',sp2+(W-sp2)*0.5,H-8*dpr);
        ctx.textAlign='left';
      }
    }
    draw(); window.addEventListener('resize', draw);
  }
  roots.forEach(hydrate);
})();

// ── VIZ-DEPTH-INTERSECT — scene depth foam/glow at geometry waterline ──
// Translucent plane intersects an opaque shape. depthDiff drives foam band.
(function() {
  var roots = document.querySelectorAll('[data-viz-depth-intersect]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas    = root.querySelector('[data-canvas]');
    var angleSldr = root.querySelector('[data-surf-angle]');
    var surfVal   = root.querySelector('[data-surf-val]');
    var foamSldr  = root.querySelector('[data-foam-width]');
    var foamVal   = root.querySelector('[data-foam-val]');
    var chipAngle = root.querySelector('[data-chip-angle]');
    var chipFoam  = root.querySelector('[data-chip-foam]');
    if (!canvas) return;
    var ctx=canvas.getContext('2d');
    function sync() {
      var a=parseInt(angleSldr?angleSldr.value:0), f=parseInt(foamSldr?foamSldr.value:12);
      if (surfVal) surfVal.textContent=a+'\xB0'; if (foamVal) foamVal.textContent=f;
      if (chipAngle) chipAngle.textContent='surface '+a+'\xB0';
      if (chipFoam)  chipFoam.textContent=f<5?'foam thin':f<20?'foam active':'foam wide';
    }
    [angleSldr,foamSldr].forEach(function(s){ if(s) s.addEventListener('input',sync); });
    function frame(ts) {
      requestAnimationFrame(frame);
      var t=ts*0.001, dpr=_vizFitCanvas(canvas);
      var W=canvas.width, H=canvas.height;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#07090e'; ctx.fillRect(0,0,W,H);
      var deg=parseFloat(angleSldr?angleSldr.value:0), fwPx=parseFloat(foamSldr?foamSldr.value:12)*dpr;
      var tilt=Math.tan(deg*Math.PI/180);
      var rcx=W*0.5, rcy=H*0.55, rw=W*0.22, rh=H*0.28;
      ctx.fillStyle='#2a3545'; ctx.beginPath(); ctx.ellipse(rcx,rcy,rw,rh,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#3a4d60'; ctx.lineWidth=dpr; ctx.beginPath(); ctx.ellipse(rcx,rcy,rw,rh,0,0,Math.PI*2); ctx.stroke();
      var planeY=H*0.48+tilt*W*0.3;
      var grad=ctx.createLinearGradient(0,planeY-4*dpr,0,planeY+H*0.3);
      grad.addColorStop(0,'rgba(20,80,160,0.75)'); grad.addColorStop(1,'rgba(20,80,160,0.10)');
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.moveTo(0,planeY); ctx.lineTo(W,planeY+tilt*W); ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
      for (var fx=0; fx<W; fx+=2) {
        var fBase=planeY+tilt*fx;
        var rockEdge=rcy-rh*Math.sqrt(Math.max(0,1-Math.pow((fx-rcx)/rw,2)));
        var diff=fBase-rockEdge, foamAmt=(diff>0&&diff<fwPx)?1-diff/fwPx:0;
        if (foamAmt>0) {
          var noiseOff=Math.sin(fx*0.15+t*2.5)*2*dpr;
          ctx.fillStyle='rgba(160,220,255,'+(foamAmt*0.9)+')';
          ctx.fillRect(fx, fBase+noiseOff-1.5*dpr, 2, 3*dpr);
        }
      }
      ctx.font=Math.round(9*dpr)+'px JetBrains Mono, monospace'; ctx.textAlign='left';
      ctx.fillStyle='rgba(100,160,220,0.7)'; ctx.fillText('translucent surface',6*dpr,planeY-6*dpr);
      ctx.fillStyle='rgba(160,220,255,0.7)'; ctx.fillText('foam (SceneDepth\u2212PixelDepth < FoamWidth)',6*dpr,H-8*dpr);
    }
    sync(); requestAnimationFrame(frame);
  }
  roots.forEach(hydrate);
})();

// ── VIZ-FOURIER — harmonic frequency stacking into complex waveform ──
// Each row: one harmonic. Bottom row: their sum (fBm waveform).
(function() {
  var roots = document.querySelectorAll('[data-viz-fourier]');
  if (!roots.length) return;
  function hydrate(root) {
    var canvas    = root.querySelector('[data-canvas]');
    var nFreqSldr = root.querySelector('[data-nfreqs]');
    var freqsVal  = root.querySelector('[data-freqs-val]');
    var chipN     = root.querySelector('[data-chip-nfreqs]');
    if (!canvas) return;
    var ctx=canvas.getContext('2d');
    if (nFreqSldr) nFreqSldr.addEventListener('input', function() {
      if (freqsVal) freqsVal.textContent=nFreqSldr.value;
      if (chipN) chipN.textContent=nFreqSldr.value+' frequenc'+(nFreqSldr.value=='1'?'y':'ies');
    });
    var COLORS=['#ff6b35','#ffb347','#b8ff57','#00e5ff','#c77dff','#ff4da6','#40c8ff','#80ff80'];
    function frame(ts) {
      requestAnimationFrame(frame);
      var t=ts*0.001, nF=parseInt(nFreqSldr?nFreqSldr.value:3);
      var dpr=_vizFitCanvas(canvas);
      var W=canvas.width, H=canvas.height;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#07090e'; ctx.fillRect(0,0,W,H);
      var totalRows=nF+1, rowH=H/totalRows, PAD=8*dpr;
      for (var fi=0; fi<nF; fi++) {
        var rowY=fi*rowH, midY=rowY+rowH*0.5, amp=rowH*0.38/(fi+1), freq=Math.pow(2,fi);
        ctx.strokeStyle=COLORS[fi%COLORS.length]; ctx.lineWidth=1.5*dpr; ctx.beginPath();
        for (var x=0; x<=W; x++) { var y=midY-Math.sin((x/W*freq*Math.PI*4)+t*freq*0.5)*amp; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
        ctx.stroke();
        ctx.font=Math.round(9*dpr)+'px JetBrains Mono, monospace'; ctx.textAlign='left';
        ctx.fillStyle=COLORS[fi%COLORS.length]; ctx.fillText('f'+freq+' (amp='+(1/(fi+1)).toFixed(2)+')',PAD,rowY+12*dpr);
        ctx.strokeStyle='#1a2535'; ctx.lineWidth=dpr;
        ctx.beginPath(); ctx.moveTo(0,rowY+rowH); ctx.lineTo(W,rowY+rowH); ctx.stroke();
      }
      var sumY=nF*rowH, sumMid=sumY+rowH*0.5, sumAmp=rowH*0.38;
      ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2*dpr; ctx.beginPath();
      for (var x2=0; x2<=W; x2++) {
        var sum=0,ampSum=0;
        for (var fi2=0; fi2<nF; fi2++){ var f2=Math.pow(2,fi2),a2=1/(fi2+1); sum+=Math.sin((x2/W*f2*Math.PI*4)+t*f2*0.5)*a2; ampSum+=a2; }
        var y2=sumMid-(sum/ampSum)*sumAmp; x2===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);
      }
      ctx.stroke();
      ctx.font=Math.round(9*dpr)+'px JetBrains Mono, monospace'; ctx.textAlign='left';
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fillText('SUM (fBm waveform)',PAD,sumY+12*dpr);
    }
    requestAnimationFrame(frame);
  }
  roots.forEach(hydrate);
})();
</script>
</body>
