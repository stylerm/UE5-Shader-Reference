document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

accent3:   #b8ff57;\n  --muted:     #4a5568;\n  --text:      #cdd6e0;\n  --text-dim:  #6b7a8d;\n  --code-bg:   #080b0f;\n  --good:      #b8ff57;\n  --bad:       #ff5757;\n  --warn:      #ffb347;\n  --font-mono: 'JetBrains Mono', monospace;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\n\nbody {\n  background: var(--bg);\n  color: var(--text);\n  font-family: 'Inter', sans-serif;\n  font-size: 18px;\n  line-height: 1.6;\n  padding: 32px 24px 60px 185px; /* left = sidenav width (165px) + 20px gap */\n  min-height: 100vh;\n  background-image:\n    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,229,255,0.06) 0%, transparent 70%),\n    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,37,48,0.4) 39px, rgba(30,37,48,0.4) 40px),\n    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,37,48,0.2) 39px, rgba(30,37,48,0.2) 40px);\n}\n\n.page { max-width: 1100px; margin: 0 auto; padding: 0 24px; }\n\n/* ── SIDENAV ── */\n.sidenav {\n  position: fixed;\n  left: 0; top: 0; bottom: 0;\n  width: 165px;\n  background: rgba(8,10,14,0.98);\n  border-right: 1px solid var(--border);\n  display: flex;\n  flex-direction: column;\n  z-index: 200;\n  overflow-y: auto;\n  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);\n}\n.sidenav-brand {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--accent);\n  padding: 22px 16px 18px;\n  letter-spacing: 0.12em;\n  line-height: 1.7;\n  border-bottom: 1px solid var(--border);\n  text-decoration: none;\n  display: block;\n}\n.sidenav-brand:hover { opacity: 0.8; }\n.sidenav-links {\n  display: flex;\n  flex-direction: column;\n  padding: 14px 0;\n}\n.sidenav-links a {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-dim);\n  text-decoration: none;\n  padding: 11px 16px;\n  letter-spacing: 0.08em;\n  transition: color 0.15s, background 0.15s, border-color 0.15s;\n  border-left: 2px solid transparent;\n  display: block;\n}\n.sidenav-links a:hover {\n  color: var(--accent);\n  background: rgba(0,229,255,0.05);\n  border-left-color: rgba(0,229,255,0.3);\n}\n.sidenav-links a.active {\n  color: var(--accent);\n  border-left-color: var(--accent);\n  background: rgba(0,229,255,0.08);\n}\n.sidenav-links a.active-section {\n  color: var(--accent);\n  border-left-color: rgba(0,229,255,0.5);\n  background: rgba(0,229,255,0.04);\n}\n/* Active section link inside optim area gets warm highlight */\n.sidenav-links a[data-area=\"optim\"].active-section {\n  color: var(--accent2);\n  border-left-color: rgba(255,107,53,0.5);\n  background: rgba(255,107,53,0.04);\n}\n.sidenav-section {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--muted);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  padding: 16px 16px 6px;\n}\n.sidenav-divider {\n  height: 1px;\n  background: var(--border);\n  margin: 10px 16px;\n}\n\n/* Mobile nav overlay backdrop */\n.nav-overlay {\n  display: none;\n  position: fixed;\n  inset: 0;\n  background: rgba(0,0,0,0.6);\n  z-index: 190;\n  backdrop-filter: blur(2px);\n}\n.nav-overlay.open { display: block; }\n\n/* ── NAV ── */\n.topbar {\n  position: sticky;\n  top: 0;\n  z-index: 100;\n  background: rgba(10,12,16,0.92);\n  backdrop-filter: blur(10px);\n  border-bottom: 1px solid var(--border);\n  margin: -32px -24px 28px;\n  padding: 10px 24px;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  flex-wrap: wrap;\n}\n.topbar-spacer { flex: 1; }\n.topbar a {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  color: var(--text-dim);\n  text-decoration: none;\n  padding: 4px 10px;\n  border-radius: 2px;\n  letter-spacing: 0.1em;\n  transition: color 0.15s, background 0.15s;\n}\n.topbar a:hover { color: var(--accent); background: rgba(0,229,255,0.06); }\n.topbar a.active { color: var(--accent); background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); }\n.topbar .sep { color: var(--border); font-size: 14px; }\n.gh-link {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--text-dim) !important;\n  border: 1px solid var(--border) !important;\n  display: flex;\n  align-items: center;\n  gap: 5px;\n}\n.gh-link:hover { color: var(--accent) !important; border-color: var(--accent) !important; }\n\n/* Hamburger — hidden on desktop, shown on mobile */\n.menu-toggle {\n  display: none;\n  background: none;\n  border: 1px solid var(--border);\n  border-radius: 2px;\n  color: var(--text-dim);\n  font-size: 16px;\n  line-height: 1;\n  padding: 4px 9px;\n  cursor: pointer;\n  font-family: var(--font-mono);\n  transition: color 0.15s, border-color 0.15s;\n}\n.menu-toggle:hover { color: var(--accent); border-color: var(--accent); }\n\n/* ── HEADER ── */\n.header {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  border-bottom: 2px solid var(--accent);\n  padding-bottom: 14px;\n  margin-bottom: 28px;\n  gap: 16px;\n  flex-wrap: wrap;\n}\n.header-left { display: flex; flex-direction: column; gap: 2px; }\n.header-tag {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--accent);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n}\nh1 {\n  font-size: 44px;\n  font-weight: 900;\n  letter-spacing: -0.02em;\n  line-height: 1;\n  color: #fff;\n}\nh1 span { color: var(--accent); }\n.header-right {\n  font-family: var(--font-mono);\n  font-size: 14px;\n  color: var(--text-dim);\n  text-align: right;\n  line-height: 1.8;\n}\n.header-right strong { color: var(--accent2); }\n\n/* ══ AREA WRAPPERS ════════════════════════════════════════════════════════════\n   .area-ref  → cool cyan palette (default)\n   .area-optim → warm amber/orange palette, distinct surface tint\n   ══════════════════════════════════════════════════════════════════════════ */\n.area { position: relative; }\n\n/* Reference area — no extra changes, inherits root variables */\n.area.area-ref .area-heading {\n  color: var(--accent);\n  border-bottom-color: rgba(0,229,255,0.25);\n}\n\n/* Optimization area — warm surface overrides.\n   Selectors are scoped with `.area.area-optim` so they don't leak onto the\n   sidenav divider / section label, which also carry the `area-optim` class. */\n.area.area-optim {\n  --surface:  #120e0a;          /* warm dark surface for cards */\n  --border:   #2c1d0f;          /* warm amber border */\n  --code-bg:  #0c0906;          /* deeper warm bg for code */\n  margin-top: 8px;\n  padding: 24px 20px 4px;\n  border: 1px solid rgba(255,107,53,0.15);\n  border-radius: 6px;\n  background: rgba(255,107,53,0.025);\n  position: relative;\n}\n/* Vertical accent stripe on the left edge */\n.area.area-optim::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: 3px;\n  border-radius: 6px 0 0 6px;\n  background: linear-gradient(to bottom, var(--accent2), rgba(255,107,53,0.2));\n}\n.area.area-optim .area-heading {\n  color: var(--accent2);\n  border-bottom-color: rgba(255,107,53,0.3);\n}\n/* Section labels inside optim area get warm muted color */\n.area.area-optim .section-label {\n  color: rgba(255, 150, 80, 0.55);\n}\n.area.area-optim .section-label::after {\n  background: rgba(255,107,53,0.18);\n}\n/* Warm accent bars on cards inside the optim area */\n.area.area-optim .card.blue::before   { background: var(--accent); }\n.area.area-optim .card.orange::before { background: var(--accent2); }\n.area.area-optim .card.green::before  { background: var(--accent3); }\n.area.area-optim .card.red::before    { background: var(--bad); }\n.area.area-optim .card.yellow::before { background: var(--warn); }\n\n/* Engine-internals area — cool slate-green palette, distinct from both\n   cool-cyan ref and warm-amber optim. Signals \"source-verified / reference\"\n   content without overloading the existing accents. */\n.area.area-engine {\n  --surface: #0a1210;\n  --border:  #1a2a22;\n  --code-bg: #05090a;\n  margin-top: 8px;\n  padding: 24px 20px 4px;\n  border: 1px solid rgba(184,255,87,0.15);\n  border-radius: 6px;\n  background: rgba(184,255,87,0.02);\n  position: relative;\n}\n.area.area-engine::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: 3px;\n  border-radius: 6px 0 0 6px;\n  background: linear-gradient(to bottom, var(--accent3), rgba(184,255,87,0.2));\n}\n.area.area-engine .area-heading {\n  color: var(--accent3);\n  border-bottom-color: rgba(184,255,87,0.3);\n}\n.area.area-engine .section-label {\n  color: rgba(184,255,87,0.55);\n}\n.area.area-engine .section-label::after {\n  background: rgba(184,255,87,0.18);\n}\n\n/* ══ SUBPAGE TABS ═════════════════════════════════════════════════════════════\n   Subpage switching lives in the sidenav (.sidenav-subpage-tabs) so it\n   stays reachable while scrolling without returning to the page top.\n   Active tab is driven by body.subpage-<theme>; CSS below hides the\n   inactive panel and filters the sidenav anchors to match.\n   ══════════════════════════════════════════════════════════════════════════ */\n\n/* Sidenav subpage switcher — stacks below page links, above anchors */\n.sidenav-subpage-tabs {\n  display: flex;\n  flex-direction: column;\n  gap: 2px;\n  padding: 4px 0 6px;\n}\n.sidenav-subpage-tabs .subpage-tab {\n  display: flex;\n  flex-direction: row;\n  align-items: center;\n  gap: 8px;\n  width: 100%;\n  padding: 7px 16px;\n  background: none;\n  border: none;\n  border-left: 3px solid transparent;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--muted);\n  cursor: pointer;\n  text-align: left;\n  transition: color 0.15s, border-color 0.15s, background 0.15s;\n}\n.sidenav-subpage-tabs .subpage-tab-icon { font-size: 14px; opacity: 0.7; flex-shrink: 0; }\n.sidenav-subpage-tabs .subpage-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }\n.sidenav-subpage-tabs .subpage-tab.active[data-subpage=\"ref\"] {\n  color: var(--accent); border-left-color: var(--accent); background: rgba(0,229,255,0.06);\n}\n.sidenav-subpage-tabs .subpage-tab.active[data-subpage=\"ref\"] .subpage-tab-icon { opacity: 1; }\n.sidenav-subpage-tabs .subpage-tab.active[data-subpage=\"optim\"] {\n  color: var(--accent2); border-left-color: var(--accent2); background: rgba(255,107,53,0.06);\n}\n.sidenav-subpage-tabs .subpage-tab.active[data-subpage=\"optim\"] .subpage-tab-icon { opacity: 1; }\n.sidenav-subpage-tabs .subpage-tab.active[data-subpage=\"engine\"] {\n  color: var(--accent3); border-left-color: var(--accent3); background: rgba(184,255,87,0.06);\n}\n.sidenav-subpage-tabs .subpage-tab.active[data-subpage=\"engine\"] .subpage-tab-icon { opacity: 1; }\n\n/* Panel visibility — hide the non-active subpage entirely */\n.subpage { display: none; }\nbody.subpage-ref    .subpage[data-subpage=\"ref\"],\nbody.subpage-optim  .subpage[data-subpage=\"optim\"],\nbody.subpage-engine .subpage[data-subpage=\"engine\"] { display: block; }\n\n/* Collapse the area padding/border when the panel is the only visible child —\n   the area-optim wrapper already looks like a \"card,\" so keep its styling. */\n.subpage > .area { margin-top: 0; }\n\n/* The area-heading repeats what the active tab already says, so hide it\n   once the content lives inside a subpage panel. */\n.subpage > .area > .area-heading { display: none; }\n.subpage > .area > .area-heading + .section-label { margin-top: 8px; }\n\n/* Sidenav filtering — hide anchors and dividers that belong to the inactive\n   subpage. Uses the data-area / class attributes emitted by build.py. */\nbody.subpage-ref .sidenav-links a[data-area=\"optim\"],\nbody.subpage-ref .sidenav-links .sidenav-divider.area-optim,\nbody.subpage-ref .sidenav-links .sidenav-section.area-optim {\n  display: none;\n}\nbody.subpage-optim .sidenav-links a[data-area=\"ref\"],\nbody.subpage-optim .sidenav-links .sidenav-divider.area-ref,\nbody.subpage-optim .sidenav-links .sidenav-section.area-ref,\nbody.subpage-optim .sidenav-links a[data-area=\"engine\"],\nbody.subpage-optim .sidenav-links .sidenav-divider.area-engine,\nbody.subpage-optim .sidenav-links .sidenav-section.area-engine {\n  display: none;\n}\nbody.subpage-engine .sidenav-links a[data-area=\"ref\"],\nbody.subpage-engine .sidenav-links .sidenav-divider.area-ref,\nbody.subpage-engine .sidenav-links .sidenav-section.area-ref,\nbody.subpage-engine .sidenav-links a[data-area=\"optim\"],\nbody.subpage-engine .sidenav-links .sidenav-divider.area-optim,\nbody.subpage-engine .sidenav-links .sidenav-section.area-optim {\n  display: none;\n}\n/* Update the ref→optim rule to also hide engine anchors when ref is active */\nbody.subpage-ref .sidenav-links a[data-area=\"engine\"],\nbody.subpage-ref .sidenav-links .sidenav-divider.area-engine,\nbody.subpage-ref .sidenav-links .sidenav-section.area-engine {\n  display: none;\n}\n\n/* ── AREA HEADING (shared base) ── */\n.area-heading {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  padding: 0 0 10px;\n  border-bottom: 1px solid;\n  margin-bottom: 6px;\n}\n.area-heading + .section-label { margin-top: 22px; }\n\n/* ── SECTION LABELS ── */\n.section-label {\n  font-size: 12px;\n  letter-spacing: 0.3em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin: 56px 0 14px;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n.section-label::after {\n  content: '';\n  flex: 1;\n  height: 1px;\n  background: var(--border);\n}\n\n/* ── PRIORITY SECTION HIGHLIGHT ── */\n.section-label[data-priority=\"high\"] {\n  color: var(--accent);\n}\n.section-label[data-priority=\"high\"]::after {\n  background: rgba(0,229,255,0.25);\n}\n.section-label[data-priority=\"high\"] + .grid,\n.section-label[data-priority=\"high\"] + .grid-2 {\n  border-left: 2px solid rgba(0,229,255,0.25);\n  padding-left: 14px;\n  margin-left: -16px;\n  background: rgba(0,229,255,0.015);\n  border-radius: 0 4px 4px 0;\n  padding-top: 8px;\n  padding-bottom: 8px;\n}\n/* Warm variant inside optim areas */\n.area.area-optim .section-label[data-priority=\"high\"] {\n  color: var(--accent2);\n}\n.area.area-optim .section-label[data-priority=\"high\"]::after {\n  background: rgba(255,107,53,0.3);\n}\n.area.area-optim .section-label[data-priority=\"high\"] + .grid,\n.area.area-optim .section-label[data-priority=\"high\"] + .grid-2 {\n  border-left-color: rgba(255,107,53,0.25);\n  background: rgba(255,107,53,0.015);\n}\n\n/* ── GRID ── */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 14px;\n}\n.grid-2 { grid-template-columns: repeat(2, 1fr); }\n.grid-full { grid-column: 1 / -1; }\n.span-2 { grid-column: span 2; }\n\n/* ── CARDS ── */\n.card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: 4px;\n  padding: 18px;\n  position: relative;\n  overflow: hidden;\n}\n.card::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 2px;\n}\n.card.blue::before   { background: var(--accent); }\n.card.orange::before { background: var(--accent2); }\n.card.green::before  { background: var(--accent3); }\n.card.red::before    { background: var(--bad); }\n.card.yellow::before { background: var(--warn); }\n\n.card-title {\n  font-size: 13px;\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  margin-bottom: 14px;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.card.blue .card-title   { color: var(--accent); }\n.card.orange .card-title { color: var(--accent2); }\n.card.green .card-title  { color: var(--accent3); }\n.card.red .card-title    { color: var(--bad); }\n.card.yellow .card-title { color: var(--warn); }\n\n.dot {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  display: inline-block;\n  flex-shrink: 0;\n}\n.blue .dot   { background: var(--accent);  box-shadow: 0 0 6px var(--accent); }\n.orange .dot { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }\n.green .dot  { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }\n.red .dot    { background: var(--bad);     box-shadow: 0 0 6px var(--bad); }\n.yellow .dot { background: var(--warn);    box-shadow: 0 0 6px var(--warn); }\n\n/* ── CODE ── */\ncode {\n  font-family: var(--font-mono);\n  font-size: 15px;\n  background: var(--code-bg);\n  border: 1px solid var(--border);\n  border-radius: 3px;\n  padding: 1px 5px;\n  color: #e8f4f8;\n}\npre {\n  font-family: var(--font-mono);\n  font-size: 14px;\n  background: var(--code-bg);\n  border: 1px solid var(--border);\n  border-radius: 3px;\n  padding: 12px 14px;\n  line-height: 1.7;\n  overflow-x: auto;\n  color: #c5dce8;\n  -webkit-overflow-scrolling: touch;\n}\npre .c  { color: var(--muted); }\npre .kw { color: var(--accent); }\npre .fn { color: var(--accent2); }\npre .n  { color: var(--accent3); }\n\n/* ── ROWS ── */\n.row-list { display: flex; flex-direction: column; gap: 8px; }\n.row {\n  display: grid;\n  /* label: as wide as its content up to 45% of card; text: rest */\n  grid-template-columns: fit-content(45%) 1fr;\n  gap: 6px 12px;\n  font-size: 16px;\n  align-items: baseline;\n}\n.row-label {\n  font-weight: 700;\n  font-size: 13px;\n  letter-spacing: 0.04em;\n  color: var(--text-dim);\n  word-break: break-word;\n}\n/* Text cell must be allowed to shrink below intrinsic width */\n.row-text { min-width: 0; }\n\n/* ── STACKED ROWLIST — label above text, one column wide ── */\n.row-list.stacked { gap: 12px; }\n.row-list.stacked .row {\n  grid-template-columns: 1fr;\n  gap: 3px;\n  padding-bottom: 10px;\n  border-bottom: 1px solid rgba(255,255,255,0.05);\n}\n.row-list.stacked .row:last-child { border-bottom: none; padding-bottom: 0; }\n.row-list.stacked .row-label {\n  font-size: 13px;\n  letter-spacing: 0.06em;\n  color: var(--text-dim);\n}\n.row-list.stacked .row-text {\n  font-size: 15px;\n  color: var(--text);\n  line-height: 1.55;\n}\n\n/* ── TABLE ── */\n.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }\ntable { width: 100%; border-collapse: collapse; font-size: 15px; }\nth {\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--text-dim);\n  padding: 7px 10px;\n  text-align: left;\n  border-bottom: 1px solid var(--border);\n  white-space: nowrap;\n}\ntd {\n  padding: 7px 10px;\n  border-bottom: 1px solid rgba(30,37,48,0.6);\n  vertical-align: top;\n  line-height: 1.5;\n}\ntr:last-child td { border-bottom: none; }\ntd.bad  { color: var(--bad); }\ntd.good { color: var(--good); }\ntd.note { color: var(--text-dim); font-size: 13.5px; max-width: 42ch; word-wrap: break-word; }\n/* Conversion tables — constrain code columns, let notes wrap */\ntable.table-conversion td:nth-child(1),\ntable.table-conversion td:nth-child(2) { white-space: nowrap; width: 1%; }\ntable.table-conversion td:nth-child(3) { max-width: 42ch; }\n/* Feature matrix / multi-col reference tables */\ntable.table-multi td:first-child { white-space: nowrap; font-weight: 600; }\ntable.table-multi td { max-width: 48ch; word-wrap: break-word; }\n\n/* ── CHECKLIST ── */\n.checklist { display: flex; flex-direction: column; gap: 8px; }\n.check-item {\n  display: flex;\n  align-items: baseline;\n  gap: 9px;\n  font-size: 16px;\n}\n.check-icon {\n  font-family: var(--font-mono);\n  font-size: 14px;\n  flex-shrink: 0;\n}\n.check-icon.ok   { color: var(--good); }\n.check-icon.no   { color: var(--bad); }\n.check-icon.warn { color: var(--warn); }\n.check-item strong { color: #fff; font-weight: 700; }\n\n/* ── PROMPT / TEMPLATE CARD ── */\n.prompt-box {\n  position: relative;\n  background: rgba(0,229,255,0.03);\n  border: 1px solid rgba(0,229,255,0.18);\n  border-radius: 5px;\n  padding: 32px 18px 16px;\n  font-family: var(--font-mono);\n  font-size: 14px;\n  line-height: 1.85;\n  color: var(--text);\n  white-space: pre;\n  overflow-x: auto;\n  -webkit-overflow-scrolling: touch;\n}\n.prompt-box::before {\n  content: 'TEMPLATE';\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  padding: 4px 12px;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  color: var(--accent);\n  background: rgba(0,229,255,0.06);\n  border-bottom: 1px solid rgba(0,229,255,0.12);\n  border-radius: 5px 5px 0 0;\n}\n.prompt-box .ph { color: var(--accent2); }\n.prompt-box .kw { color: var(--accent); }\n.prompt-box .cm { color: var(--muted); }\n\n/* ── COPY BUTTON ── */\n.copy-btn {\n  position: absolute;\n  top: 6px;\n  right: 8px;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  letter-spacing: 0.08em;\n  color: var(--text-dim);\n  background: transparent;\n  border: 1px solid var(--border);\n  border-radius: 2px;\n  padding: 2px 7px;\n  cursor: pointer;\n  transition: color 0.15s, border-color 0.15s;\n  z-index: 1;\n}\n.copy-btn:hover { color: var(--accent); border-color: var(--accent); }\n.copy-btn.copied { color: var(--good); border-color: var(--good); }\n\n/* ── SEARCH ── */\n#search-input {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: 0.1em;\n  background: var(--code-bg);\n  border: 1px solid var(--border);\n  border-radius: 2px;\n  color: var(--text);\n  padding: 4px 10px;\n  width: 120px;\n  outline: none;\n  transition: border-color 0.15s, width 0.2s;\n}\n#search-input:focus {\n  border-color: var(--accent);\n  width: 180px;\n}\n#search-input::placeholder {\n  color: var(--muted);\n  letter-spacing: 0.15em;\n}\n.card.dimmed, .section-label.dimmed { opacity: 0.15; pointer-events: none; }\n\n/* ── CONTRIBUTE BANNER ── */\n.contribute {\n  margin-top: 28px;\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-left: 3px solid var(--accent3);\n  border-radius: 4px;\n  padding: 18px 20px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n  flex-wrap: wrap;\n}\n.contribute-text h3 {\n  font-size: 20px;\n  font-weight: 700;\n  color: var(--accent3);\n  margin-bottom: 4px;\n  letter-spacing: 0.05em;\n}\n.contribute-text p {\n  font-size: 16px;\n  color: var(--text-dim);\n  max-width: 560px;\n}\n.contribute-text p a { color: var(--accent); text-decoration: none; }\n.contribute-text p a:hover { text-decoration: underline; }\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 7px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.1em;\n  color: #0a0c10;\n  background: var(--accent3);\n  border: none;\n  border-radius: 3px;\n  padding: 10px 18px;\n  text-decoration: none;\n  font-weight: 700;\n  cursor: pointer;\n  transition: opacity 0.15s;\n  white-space: nowrap;\n}\n.btn:hover { opacity: 0.85; }\n\n/* ── HUB CARDS ── */\n.hub-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 18px;\n  margin: 20px 0;\n}\n.hub-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: 6px;\n  padding: 28px 24px;\n  text-decoration: none;\n  transition: border-color 0.2s, transform 0.15s;\n  position: relative;\n  overflow: hidden;\n}\n.hub-card:hover {\n  border-color: var(--accent);\n  transform: translateY(-2px);\n}\n.hub-card::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  height: 3px;\n}\n.hub-card.blue::before   { background: var(--accent); }\n.hub-card.orange::before { background: var(--accent2); }\n.hub-card.green::before  { background: var(--accent3); }\n.hub-card-icon {\n  font-size: 28px;\n  margin-bottom: 10px;\n  display: block;\n}\n.hub-card-title {\n  font-family: var(--font-mono);\n  font-size: 16px;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: #fff;\n  margin-bottom: 8px;\n}\n.hub-card-desc {\n  font-size: 16px;\n  color: var(--text-dim);\n  line-height: 1.5;\n}\n.hub-card-count {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--muted);\n  margin-top: 12px;\n  letter-spacing: 0.1em;\n}\n\n/* ── DIAGNOSTIC HUB (task / symptom rows on index.html) ── */\n.diagnostic-row { margin: 22px 0 8px; }\n.diagnostic-row-label {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin: 18px 0 10px;\n  padding-bottom: 6px;\n  border-bottom: 1px solid var(--border);\n}\n.task-grid,\n.symptom-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 12px;\n}\n.task-card,\n.symptom-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-left: 3px solid var(--accent);\n  border-radius: 4px;\n  padding: 14px 16px;\n  text-decoration: none;\n  transition: border-color 0.2s, transform 0.15s, background 0.2s;\n  display: block;\n}\n.task-card:hover {\n  border-color: var(--accent);\n  border-left-color: var(--accent);\n  transform: translateY(-1px);\n  background: rgba(0, 217, 255, 0.03);\n}\n.symptom-card {\n  border-left-color: var(--warn);\n}\n.symptom-card:hover {\n  border-color: var(--warn);\n  border-left-color: var(--warn);\n  transform: translateY(-1px);\n  background: rgba(255, 179, 71, 0.04);\n}\n.task-card-icon,\n.symptom-card-icon {\n  font-size: 18px;\n  margin-right: 6px;\n  vertical-align: -2px;\n}\n.task-card-title,\n.symptom-card-title {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  color: #fff;\n  margin: 4px 0 6px;\n  display: inline;\n}\n.task-card-desc,\n.symptom-card-desc {\n  font-size: 13px;\n  color: var(--text-dim);\n  line-height: 1.45;\n  margin-top: 6px;\n}\n.task-card-desc code,\n.symptom-card-desc code {\n  font-size: 12px;\n  color: var(--accent);\n  background: rgba(0, 217, 255, 0.06);\n  padding: 1px 4px;\n  border-radius: 3px;\n}\n\n@media (max-width: 900px) {\n  .task-grid, .symptom-grid { grid-template-columns: repeat(2, 1fr); }\n}\n@media (max-width: 600px) {\n  .task-grid, .symptom-grid { grid-template-columns: 1fr; gap: 8px; }\n}\n\n/* ── FOOTER ── */\n.footer {\n  margin-top: 24px;\n  border-top: 1px solid var(--border);\n  padding-top: 12px;\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--muted);\n  flex-wrap: wrap;\n  gap: 6px;\n}\n.footer a { color: var(--accent); text-decoration: none; }\n.footer a:hover { text-decoration: underline; }\n\n/* ── PRINT ── */\n@media print {\n  body {\n    background: #fff !important;\n    background-image: none !important;\n    color: #111 !important;\n    font-size: 11pt;\n    padding: 0;\n  }\n  .sidenav, .topbar, .contribute, .gh-link, .menu-toggle, .nav-overlay { display: none !important; }\n  .page { max-width: 100%; padding: 12px; }\n  .grid, .grid-2, .hub-grid { grid-template-columns: 1fr !important; gap: 8px; }\n  .grid-full, .span-2 { grid-column: span 1; }\n  .area.area-optim { border: 1px solid #ccc !important; background: #fdf8f5 !important; }\n  .area.area-optim::before { display: none; }\n  /* Print: show both subpages so the PDF contains everything */\n  .subpage { display: block !important; }\n  .subpage-tabs { display: none !important; }\n  .card, .hub-card {\n    background: #fff !important;\n    border: 1px solid #ccc !important;\n    break-inside: avoid;\n    page-break-inside: avoid;\n  }\n  .card::before, .hub-card::before { background: #666 !important; }\n  .card-title { color: #111 !important; }\n  .dot { box-shadow: none !important; }\n  code { background: #f0f0f0 !important; border-color: #ccc !important; color: #111 !important; }\n  pre, .prompt-box { background: #f8f8f8 !important; border-color: #ccc !important; color: #111 !important; }\n  .section-label { color: #333 !important; }\n  .area-heading { color: #111 !important; border-bottom-color: #999 !important; }\n  .section-label::after { background: #ccc !important; }\n  .header { border-bottom-color: #333 !important; }\n  h1, h1 span { color: #111 !important; }\n  .header-tag, .header-right { color: #555 !important; }\n  .header-right strong { color: #111 !important; }\n  td.bad { color: #c00 !important; }\n  td.good { color: #060 !important; }\n  td.note { color: #555 !important; }\n  th { color: #333 !important; border-bottom-color: #ccc !important; }\n  td { border-bottom-color: #eee !important; }\n  .check-icon.ok { color: #060 !important; }\n  .check-icon.no { color: #c00 !important; }\n  .check-icon.warn { color: #a60 !important; }\n  .row-label { color: #333 !important; }\n  .footer { color: #666 !important; }\n  .footer a { color: #333 !important; }\n  .copy-btn { display: none !important; }\n}\n\n/* ─────────────────────────────────────────────────────────────────────────────\n   RESPONSIVE\n   Desktop (>1100px): sidenav 165px fixed, body padding-left 185px\n   Tablet  (900-1100px): sidenav 140px, body padding-left 160px\n   Mobile  (<600px): sidenav off-canvas slide-in, hamburger button visible\n───────────────────────────────────────────────────────────────────────────── */\n\n/* ── Tablet ── */\n@media (max-width: 1100px) {\n  .sidenav { width: 140px; }\n  body { padding-left: 160px; }\n}\n\n/* ── Small screens — stacked tables for 3+ col ── */\n@media (max-width: 640px) {\n  table.table-conversion,\n  table.table-conversion thead,\n  table.table-conversion tbody,\n  table.table-conversion tr,\n  table.table-conversion th,\n  table.table-conversion td {\n    display: block;\n    width: 100%;\n  }\n  table.table-conversion { min-width: 0; }\n  table.table-conversion thead { display: none; }\n  table.table-conversion tr {\n    background: rgba(255,255,255,0.02);\n    border: 1px solid var(--border);\n    border-radius: 4px;\n    padding: 10px 12px;\n    margin-bottom: 8px;\n  }\n  table.table-conversion td {\n    border-bottom: none;\n    padding: 2px 0;\n    white-space: normal;\n    width: auto;\n  }\n  table.table-conversion td::before {\n    display: block;\n    font-size: 9px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--text-dim);\n    margin-bottom: 1px;\n  }\n  table.table-conversion td:nth-child(1)::before { content: attr(data-label); }\n  table.table-conversion td:nth-child(2)::before { content: attr(data-label); }\n  table.table-conversion td:nth-child(3)::before { content: attr(data-label); }\n  table.table-conversion td:nth-child(3) { max-width: none; }\n  table.table-conversion td.note { font-size: 12px; margin-top: 4px; }\n\n  table.table-multi,\n  table.table-multi thead,\n  table.table-multi tbody,\n  table.table-multi tr,\n  table.table-multi th,\n  table.table-multi td {\n    display: block;\n    width: 100%;\n  }\n  table.table-multi { min-width: 0; }\n  table.table-multi thead { display: none; }\n  table.table-multi tr {\n    background: rgba(255,255,255,0.02);\n    border: 1px solid var(--border);\n    border-radius: 4px;\n    padding: 10px 12px;\n    margin-bottom: 8px;\n  }\n  table.table-multi td {\n    border-bottom: none;\n    padding: 2px 0;\n    white-space: normal;\n    max-width: none;\n  }\n  table.table-multi td::before {\n    display: block;\n    font-size: 9px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--text-dim);\n    margin-bottom: 1px;\n    content: attr(data-label);\n  }\n}\n\n/* ── Mobile ── */\n@media (max-width: 600px) {\n\n  /* Body — full width, no left padding (sidenav is off-canvas) */\n  body { padding: 0 0 60px; }\n\n  /* Sidenav — off-canvas drawer, slides in from left */\n  .sidenav {\n    transform: translateX(-100%);\n    width: 200px;\n    box-shadow: 4px 0 24px rgba(0,0,0,0.5);\n  }\n  .sidenav.open {\n    transform: translateX(0);\n  }\n  .sidenav-brand { font-size: 10px; padding: 16px 14px; }\n  .sidenav-links a { padding: 12px 16px; font-size: 11px; }\n  .sidenav-section { font-size: 9px; padding: 14px 16px 4px; }\n\n  /* Show hamburger in topbar */\n  .menu-toggle { display: block; }\n\n  /* Page container */\n  .page { padding: 16px; }\n\n  /* Topbar */\n  .topbar {\n    margin: -16px -16px 20px;\n    padding: 8px 12px;\n    gap: 6px;\n    flex-wrap: nowrap;\n  }\n\n  /* Hide search input on very small screens (still accessible by expanding) */\n  #search-input { width: 80px; font-size: 11px; }\n  #search-input:focus { width: 130px; }\n\n  /* Header */\n  h1 { font-size: 28px; }\n  .header { flex-direction: column; align-items: flex-start; gap: 10px; }\n  .header-right { text-align: left; font-size: 12px; }\n  .header-tag { font-size: 10px; }\n\n  /* Grids — single column */\n  .grid, .hub-grid { grid-template-columns: 1fr; }\n  .grid-2 { grid-template-columns: 1fr; }\n  .grid-full, .span-2 { grid-column: span 1; }\n\n  /* Area optim — reduce padding on mobile */\n  .area.area-optim { padding: 16px 12px 4px; margin-top: 6px; }\n\n  /* Subpage tabs compact on mobile — sidenav is hidden so tabs show inline */\n  .sidenav-subpage-tabs .subpage-tab { padding: 6px 12px; font-size: 10px; }\n\n  /* Cards — slightly less padding */\n  .card { padding: 14px; }\n\n  /* Section spacing — reduce on mobile */\n  .section-label { margin: 40px 0 12px; }\n\n  /* Tables — horizontal scroll wrapper on mobile */\n  table { min-width: 480px; }\n  table.table-conversion,\n  table.table-multi { min-width: 0; }  /* stacked layout handled by 640px breakpoint */\n  .card > table, .card > .checklist ~ table {\n    display: block;\n    overflow-x: auto;\n    -webkit-overflow-scrolling: touch;\n  }\n\n  /* Code / prompt boxes — ensure horizontal scroll */\n  pre { font-size: 12px; }\n  .prompt-box { font-size: 12px; white-space: pre-wrap; word-break: break-word; }\n  .prompt-box::before { font-size: 8px; }\n\n  /* Priority section highlight — reduce indent on mobile */\n  .section-label[data-priority=\"high\"] + .grid,\n  .section-label[data-priority=\"high\"] + .grid-2 {\n    margin-left: -8px;\n    padding-left: 10px;\n  }\n\n  /* Row list */\n  .row { font-size: 15px; flex-wrap: wrap; }\n  .row-label { min-width: 70px; font-size: 13px; }\n\n  /* Checklist */\n  .check-item { font-size: 15px; }\n\n  /* Contribute banner */\n  .contribute { flex-direction: column; }\n  .contribute-text p { max-width: 100%; }\n\n  /* Hub grid */\n  .hub-card { padding: 20px 18px; }\n  .hub-card-title { font-size: 14px; }\n  .hub-card-desc { font-size: 14px; }\n\n  /* Footer */\n  .footer { flex-direction: column; gap: 4px; }\n\n  /* Topbar copy buttons overlap less on narrow screens */\n  .copy-btn { font-size: 8px; padding: 2px 5px; }\n}\n\n/* ══ NEW COMPONENTS: COST CHIP / METRIC / GOTCHA / FILTER / DETAILS ══════════\n   Opt-in per YAML item. Items without these fields render as before — default\n   visual density does not grow. Colors all reuse existing palette tokens.\n   ══════════════════════════════════════════════════════════════════════════ */\n\n/* ── COST CHIP — 14px inline circle with a single letter (F/C/M/E/?).\n   Opt-in via `cost: free|cheap|moderate|expensive|situational` on checklist\n   items. `situational` is its own tier — declares \"this is context-dependent,\n   not a binary rule\" instead of looking identical to an absolute claim. */\n.cost-chip {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 16px;\n  height: 16px;\n  border-radius: 50%;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  line-height: 1;\n  margin-right: 7px;\n  vertical-align: 1px;\n  flex-shrink: 0;\n  border: 1px solid transparent;\n  cursor: help;\n}\n.cost-chip.cost-free        { background: rgba(184,255,87,0.20); color: var(--accent3); border-color: rgba(184,255,87,0.35); }\n.cost-chip.cost-cheap       { background: rgba(184,255,87,0.10); color: var(--accent3); border-color: rgba(184,255,87,0.25); }\n.cost-chip.cost-moderate    { background: rgba(255,179,71,0.15); color: var(--warn);    border-color: rgba(255,179,71,0.35); }\n.cost-chip.cost-expensive   { background: rgba(255,87,87,0.15);  color: var(--bad);     border-color: rgba(255,87,87,0.4); }\n.cost-chip.cost-situational { background: rgba(0,229,255,0.08);  color: var(--accent);  border-color: rgba(0,229,255,0.4); }\n\n/* ── SETUP / DIFFICULTY CHIP — three dots signalling how hard a rule is to\n   ship (beginner = one checkbox, advanced = engine plumbing). Visually\n   distinct from cost chip (circle+letter) so the two can sit side-by-side\n   without confusion. Opt-in via `difficulty: beginner|intermediate|advanced`. */\n.setup-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 2px;\n  margin-right: 7px;\n  vertical-align: 2px;\n  flex-shrink: 0;\n  cursor: help;\n  padding: 2px 3px;\n  border-radius: 6px;\n  border: 1px solid transparent;\n}\n.setup-chip .dot {\n  width: 5px;\n  height: 5px;\n  border-radius: 50%;\n  border: 1px solid currentColor;\n  background: transparent;\n  display: inline-block;\n}\n.setup-chip .dot.fill { background: currentColor; }\n.setup-chip.setup-beginner     { color: var(--accent3); background: rgba(184,255,87,0.06); border-color: rgba(184,255,87,0.25); }\n.setup-chip.setup-intermediate { color: var(--warn);    background: rgba(255,179,71,0.08); border-color: rgba(255,179,71,0.30); }\n.setup-chip.setup-advanced     { color: var(--accent2); background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.35); }\n\n/* ── METRIC — inline styling for quantified claims wrapped in <m>…<\u002Fm>.\n   Visually adjacent to <code> but semantically \"this is a measured number,\n   not an API symbol.\" Lets readers scan the page for perf-relevant numbers. */\nm {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  font-style: normal;\n  background: var(--code-bg);\n  border: 1px solid var(--border);\n  border-radius: 3px;\n  padding: 0 4px;\n  color: var(--accent3);\n  font-weight: 600;\n  white-space: nowrap;\n}\n\n/* ── GOTCHA BLOCK — structured sub-rows with colored gutter stripes.\n   Replaces the dense prose+checklist+rowlist stack in Engine Gotchas cards\n   with one concern per block, split into PROBLEM / WHY / FIX / DETECT. */\n.gotcha-block {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  margin: 4px 0;\n}\n.gotcha-row {\n  display: grid;\n  grid-template-columns: 68px 1fr;\n  gap: 12px;\n  align-items: baseline;\n  padding: 7px 10px 7px 12px;\n  border-left: 3px solid var(--border);\n  background: rgba(255,255,255,0.015);\n  border-radius: 0 3px 3px 0;\n  line-height: 1.55;\n}\n.gotcha-row.problem { border-left-color: var(--bad);      background: rgba(255,87,87,0.04); }\n.gotcha-row.why     { border-left-color: var(--text-dim); background: rgba(107,122,141,0.04); }\n.gotcha-row.fix     { border-left-color: var(--accent3);  background: rgba(184,255,87,0.04); }\n.gotcha-row.detect  { border-left-color: var(--accent);   background: rgba(0,229,255,0.04); }\n.gotcha-label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--text-dim);\n}\n.gotcha-row.problem .gotcha-label { color: var(--bad); }\n.gotcha-row.fix     .gotcha-label { color: var(--accent3); }\n.gotcha-row.detect  .gotcha-label { color: var(--accent); }\n.gotcha-text { font-size: 15px; color: var(--text); }\n.gotcha-ref {\n  font-size: 12px !important;\n  color: var(--text-dim) !important;\n  margin-left: 6px;\n  padding: 1px 5px !important;\n}\n/* Narrow cards can't afford the 68px label gutter — stack the label above the\n   content so PROBLEM/WHY/FIX/DETECT still scan but text gets full card width. */\n@container card (max-width: 340px) {\n  .gotcha-row { grid-template-columns: 1fr; gap: 4px; }\n}\n@media (max-width: 900px) {\n  .gotcha-row { grid-template-columns: 1fr; gap: 4px; }\n  .gotcha-label { font-size: 9px; }\n}\n\n/* ── GOTCHA COMPACT — two-tier variant.\n   Primary tier (Problem + Fix) stays visible; secondary tier (Context +\n   Ref) collapses into a <details>. Tighter vertical rhythm than the full\n   block because the card usually stacks 2-3 of these. */\n.gotcha-block.gotcha-compact { gap: 4px; margin: 4px 0 10px; }\n.gotcha-block.gotcha-compact .gotcha-row { padding: 5px 10px 5px 12px; }\n.gotcha-fixes { margin: 0; padding-left: 18px; }\n.gotcha-fixes li { margin: 2px 0; font-size: 15px; color: var(--text); line-height: 1.5; }\n.gotcha-fixes li:first-child { margin-top: 0; }\n.gotcha-fixes li:last-child { margin-bottom: 0; }\n.gotcha-context-details {\n  margin-top: 2px;\n  padding: 5px 10px 5px 12px;\n  border-left: 3px solid var(--border);\n  background: rgba(107,122,141,0.03);\n  border-radius: 0 3px 3px 0;\n}\n.gotcha-context-details > summary {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--text-dim);\n  cursor: pointer;\n  list-style: none;\n  user-select: none;\n}\n.gotcha-context-details > summary::-webkit-details-marker { display: none; }\n.gotcha-context-details > summary::before { content: \"▸\"; display: inline-block; margin-right: 6px; font-size: 9px; }\n.gotcha-context-details[open] > summary::before { content: \"▾\"; }\n.gotcha-context-body { margin-top: 6px; font-size: 13px; color: var(--text-dim); line-height: 1.55; }\n.gotcha-context-body .gotcha-ref { margin-left: 6px; }\n\n/* ── FILTER STRIP — per-section tag filter, rendered by build.py only when the\n   section contains tagged items. Click a tag → `.tag-dimmed` on non-matching\n   items. Zero bloat: doesn't render at all on sections without tags. */\n.filter-strip {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  gap: 6px;\n  margin: -4px 0 14px;\n  padding: 6px 10px;\n  background: rgba(255,255,255,0.015);\n  border: 1px solid var(--border);\n  border-radius: 4px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n}\n.filter-strip-label {\n  color: var(--text-dim);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  margin-right: 4px;\n}\n.filter-tag {\n  background: transparent;\n  border: 1px solid var(--border);\n  border-radius: 3px;\n  padding: 3px 9px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-dim);\n  cursor: pointer;\n  transition: color 0.15s, border-color 0.15s, background 0.15s;\n  letter-spacing: 0.06em;\n}\n.filter-tag:hover { color: var(--text); border-color: var(--text-dim); }\n.filter-tag.active {\n  color: var(--accent);\n  border-color: var(--accent);\n  background: rgba(0,229,255,0.08);\n}\n.area.area-optim .filter-tag.active {\n  color: var(--accent2);\n  border-color: var(--accent2);\n  background: rgba(255,107,53,0.08);\n}\n.area.area-engine .filter-tag.active {\n  color: var(--accent3);\n  border-color: var(--accent3);\n  background: rgba(184,255,87,0.08);\n}\n.check-item.tag-dimmed {\n  opacity: 0.25;\n  transition: opacity 0.15s;\n}\n\n/* ── DETAILS / PROGRESSIVE DISCLOSURE — `detail:` on a checklist item moves\n   the long explanatory prose under a native <details>. Mobile-friendly (tap,\n   not hover), keyboard-native, and doesn't force every item to show its\n   full depth inline. Items without `detail:` render unchanged. */\ndetails.check-detail {\n  display: flex;\n  flex-direction: column;\n  min-width: 0;\n  width: 100%;\n}\ndetails.check-detail > summary {\n  display: flex;\n  align-items: flex-start;\n  gap: 8px;\n  list-style: none;\n  cursor: pointer;\n  padding: 2px 0;\n  position: relative;\n  min-height: 22px;\n}\ndetails.check-detail > summary::-webkit-details-marker { display: none; }\ndetails.check-detail > summary::after {\n  content: '▸';\n  color: var(--text-dim);\n  font-size: 10px;\n  margin-left: auto;\n  padding-left: 8px;\n  flex-shrink: 0;\n  transition: transform 0.15s, color 0.15s;\n  align-self: center;\n}\ndetails.check-detail[open] > summary::after {\n  transform: rotate(90deg);\n  color: var(--accent);\n}\ndetails.check-detail > summary:hover::after { color: var(--text); }\ndetails.check-detail > .check-detail-body {\n  margin: 6px 0 4px 28px;\n  padding: 9px 12px;\n  background: rgba(255,255,255,0.02);\n  border-left: 2px solid var(--border);\n  border-radius: 0 3px 3px 0;\n  font-size: 14px;\n  color: var(--text-dim);\n  line-height: 1.6;\n}\n\n/* When a check-item wraps a <details>, neutralise the default flex layout —\n   the <summary> takes over handling the icon+text row. `.check-item-expandable`\n   is added by build.py specifically for this case, avoiding `:has()` compat\n   issues. */\n.check-item-expandable { display: block; }\n.check-item-expandable > details.check-detail {\n  width: 100%;\n  min-width: 0;\n}\n.check-item .check-body {\n  display: inline;\n  min-width: 0;\n}\n<\u002Fstyle>\n<style>/* ══ SHADER VISUALS PAGE ══════════════════════════════════════════════════════\n   Styles scoped to shader-visuals.html. All visuals sit inside .viz-card,\n   which extends .card with a fixed-aspect media region + caption.\n   ══════════════════════════════════════════════════════════════════════════ */\n\n.viz-card {\n  display: flex;\n  flex-direction: column;\n  padding: 0;\n  overflow: hidden;\n}\n.viz-card .viz-media {\n  position: relative;\n  width: 100%;\n  aspect-ratio: 16 / 10;\n  background: var(--code-bg);\n  border-bottom: 1px solid var(--border);\n  overflow: hidden;\n}\n.viz-card.viz-tall .viz-media { aspect-ratio: 4 / 3; }\n.viz-card.viz-wide .viz-media { aspect-ratio: 21 / 9; }\n.viz-card .viz-media canvas,\n.viz-card .viz-media svg {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  display: block;\n}\n.viz-body { padding: 16px 18px 18px; }\n.viz-tag {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--accent);\n  margin-bottom: 4px;\n}\n.viz-card.orange-tag .viz-tag { color: var(--accent2); }\n.viz-card.green-tag .viz-tag { color: var(--accent3); }\n.viz-card.warn-tag .viz-tag  { color: var(--warn); }\n\n.viz-title {\n  font-size: 20px;\n  font-weight: 700;\n  color: #fff;\n  letter-spacing: -0.01em;\n  line-height: 1.2;\n  margin-bottom: 8px;\n}\n.viz-desc {\n  font-size: 14px;\n  color: var(--text-dim);\n  line-height: 1.55;\n}\n.viz-desc code { font-size: 12.5px; }\n\n/* Inline parameter readout (e.g. particle count) */\n.viz-readout {\n  position: absolute;\n  top: 10px;\n  left: 12px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.14em;\n  color: var(--text-dim);\n  background: rgba(8,10,14,0.72);\n  border: 1px solid var(--border);\n  border-radius: 2px;\n  padding: 4px 8px;\n  pointer-events: none;\n  text-transform: uppercase;\n  z-index: 2;\n}\n.viz-readout b { color: var(--accent); font-weight: 700; }\n.viz-readout.warn b { color: var(--warn); }\n.viz-readout.bad b { color: var(--bad); }\n.viz-readout.good b { color: var(--accent3); }\n\n.viz-legend {\n  position: absolute;\n  bottom: 10px;\n  left: 12px;\n  right: 12px;\n  display: flex;\n  gap: 14px;\n  flex-wrap: wrap;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.1em;\n  color: var(--text-dim);\n  text-transform: uppercase;\n  pointer-events: none;\n  z-index: 2;\n}\n.viz-legend .swatch {\n  display: inline-block;\n  width: 10px; height: 10px;\n  vertical-align: -1px;\n  margin-right: 5px;\n  border-radius: 1px;\n}\n\n/* Interactive control strip at bottom of a viz */\n.viz-controls {\n  position: absolute;\n  bottom: 8px;\n  right: 10px;\n  display: flex;\n  gap: 6px;\n  z-index: 3;\n}\n.viz-btn {\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--text-dim);\n  background: rgba(8,10,14,0.72);\n  border: 1px solid var(--border);\n  border-radius: 2px;\n  padding: 4px 9px;\n  cursor: pointer;\n  transition: color .15s, border-color .15s, background .15s;\n}\n.viz-btn:hover { color: var(--accent); border-color: var(--accent); }\n.viz-btn.active {\n  color: var(--accent);\n  border-color: var(--accent);\n  background: rgba(0,229,255,0.08);\n}\n.viz-btn.warn.active {\n  color: var(--warn);\n  border-color: var(--warn);\n  background: rgba(255,179,71,0.08);\n}\n\n.viz-slider-wrap {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  margin-top: 10px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-dim);\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n.viz-slider-wrap input[type=\"range\"] {\n  flex: 1;\n  accent-color: var(--accent);\n  background: transparent;\n}\n.viz-slider-wrap b {\n  color: var(--accent);\n  font-weight: 700;\n  min-width: 80px;\n  text-align: right;\n}\n\n/* ── HERO STRIP ── */\n.viz-hero {\n  position: relative;\n  width: 100%;\n  aspect-ratio: 21 / 6;\n  background: #000;\n  border: 1px solid var(--border);\n  border-radius: 4px;\n  overflow: hidden;\n  margin-bottom: 28px;\n}\n.viz-hero canvas {\n  position: absolute; inset: 0;\n  width: 100%; height: 100%;\n  display: block;\n}\n.viz-hero-overlay {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  padding: 18px 22px;\n  pointer-events: none;\n}\n.viz-hero-overlay .corner {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: rgba(205, 214, 224, 0.72);\n  text-shadow: 0 0 12px rgba(0,0,0,0.8);\n}\n.viz-hero-overlay .corner b { color: var(--accent); }\n.viz-hero-overlay .row {\n  display: flex;\n  justify-content: space-between;\n  gap: 20px;\n}\n\n/* ── GRID ── */\n.viz-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 14px;\n}\n.viz-grid .grid-full { grid-column: 1 / -1; }\n@media (max-width: 900px) {\n  .viz-grid { grid-template-columns: 1fr; }\n}\n\n/* ── TWEAKS PANEL ── */\n.tweaks-panel {\n  position: fixed;\n  right: 20px;\n  bottom: 20px;\n  width: 240px;\n  background: rgba(15, 19, 24, 0.96);\n  border: 1px solid var(--border);\n  border-radius: 4px;\n  padding: 14px 14px 12px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-dim);\n  z-index: 180;\n  backdrop-filter: blur(8px);\n  box-shadow: 0 10px 40px rgba(0,0,0,0.4);\n  display: none;\n}\nbody.tweaks-on .tweaks-panel { display: block; }\n.tweaks-panel h4 {\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--accent);\n  margin-bottom: 10px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n}\n.tweaks-panel .tweak-row {\n  display: flex;\n  flex-direction: column;\n  gap: 5px;\n  margin-bottom: 10px;\n}\n.tweaks-panel label {\n  font-size: 9.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-dim);\n  display: flex;\n  justify-content: space-between;\n}\n.tweaks-panel label b { color: var(--accent); font-weight: 700; }\n.tweaks-panel .seg {\n  display: flex;\n  gap: 4px;\n}\n.tweaks-panel .seg button {\n  flex: 1;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.1em;\n  color: var(--text-dim);\n  background: transparent;\n  border: 1px solid var(--border);\n  border-radius: 2px;\n  padding: 5px 4px;\n  cursor: pointer;\n  text-transform: uppercase;\n}\n.tweaks-panel .seg button.active {\n  color: var(--accent);\n  border-color: var(--accent);\n  background: rgba(0,229,255,0.08);\n}\n.tweaks-panel input[type=\"range\"] {\n  width: 100%;\n  accent-color: var(--accent);\n}\n\n/* ── STYLE VARIANTS ── */\n/* Default (match): use existing palette, nothing changes. */\n\n/* Schematic — blueprint-ish, thin lines, restrained color */\nbody.viz-style-schematic {\n  --accent:  #7ecbff;\n  --accent2: #ffb347;\n  --accent3: #d5f0ff;\n}\nbody.viz-style-schematic .viz-card .viz-media {\n  background-image:\n    repeating-linear-gradient(0deg,   transparent, transparent 23px, rgba(126,203,255,0.06) 23px, rgba(126,203,255,0.06) 24px),\n    repeating-linear-gradient(90deg,  transparent, transparent 23px, rgba(126,203,255,0.06) 23px, rgba(126,203,255,0.06) 24px);\n}\n\n/* CRT / scanlines */\nbody.viz-style-crt .viz-card .viz-media::after {\n  content: '';\n  position: absolute; inset: 0;\n  background: repeating-linear-gradient(0deg,\n    rgba(0,0,0,0) 0px,\n    rgba(0,0,0,0) 2px,\n    rgba(0,0,0,0.25) 2px,\n    rgba(0,0,0,0.25) 3px);\n  pointer-events: none;\n  z-index: 4;\n  mix-blend-mode: multiply;\n}\nbody.viz-style-crt .viz-hero::after {\n  content: '';\n  position: absolute; inset: 0;\n  background: repeating-linear-gradient(0deg,\n    rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,\n    rgba(0,0,0,0.25) 2px, rgba(0,0,0,0.25) 3px);\n  pointer-events: none;\n  z-index: 4;\n}\n\n/* Labels toggle */\nbody.viz-labels-off .viz-readout,\nbody.viz-labels-off .viz-legend,\nbody.viz-labels-off .viz-hero-overlay { display: none !important; }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body class=\"subpage-ref\">\n\n<div class=\"nav-overlay\" id=\"nav-overlay\" aria-hidden=\"true\"><\u002Fdiv>\n\n<nav class=\"sidenav\" id=\"sidenav\" aria-label=\"Site navigation\">\n  <a href=\"index.html\" class=\"sidenav-brand\">⚗ UE5<br>SHADER<br>REF<\u002Fa>\n  <div class=\"sidenav-links\">\n    <a href=\"index.html\">HOME<\u002Fa>\n    <div class=\"sidenav-divider\"><\u002Fdiv>\n    <span class=\"sidenav-section\">PAGES<\u002Fspan>\n    <a href=\"materials.html\">MATERIALS<\u002Fa>\n    <a href=\"niagara.html\">NIAGARA<\u002Fa>\n    <a href=\"shaders.html\">SHADERS<\u002Fa>\n    <a href=\"shader-visuals.html\" class=\"active\">VISUALS<\u002Fa>\n    <div class=\"sidenav-divider\"><\u002Fdiv>\n    <span class=\"sidenav-section\">ON THIS PAGE<\u002Fspan>\n    <a href=\"#hero\">Hero · Worley<\u002Fa>\n    <a href=\"#overdraw\">Translucency<\u002Fa>\n    <a href=\"#scaling\">GPU vs CPU<\u002Fa>\n    <a href=\"#threadgroups\">Threadgroups<\u002Fa>\n    <a href=\"#stateless\">Stateless Flow<\u002Fa>\n    <a href=\"#bounds\">Fixed Bounds<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<div class=\"page\">\n\n  <nav class=\"topbar\" aria-label=\"Page controls\">\n    <button class=\"menu-toggle\" id=\"menu-toggle\" aria-label=\"Open navigation\">☰<\u002Fbutton>\n    <span class=\"topbar-spacer\"><\u002Fspan>\n    <a href=\"#overdraw\">Overdraw<\u002Fa>\n    <span class=\"sep\">·<\u002Fspan>\n    <a href=\"#scaling\">Scaling<\u002Fa>\n    <span class=\"sep\">·<\u002Fspan>\n    <a href=\"#threadgroups\">Threads<\u002Fa>\n    <span class=\"sep\">·<\u002Fspan>\n    <a href=\"#stateless\">Stateless<\u002Fa>\n    <span class=\"sep\">·<\u002Fspan>\n    <a href=\"#bounds\">Bounds<\u002Fa>\n  <\u002Fnav>\n\n  <div class=\"header\">\n    <div class=\"header-left\">\n      <span class=\"header-tag\">● Visual Sketches · Math &amp; Optimization<\u002Fspan>\n      <h1>Shader <span>Visuals<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"header-right\">\n      Format: <strong>GLSL · SVG · Canvas<\u002Fstrong><br>\n      Scope: <strong>Niagara · Compute · Materials<\u002Fstrong><br>\n      Aim: <strong>Intuition over spec<\u002Fstrong>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── HERO ─────────────────────────────────────────────────────────── -->\n  <div id=\"hero\" class=\"viz-hero\">\n    <canvas id=\"hero-canvas\"><\u002Fcanvas>\n    <div class=\"viz-hero-overlay\">\n      <div class=\"row\">\n        <span class=\"corner\"><b>◈<\u002Fb> WORLEY / VORONOI · f(uv, t) = min distance to N jittered cells<\u002Fspan>\n        <span class=\"corner\">LIVE GLSL · SINGLE FRAG PASS<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <span class=\"corner\">used for · CAUSTICS · CELLULAR TEXTURES · FLOW FIELDS<\u002Fspan>\n        <span class=\"corner\">seed <b id=\"hero-seed\">0x3A7F<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"color:var(--text-dim); font-size:15px; max-width: 820px; margin: -10px 0 30px; line-height:1.55;\">\n    Five visual sketches below, each pointing at a concept in the reference pages. The hero above is a real\n    GLSL fragment shader — the same math you'd drop into a <code>Custom<\u002Fcode> node, sans the HLSL rename pass.\n    Cards are diagrams when a curve is clearer than a render. Toggle tweaks from the toolbar for style + labels.\n  <\u002Fp>\n\n  <div class=\"viz-grid\">\n\n    <!-- ═══ 1. TRANSLUCENCY OVERDRAW ═══════════════════════════════════ -->\n    <a class=\"card orange viz-card orange-tag grid-full\" id=\"overdraw\" style=\"text-decoration:none; color:inherit;\">\n      <div class=\"viz-media\" style=\"aspect-ratio: 21/8;\">\n        <canvas id=\"overdraw-canvas\"><\u002Fcanvas>\n        <div class=\"viz-readout\">LAYERS <b id=\"overdraw-layers\">5<\u002Fb> · SHADED PIXELS <b id=\"overdraw-pixels\">—<\u002Fb> · COST <b id=\"overdraw-cost\" class=\"warn-b\">—<\u002Fb><\u002Fdiv>\n        <div class=\"viz-legend\">\n          <span><span class=\"swatch\" style=\"background:var(--accent3)\"><\u002Fspan>1× opaque<\u002Fspan>\n          <span><span class=\"swatch\" style=\"background:var(--warn)\"><\u002Fspan>2–4× translucent<\u002Fspan>\n          <span><span class=\"swatch\" style=\"background:var(--bad)\"><\u002Fspan>5+× hotspot<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"viz-controls\">\n          <button class=\"viz-btn\" data-ov=\"1\">1<\u002Fbutton>\n          <button class=\"viz-btn\" data-ov=\"3\">3<\u002Fbutton>\n          <button class=\"viz-btn active\" data-ov=\"5\">5<\u002Fbutton>\n          <button class=\"viz-btn\" data-ov=\"8\">8<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-body\">\n        <div class=\"viz-tag\">01 · TRANSLUCENCY · OVERDRAW STACKING<\u002Fdiv>\n        <div class=\"viz-title\">Every translucent layer pays the material cost again<\u002Fdiv>\n        <div class=\"viz-desc\">\n          Opaque writes depth and culls further layers. <strong>Translucent does not<\u002Fstrong> — each overlapping\n          sprite is shaded in full. A 50-instruction smoke sheet covering 5 layers = 250 instructions per pixel\n          in the overlap. The heatmap shows where that compounds; red zones are where your <code>stat gpu<\u002Fcode>\n          translucency bar spikes.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fa>\n\n    <!-- ═══ 2. GPU vs CPU SCALING ══════════════════════════════════════ -->\n    <div class=\"card blue viz-card\" id=\"scaling\">\n      <div class=\"viz-media\" style=\"aspect-ratio: 5/4;\">\n        <svg id=\"scaling-svg\" viewBox=\"0 0 520 420\" preserveAspectRatio=\"none\"><\u002Fsvg>\n        <div class=\"viz-readout\">PARTICLES <b id=\"scaling-n\">10,000<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-body\">\n        <div class=\"viz-tag\">02 · NIAGARA · SIM BACKEND COST<\u002Fdiv>\n        <div class=\"viz-title\">CPU scales linearly. GPU scales by dispatch, not count.<\u002Fdiv>\n        <div class=\"viz-desc\">\n          CPU cost grows with <em>n<\u002Fem>, hugging the game thread. GPU has a fixed dispatch overhead then flattens\n          out until you saturate the device. <strong>Below ~100 particles CPU wins<\u002Fstrong> (setup cost dominates);\n          above, GPU is nearly free until millions. Scrub below.\n        <\u002Fdiv>\n        <div class=\"viz-slider-wrap\">\n          <span>n<\u002Fspan>\n          <input type=\"range\" id=\"scaling-slider\" min=\"1\" max=\"6\" step=\"0.05\" value=\"4\">\n          <b id=\"scaling-verdict\">GPU favored<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ 3. THREADGROUP DISPATCH ════════════════════════════════════ -->\n    <div class=\"card green viz-card green-tag\" id=\"threadgroups\">\n      <div class=\"viz-media\" style=\"aspect-ratio: 5/4;\">\n        <canvas id=\"tg-canvas\"><\u002Fcanvas>\n        <div class=\"viz-readout\">DISPATCH <b id=\"tg-info\">8×8 × 64<\u002Fb><\u002Fdiv>\n        <div class=\"viz-legend\">\n          <span><span class=\"swatch\" style=\"background:var(--accent3)\"><\u002Fspan>active wavefront<\u002Fspan>\n          <span><span class=\"swatch\" style=\"background:rgba(184,255,87,0.15)\"><\u002Fspan>retired<\u002Fspan>\n          <span><span class=\"swatch\" style=\"background:rgba(255,107,53,0.4)\"><\u002Fspan>&gt; 65,535 tail<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"viz-controls\">\n          <button class=\"viz-btn active\" data-tg=\"8\">[64,1,1]<\u002Fbutton>\n          <button class=\"viz-btn\" data-tg=\"4\">[16,4,1]<\u002Fbutton>\n          <button class=\"viz-btn\" data-tg=\"1\">[1,1,1]<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-body\">\n        <div class=\"viz-tag\">03 · COMPUTE · DISPATCH GEOMETRY<\u002Fdiv>\n        <div class=\"viz-title\">Threadgroups &amp; the 65,535 tail<\u002Fdiv>\n        <div class=\"viz-desc\">\n          Each cell is one threadgroup (<code>[numthreads(64,1,1)]<\u002Fcode> by default). The wavefront sweep shows\n          retired work in dim lime. Cells past <strong>65,535<\u002Fstrong> on any dispatch axis slip into the orange\n          tail — D3D silently remaps them, and Niagara GPU sims ship a bug if you don't plan around it.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ 4. STATELESS FLOW ═════════════════════════════════════════ -->\n    <div class=\"card blue viz-card grid-full\" id=\"stateless\">\n      <div class=\"viz-media\" style=\"aspect-ratio: 21/9;\">\n        <canvas id=\"stateless-canvas\"><\u002Fcanvas>\n        <div class=\"viz-readout\">pos = f(<b style=\"color:var(--accent2)\">Age<\u002Fb>, <b style=\"color:var(--accent3)\">UniqueID<\u002Fb>) · NO FRAME STATE<\u002Fdiv>\n        <div class=\"viz-legend\">\n          <span>x = hash(UniqueID) · radius<\u002Fspan>\n          <span>y = lerp(spawn, target, Age/Life)<\u002Fspan>\n          <span>color = curve(NormalizedAge)<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-body\">\n        <div class=\"viz-tag\">04 · STATELESS PARTICLES · PURE FUNCTION<\u002Fdiv>\n        <div class=\"viz-title\">Every frame is recomputed from (Age, UniqueID) alone<\u002Fdiv>\n        <div class=\"viz-desc\">\n          No <code>PreviousPosition<\u002Fcode>, no accumulators, no per-particle memory — just a deterministic hash\n          keyed by <code>UniqueID<\u002Fcode> and a curve keyed by <code>Age<\u002Fcode>. That's the entire state model.\n          Scales to millions on GPU. Breaks the moment behavior needs history (collisions, steering, flocking).\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ 5. FIXED vs DYNAMIC BOUNDS ════════════════════════════════ -->\n    <div class=\"card yellow viz-card warn-tag\" id=\"bounds\">\n      <div class=\"viz-media\" style=\"aspect-ratio: 5/4;\">\n        <canvas id=\"bounds-canvas\"><\u002Fcanvas>\n        <div class=\"viz-readout\"><b id=\"bounds-mode\">DYNAMIC<\u002Fb> · RECOMPUTE <b id=\"bounds-recompute\">EVERY FRAME<\u002Fb><\u002Fdiv>\n        <div class=\"viz-controls\">\n          <button class=\"viz-btn warn active\" data-bn=\"dyn\">Dynamic<\u002Fbutton>\n          <button class=\"viz-btn\" data-bn=\"fix\">Fixed<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-body\">\n        <div class=\"viz-tag\">05 · NIAGARA · BOUNDS &amp; CULLING<\u002Fdiv>\n        <div class=\"viz-title\">Fixed bounds let the GPU skip a full particle readback<\u002Fdiv>\n        <div class=\"viz-desc\">\n          Dynamic bounds: the emitter's AABB is re-derived every frame from particle positions — requires a GPU→CPU\n          readback that stalls the frame. Fixed: artist-authored box, GPU trusts it and skips the sync. Visible\n          pop-in is the usual tell — particles vanish when the actor leaves the (stale) dynamic box.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═══ 6. NOISE FIELD STRIP ══════════════════════════════════════ -->\n    <div class=\"card orange viz-card orange-tag grid-full\" id=\"noise-strip\">\n      <div class=\"viz-media\" style=\"aspect-ratio: 21/6;\">\n        <canvas id=\"noise-canvas\"><\u002Fcanvas>\n        <div class=\"viz-legend\">\n          <span style=\"left:12px; bottom:10px; position:absolute;\">VALUE NOISE<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"viz-controls\">\n          <button class=\"viz-btn active\" data-ns=\"value\">Value<\u002Fbutton>\n          <button class=\"viz-btn\" data-ns=\"worley\">Worley<\u002Fbutton>\n          <button class=\"viz-btn\" data-ns=\"fbm\">fBm<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-body\">\n        <div class=\"viz-tag\">06 · CLASSIC SHADER MATH · NOISE FIELDS<\u002Fdiv>\n        <div class=\"viz-title\">Three building blocks, one fragment program<\u002Fdiv>\n        <div class=\"viz-desc\">\n          <strong>Value<\u002Fstrong> = smoothed per-cell hash. <strong>Worley<\u002Fstrong> = nearest-point distance across\n          a jittered grid. <strong>fBm<\u002Fstrong> = sum of value-noise octaves at halving amplitude / doubling\n          frequency. All three are pure <code>f(uv, t)<\u002Fcode> — no state, no samplers — ideal for Custom nodes.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div class=\"footer\" style=\"margin-top:40px;\">\n    <span>UE5 Shader Visuals · <a href=\"index.html\">back to home<\u002Fa><\u002Fspan>\n    <span>Live GLSL · SVG diagrams · Canvas sketches<\u002Fspan>\n    <span>MIT · Community Edition<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ TWEAKS PANEL ══ -->\n<div class=\"tweaks-panel\" id=\"tweaks-panel\">\n  <h4>TWEAKS <span style=\"color:var(--text-dim); font-size:9px;\">◈<\u002Fspan><\u002Fh4>\n  <div class=\"tweak-row\">\n    <label>Style<\u002Flabel>\n    <div class=\"seg\" id=\"tw-style\">\n      <button data-style=\"match\" class=\"active\">Match<\u002Fbutton>\n      <button data-style=\"schematic\">Schema<\u002Fbutton>\n      <button data-style=\"crt\">CRT<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>Speed <b id=\"tw-speed-val\">1.0×<\u002Fb><\u002Flabel>\n    <input type=\"range\" id=\"tw-speed\" min=\"0\" max=\"3\" step=\"0.05\" value=\"1\">\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label>Labels<\u002Flabel>\n    <div class=\"seg\" id=\"tw-labels\">\n      <button data-labels=\"on\" class=\"active\">On<\u002Fbutton>\n      <button data-labels=\"off\">Off<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ══ TWEAK DEFAULTS (persisted by host) ══ */\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"style\": \"match\",\n  \"speed\": 0.65,\n  \"labels\": \"on\"\n}/*EDITMODE-END*/;\n<\u002Fscript>\n\n<script src=\"51c67377-5908-4f26-b1ef-329e3e242609\"><\u002Fscript>\n<script src=\"efd68ee0-5eec-4e98-8a80-4c847fe89aed\"><\u002Fscript>\n<script src=\"9f67f083-751d-4d9e-bd4d-70ef451c6a18\"><\u002Fscript>\n<script src=\"2041a4dd-55cf-41fd-b386-1260652b7304\"><\u002Fscript>\n<script src=\"fa1883c6-1997-4a46-bc29-9a439f7fb7d2\"><\u002Fscript>\n<script src=\"e1664d8d-8c1a-4734-86e1-5cdee6cfc944\"><\u002Fscript>\n<script src=\"0f730207-8855-4644-920b-799c76a21775\"><\u002Fscript>\n<script src=\"d60d4397-82b9-4cbf-a146-f5fc1192716d\"><\u002Fscript>\n<script src=\"a2a9e6ed-dd68-4dc9-99cc-e30607d73e59\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
